            보존하면 label snapshot은 유지하고 이 링크는 null로 반환한다. 내부 chunk ID,
            스토리지 키와 detached_at은 노출하지 않는다.

    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - id
        - chat_id
        - job_id
        - sequence
        - role
        - content
        - evidence
        - model_name
        - prompt_version
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        chat_id:
          $ref: "#/components/schemas/ResourceId"
        job_id:
          type: [string, "null"]
          description: USER 메시지는 null, 생성된 ASSISTANT 메시지는 원인 AIJob ID
        sequence:
          type: integer
          minimum: 1
        role:
          $ref: "#/components/schemas/ChatMessageRole"
        content:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ChatEvidence"
        model_name:
          type: [string, "null"]
        prompt_version:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time

    ChatMessageListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        next_cursor:
          type: [string, "null"]

    ChatTurnAcceptedResponse:
      type: object
      additionalProperties: false
      required: [user_message, job]
      properties:
        user_message:
          $ref: "#/components/schemas/ChatMessage"
        job:
          $ref: "#/components/schemas/AIJob"

    AIJobResourceType:
      type: string
      enum:
        - MATERIAL
        - QUESTION
        - QUESTION_CLUSTER
        - SUMMARY
        - CHAT_MESSAGE
        - SESSION

    AIJobResourceLink:
      type: object
      additionalProperties: false
      required: [resource_type, resource_id, resource_url]
      properties:
        resource_type:
          $ref: "#/components/schemas/AIJobResourceType"
        resource_id:
          type: [string, "null"]
          description: 결과 리소스 생성 전에는 null일 수 있음
        resource_url:
          type: [string, "null"]
          description: 권한 검사를 거쳐 결과를 조회할 상대 URL. 준비 전에는 null

    AIJobError:
      type: object
      additionalProperties: false
      required: [code, message, retryable]
      properties:
        code:
          type: string
          description: AI_TIMEOUT, AI_SERVICE_UNAVAILABLE 등 provider 원문을 제거한 안전한 오류 코드
        message:
          type: string
          description: 프롬프트·모델 응답·내부 stack을 포함하지 않는 안전한 사용자 메시지
        retryable:
          type: boolean

    AIJobProgress:
      type: object
      additionalProperties: false
      required: [stage, percent]
      properties:
        stage:
          type: string
          description: |
            QUEUED, EXTRACTING, GENERATING, FINALIZING 등 사용자에게 공개해도 안전한
            작업별 phase. provider 내부 단계명과 민감한 입력·오류 정보는 노출하지 않는다.
        percent:
          type: [integer, "null"]
          minimum: 0
          maximum: 100
          description: 계산할 수 없는 작업이면 null

    AIJob:
      type: object
      additionalProperties: false
      required:
        - id
        - session_id
        - job_type
        - visibility
        - status
        - attempt
        - version
        - progress
        - retryable
        - blocks_session_completion
        - error
        - target
        - result
        - created_at
        - updated_at
        - started_at
        - finished_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        job_type:
          $ref: "#/components/schemas/AIJobType"
          description: 사용자에게 공개하는 작업 purpose
        visibility:
          $ref: "#/components/schemas/AIJobVisibility"
        status:
          $ref: "#/components/schemas/AIJobStatus"
        attempt:
          type: integer
          minimum: 1
        version:
          type: integer
          minimum: 1
        progress:
          oneOf:
            - $ref: "#/components/schemas/AIJobProgress"
            - type: "null"
        retryable:
          type: boolean
          description: FAILED Job을 현재 권한 주체가 다시 실행할 수 있는지 여부
        blocks_session_completion:
          type: boolean
          description: |
            true이면 이 Job이 SUCCEEDED 또는 FAILED terminal 상태가 될 때까지 Session은
            PROCESSING을 유지한다. true인 Job의 visibility는 반드시 SHARED이다.
        error:
          oneOf:
            - $ref: "#/components/schemas/AIJobError"
            - type: "null"
        target:
          $ref: "#/components/schemas/AIJobResourceLink"
          description: 작업이 처리하는 입력·논리 대상
        result:
          oneOf:
            - $ref: "#/components/schemas/AIJobResourceLink"
            - type: "null"
          description: SUCCEEDED이면 결과 리소스 링크, 완료 전 또는 실패하면 null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: [string, "null"]
          format: date-time
        finished_at:
          type: [string, "null"]
          format: date-time

    AIJobAcceptedResponse:
      type: object
      additionalProperties: false
      required: [job]
      properties:
        job:
          $ref: "#/components/schemas/AIJob"

    AIJobListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AIJob"
        next_cursor:
          type: [string, "null"]

    SessionRecord:
      type: object
      additionalProperties: false
      required:
        - session
        - recording
        - materials
        - transcript
        - summary
        - questions
        - answers
        - jobs
      properties:
        session:
          $ref: "#/components/schemas/LectureSession"
        recording:
          oneOf:
            - $ref: "#/components/schemas/SessionRecording"
            - type: "null"
          description: |
            첫 audio.start가 없거나 현재 사용자의 녹음 접근 정책이 허용하지 않으면 null.
            storage key, 서버 경로와 물리 fragment 구성은 포함하지 않는다.
        materials:
          type: array
          description: 외부에서 연결된 자료만 포함하며 분리된 자료는 즉시 제외
          items:
            $ref: "#/components/schemas/LectureMaterial"
        transcript:
          type: array
          description: 영구 저장된 final 구간만 포함
          items:
            $ref: "#/components/schemas/TranscriptSegment"
        summary:
          oneOf:
            - $ref: "#/components/schemas/LectureSummary"
            - type: "null"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answer"
        jobs:
          type: array
          description: 자료 처리·Session 후처리 등 공용 Job만 포함. 개인 AI Job은 제외
          items:
            $ref: "#/components/schemas/AIJob"

    RealtimeEventType:
      type: string
      enum:
        - connection.ready
        - resync.required
        - transcript.partial
        - transcript.final
        - transcript.status
        - question.created
        - question.updated
        - reaction.updated
        - answer.updated
        - session.updated
        - recording.updated
        - job.updated

    ConnectionReadyPayload:
      type: object
      additionalProperties: false
      required:
        - connection_id
        - role
        - server_time
        - heartbeat_interval_ms
        - resume_status
      properties:
        connection_id:
          $ref: "#/components/schemas/ResourceId"
        role:
          $ref: "#/components/schemas/CourseRole"
        server_time:
          type: string
          format: date-time
        heartbeat_interval_ms:
          type: integer
          const: 20000
        resume_status:
          type: string
          enum: [FRESH, REPLAYED, RESYNC_REQUIRED]

    ResyncRequiredPayload:
      type: object
      additionalProperties: false
      required: [reason, resources]
      properties:
        reason:
          type: string
          enum: [CURSOR_EXPIRED, SERVER_RESTARTED, CURSOR_UNKNOWN]
        resources:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [SESSION, RECORDING, TRANSCRIPT, QUESTIONS, ANSWERS, JOBS]

    TranscriptStatusPayload:
      type: object
      additionalProperties: false
      required: [status, last_final_sequence, lag_ms]
      properties:
        status:
          type: string
          enum: [LISTENING, DEGRADED, FINALIZING, FINALIZED, STOPPED]
        last_final_sequence:
          type: [integer, "null"]
          minimum: 1
        lag_ms:
          type: [integer, "null"]
          minimum: 0

    ReactionUpdatedPayload:
      type: object
      additionalProperties: false
      required: [question_id, reaction_count]
      properties:
        question_id:
          $ref: "#/components/schemas/ResourceId"
        reaction_count:
          type: integer
          minimum: 0

    RealtimeEvent:
      type: object
      additionalProperties: false
      description: |
        WebSocket 서버 이벤트의 공통 envelope 초안. 이벤트는 중복 전달될 수 있으며
        클라이언트는 event_id로 중복을 제거하고 낮은 resource_version을 무시한다.
      required:
        - schema_version
        - event_id
        - type
        - session_id
        - cursor
        - resource_version
        - correlation_id
        - occurred_at
        - data
      properties:
        schema_version:
          type: integer
          const: 1
        event_id:
          $ref: "#/components/schemas/ResourceId"
        type:
          $ref: "#/components/schemas/RealtimeEventType"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        cursor:
          type: [string, "null"]
          description: best-effort 재생을 위한 불투명 커서. 지원하지 않으면 null
        resource_version:
          type: [integer, "null"]
          minimum: 1
        correlation_id:
          type: [string, "null"]
          description: 원인이 된 HTTP request ID 또는 AIJob ID
        occurred_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true

    TranscriptPartialPayload:
      type: object
      additionalProperties: false
      required:
        - utterance_id
        - revision
        - audio_sequence_start
        - audio_sequence_end
        - start_ms
        - end_ms
        - text
      properties:
        utterance_id:
          $ref: "#/components/schemas/ResourceId"
        revision:
          type: integer
          minimum: 1
        audio_sequence_start:
          type: integer
          minimum: 0
        audio_sequence_end:
          type: integer
          minimum: 0
        start_ms:
          type: integer
          minimum: 0
        end_ms:
          type: integer
          minimum: 0
        text:
          type: string
      description: 저장·재생하지 않는 임시 STT. 같은 utterance_id의 큰 revision으로 교체한다.

    TranscriptFinalPayload:
      type: object
      additionalProperties: false
      required: [utterance_id, segment]
      properties:
        utterance_id:
          $ref: "#/components/schemas/ResourceId"
        segment:
          $ref: "#/components/schemas/TranscriptSegment"
      description: DB commit 후 전파하며 같은 utterance의 partial 표시를 제거한다.

    AudioStartControl:
      type: object
      additionalProperties: false
      required: [type, request_id, data]
      properties:
        type:
          type: string
          const: audio.start
        request_id:
          type: string
        data:
          type: object
          additionalProperties: false
          required:
            [client_stream_id, format, chunk_duration_ms, resume_from_sequence]
          properties:
            client_stream_id:
              type: string
              description: 재연결 중 동일하게 유지하는 클라이언트 stream ID
            format:
              $ref: "#/components/schemas/AudioFormat"
            chunk_duration_ms:
              type: integer
              const: 500
              description: MVP v1 고정 chunk 길이
            resume_from_sequence:
              type: [integer, "null"]
              minimum: 0
              description: 재연결 시 마지막 audio.ack.received_through. 신규 stream이면 null

    AudioFormat:
      type: object
      additionalProperties: false
      required: [encoding, sample_rate_hz, channels]
      properties:
        encoding:
          type: string
          const: PCM_S16LE
          description: MVP v1 little-endian signed 16-bit PCM
        sample_rate_hz:
          type: integer
          const: 16000
        channels:
          type: integer
          const: 1

    AudioPublisherStatus:
      type: string
      enum: [CLAIMED, RESUMED]
      description: |
        CLAIMED는 Session의 첫 성공 audio.start가 publisher를 점유했음을, RESUMED는 같은
        client_stream_id가 기존 publisher와 Recording을 재사용해 연결했음을 뜻한다.

    AudioReadyControl:
      type: object
      additionalProperties: false
      required:
        - type
        - stream_id
        - recording_id
        - publisher_status
        - accepted_format
        - max_chunk_bytes
        - max_in_flight
        - last_received_sequence
        - last_processed_sequence
      properties:
        type:
          type: string
          const: audio.ready
        stream_id:
          $ref: "#/components/schemas/ResourceId"
        recording_id:
          $ref: "#/components/schemas/ResourceId"
        publisher_status:
          $ref: "#/components/schemas/AudioPublisherStatus"
        accepted_format:
          $ref: "#/components/schemas/AudioFormat"
        max_chunk_bytes:
          type: integer
          minimum: 1
          description: 14-byte header를 포함한 binary frame 전체 최대 크기
        max_in_flight:
          type: integer
          minimum: 1
        last_received_sequence:
          type: [integer, "null"]
          minimum: 0
        last_processed_sequence:
          type: [integer, "null"]
          minimum: 0

    AudioAckControl:
      type: object
      additionalProperties: false
      required: [type, received_through, processed_through, queue_depth_ms]
      properties:
        type:
          type: string
          const: audio.ack
        received_through:
          type: integer
          minimum: 0
        processed_through:
          type: [integer, "null"]
          minimum: 0
        queue_depth_ms:
          type: integer
          minimum: 0

    AudioFlowControl:
      type: object
      additionalProperties: false
      required: [type, state, queue_depth_ms, suggested_pause_ms]
      properties:
        type:
          type: string
          const: audio.flow_control
        state:
          type: string
          enum: [SLOW_DOWN, RESUME]
        queue_depth_ms:
          type: integer
          minimum: 0
        suggested_pause_ms:
          type: integer
          minimum: 0

    AudioStoppedControl:
      type: object
      additionalProperties: false
      required:
        - type
        - last_received_sequence
        - last_processed_sequence
        - last_final_transcript_sequence
      properties:
        type:
          type: string
          const: audio.stopped
        last_received_sequence:
          type: [integer, "null"]
          minimum: 0
        last_processed_sequence:
          type: [integer, "null"]
          minimum: 0
        last_final_transcript_sequence:
          type: [integer, "null"]
          minimum: 1

    AudioResumeRejectedControl:
      type: object
      additionalProperties: false
      required: [type, reason]
      properties:
        type:
          type: string
          const: audio.resume_rejected
        reason:
          type: string
          enum: [SERVER_STATE_LOST, SEQUENCE_EXPIRED, SESSION_CLOSING]

    AudioStopControl:
      type: object
      additionalProperties: false
      required: [type, request_id]
      properties:
        type:
          type: string
          const: audio.stop
        request_id:
          type: string

    RealtimeError:
      type: object
      additionalProperties: false
      required: [type, code, message, retryable, request_id]
      properties:
        type:
          type: string
          const: error
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        request_id:
          type: [string, "null"]

x-recording-contract:
  status: draft-with-explicit-tbd
  live_capture:
    source: same browser microphone source
    branches:
      - PCM_S16LE 16000 Hz mono fixed 500 ms frames over the audio WebSocket for live STT
      - browser-local binary recording finalized at Session end and sent by HTTP resumable upload
    channel_separation: Session event WebSocket and audio WebSocket use separate connections and tickets
    publisher: first successful audio.start client_stream_id atomically claims the Session publisher
    reconnect: the same client_stream_id reuses the publisher claim and Recording
    conflict: a different client_stream_id receives AUDIO_PUBLISHER_CONFLICT and close code 4409
    tab_exit_warning: UI responsibility during capture or upload; release condition is TBD, not a WebSocket control message
  recording:
    public_cardinality: zero before audio.start and exactly one logical SessionRecording after the first successful start
    physical_storage: TBD whether one object or multiple fragments, rows and a manifest; public cardinality does not decide DB or object-store cardinality
    safe_metadata: storage keys, server paths, fragment keys and manifests are never exposed
  upload:
    lifecycle: init, offset lookup, binary chunk transfer, complete
    provisional_operations:
      - GET /api/v1/recording-uploads/{upload_id}
      - PATCH /api/v1/recording-uploads/{upload_id}
    checksum_error_code: RECORDING_CHECKSUM_MISMATCH
    hq_stt_gate: HQ STT starts only after successful upload complete; concrete Job and Transcript contracts belong to PR4
  playback:
    endpoint: GET /api/v1/recordings/{recording_id}/playback
    authorization: revalidated on every request
    range: supports full response and byte Range when UPLOADED
  tbd:
    - resumable offset lookup GET versus HEAD
    - chunk method, offset header, request media type, chunk size and success status
    - checksum algorithm, transport location, verification point and mismatch HTTP status
    - exact upload expiry duration and cleanup behavior
    - recording codec, container, accepted content types, browser-local storage and maximum size
    - physical single object versus fragments and manifest
    - publisher disconnect lease, reacquisition and explicit takeover
    - transcript DEGRADED threshold, audio stop timeout and event replay window
    - recording consent, role-based access, retention and deletion
    - permission-checked proxy playback versus opaque short-lived signed delivery URL
    - HQ STT Job type and response, Transcript generation, canonical replacement, timeout, Answer remap and Segment recording offsets in PR4

x-websocket-channels:
  status: draft
  standard: non-standard-extension
  source_of_truth: ./API_명세서.md#16-websocket과-음성-스트리밍
  note: |
    OpenAPI 3.1은 WebSocket 양방향 메시지를 표준적으로 표현하지 않는다. 이 확장은
    구현 참고용이며 계약이 안정되면 AsyncAPI 분리를 검토한다. WebSocket은 알림·전송
    수단이고 DB와 REST 조회 결과가 최종 진실이다.
  channels:
    /api/v1/ws/sessions/{session_id}:
      summary: Course 멤버용 Session 변경 알림
      authorization: Course membership required
      authentication: POST /api/v1/realtime-tickets의 60초 만료·1회용 SESSION_EVENTS_READ ticket
      handshakeQuery: ticket
      direction: server-to-client-events
      eventEnvelope:
        $ref: "#/components/schemas/RealtimeEvent"
      serverControlMessages:
        - $ref: "#/components/schemas/RealtimeError"
      eventPayloads:
        connection.ready:
          $ref: "#/components/schemas/ConnectionReadyPayload"
        resync.required:
          $ref: "#/components/schemas/ResyncRequiredPayload"
        transcript.partial:
          $ref: "#/components/schemas/TranscriptPartialPayload"
        transcript.final:
          $ref: "#/components/schemas/TranscriptFinalPayload"
        transcript.status:
          $ref: "#/components/schemas/TranscriptStatusPayload"
        question.created:
          $ref: "#/components/schemas/Question"
        question.updated:
          $ref: "#/components/schemas/Question"
        reaction.updated:
          $ref: "#/components/schemas/ReactionUpdatedPayload"
        answer.updated:
          $ref: "#/components/schemas/Answer"
        session.updated:
          $ref: "#/components/schemas/LectureSession"
        recording.updated:
          description: 현재 녹음 접근 정책이 허용한 사용자에게만 전달하는 안전한 메타데이터
          $ref: "#/components/schemas/SessionRecording"
        job.updated:
          description: Session 공용 작업에만 사용. 개인 AI 작업은 요청자에게만 전달
          $ref: "#/components/schemas/AIJob"
      delivery:
        semantics: at-least-once-possible
        reconnect: bounded replay if available; otherwise resync.required and REST recovery
        partial_replay: false
    /api/v1/ws/sessions/{session_id}/audio:
      summary: 교수자 한 명의 저지연 음성 업로드
      authorization: Course PROFESSOR and LIVE Session required
      authentication: POST /api/v1/realtime-tickets의 60초 만료·1회용 SESSION_AUDIO_WRITE ticket
      handshakeQuery: ticket
      separation: Session event WebSocket과 별도 연결·티켓·책임을 사용
      concurrency: |
        한 Session의 첫 성공 audio.start client_stream_id가 publisher를 원자적으로 claim하고
        Recording을 CAPTURING으로 만든다. 같은 client_stream_id는 reconnect·resume할 수 있다.
        다른 client_stream_id는 AUDIO_PUBLISHER_CONFLICT를 받은 뒤 4409로 종료된다. 비정상
        단절의 lease 만료, 재획득과 명시적 takeover 정책은 TBD이다.
      clientTextMessages:
        - $ref: "#/components/schemas/AudioStartControl"
        - $ref: "#/components/schemas/AudioStopControl"
      serverTextMessages:
        - $ref: "#/components/schemas/AudioReadyControl"
        - $ref: "#/components/schemas/AudioAckControl"
        - $ref: "#/components/schemas/AudioFlowControl"
        - $ref: "#/components/schemas/AudioStoppedControl"
        - $ref: "#/components/schemas/AudioResumeRejectedControl"
        - $ref: "#/components/schemas/RealtimeError"
      clientBinaryFrames:
        status: mvp-v1
        description: |
          각 frame은 14-byte big-endian header와 PCM payload로 구성한다. byte 0은 protocol
          version(1), byte 1은 flags(MVP v1은 0), byte 2..5는 uint32 chunk_sequence, byte 6..13은 uint64
          captured_offset_ms, 나머지는 PCM_S16LE 16000 Hz mono payload다. sequence는
          client_stream_id별 0부터 1씩 증가하고 offset은 stream 시작 기준이다. 기본 chunk는
          500 ms(16000 bytes)이며 max_chunk_bytes는 audio.ready가 정한다. 이 frame은 live STT
          전송용이다. 클라이언트는 같은 microphone source를 이 PCM 경로와 브라우저 로컬
          binary 녹음 경로로 동시에 분기하고, 로컬 녹음은 Session 종료 뒤 HTTP resumable
          upload로 영구 저장한다. codec·container와 로컬 저장 방식은 TBD이다.
  personal-ai-stream:
    status: TBD
    visibility: requester-only
    transport: SSE 또는 streaming HTTP 권장; Session 공용 WebSocket broadcast 금지
    completionFallback: GET /api/v1/jobs/{job_id}와 Summary/Chat REST 조회
    candidateEvents:
      - job.updated
      - summary.delta
      - summary.completed
      - chat.message.started
      - chat.message.delta
      - chat.message.completed
