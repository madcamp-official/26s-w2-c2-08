                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    MaterialUploadConflict:
      description: Session 상태, 연결된 자료 수 또는 멱등성 키 충돌로 업로드할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: 정리 중인 class에는 강의자료를 업로드할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: PROCESSING
                    allowed_statuses: [READY, LIVE, COMPLETED]
            materialLimitExceeded:
              value:
                error:
                  code: MATERIAL_LIMIT_EXCEEDED
                  message: class당 강의자료 개수 제한을 초과했습니다.
                  request_id: req_01HXYZ
                  details:
                    max_active_materials: 10
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    MaterialDetachConflict:
      description: Session 상태, 동시 상태 변경 또는 멱등성 키 충돌로 자료를 분리할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: 정리 중인 class에서는 강의자료를 분리할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: PROCESSING
                    allowed_statuses: [READY, LIVE, COMPLETED]
            deleteConflict:
              value:
                error:
                  code: MATERIAL_DELETE_CONFLICT
                  message: 강의자료 상태가 변경되었습니다. 목록을 다시 불러온 뒤 재시도해 주세요.
                  request_id: req_01HXYZ
                  details: null
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    AIJobRetryConflict:
      description: AI Job 상태 또는 재시도 가능 여부가 재시도 조건과 맞지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            stateConflict:
              value:
                error:
                  code: AI_JOB_STATE_CONFLICT
                  message: FAILED 상태의 작업만 재시도할 수 있습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: RUNNING
                    required_status: FAILED
            notRetryable:
              value:
                error:
                  code: AI_JOB_NOT_RETRYABLE
                  message: 이 작업은 재시도할 수 없습니다.
                  request_id: req_01HXYZ
                  details: null
            systemManaged:
              value:
                error:
                  code: AI_JOB_RETRY_SYSTEM_MANAGED
                  message: 이 작업의 재시도는 시스템이 자동으로 관리합니다.
                  request_id: req_01HXYZ
                  details: null
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    PayloadTooLarge:
      description: 업로드 파일이 십진수 100000000 bytes 제한을 초과함
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FILE_TOO_LARGE
              message: 업로드 가능한 파일 크기를 초과했습니다.
              request_id: req_01HXYZ
              details:
                max_bytes: 100000000
    UnsupportedMediaType:
      description: 지원하지 않는 파일 또는 Content-Type
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNSUPPORTED_MEDIA_TYPE
              message: PDF 파일만 업로드할 수 있습니다.
              request_id: req_01HXYZ
              details: null
    ValidationFailed:
      description: 요청 필드의 의미 또는 값이 유효하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: 요청 값을 확인해 주세요.
              request_id: req_01HXYZ
              details:
                field_violations:
                  - field: content
                    reason: 빈 문자열일 수 없습니다.
    TextInputValidationFailed:
      description: 앞뒤 공백 제거·Unicode NFC 정규화 후 질문·초안·Chat USER 텍스트 길이 검증 실패
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TextInputValidationErrorResponse"
          examples:
            emptyAfterNormalization:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: 입력 길이를 확인해 주세요.
                  request_id: req_01HXYZ
                  details:
                    field: content
                    reason: EMPTY_AFTER_NORMALIZATION
                    max_length: 300
                    actual_length: 0
            questionTooLong:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: 입력 길이를 확인해 주세요.
                  request_id: req_01HXYZ
                  details:
                    field: content
                    reason: MAX_LENGTH_EXCEEDED
                    max_length: 300
                    actual_length: 301
            draftTooLong:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: 입력 길이를 확인해 주세요.
                  request_id: req_01HXYZ
                  details:
                    field: draft
                    reason: MAX_LENGTH_EXCEEDED
                    max_length: 500
                    actual_length: 501
            chatTooLong:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: 입력 길이를 확인해 주세요.
                  request_id: req_01HXYZ
                  details:
                    field: content
                    reason: MAX_LENGTH_EXCEEDED
                    max_length: 2000
                    actual_length: 2001
    RateLimited:
      description: 요청 한도를 초과함
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RATE_LIMITED
              message: 잠시 후 다시 시도해 주세요.
              request_id: req_01HXYZ
              details: null
    InternalServerError:
      description: 예상하지 못한 서버 오류
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_ERROR
              message: 요청을 처리하지 못했습니다.
              request_id: req_01HXYZ
              details: null
    ServiceUnavailable:
      description: 데이터베이스 또는 AI 의존 서비스를 사용할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: DEPENDENCY_UNAVAILABLE
              message: 일시적으로 서비스를 사용할 수 없습니다.
              request_id: req_01HXYZ
              details: null

  schemas:
    ResourceId:
      type: string
      minLength: 1
      description: 형식을 클라이언트가 해석하지 않는 불투명 리소스 ID
      examples: [resource_01HXYZ]

    CourseRole:
      type: string
      enum: [PROFESSOR, STUDENT]
      description: 전역 역할이 아닌 특정 Course 안에서의 사용자 역할

    CourseRoleFilter:
      type: string
      enum: [ALL, PROFESSOR, STUDENT]
      default: ALL

    LectureSessionStatus:
      type: string
      enum: [READY, LIVE, PROCESSING, COMPLETED]
      description: |
        PROCESSING은 종료 후 공용 Job 또는 Recording upload를 기다리는 상태다. 종료
        transaction은 SHARED·blocking SESSION_POSTPROCESSING coordinator를 PENDING으로 만들고
        Recording/HQ 또는 LIVE source가 terminal이 될 때까지 claim하지 않는다. Recording이
        upload complete되면 SHARED·blocking RECORDING_TRANSCRIPTION Job이 시작된다. 이 Job이
        SUCCEEDED 또는 FAILED terminal이면 다른 blocking Job과 함께 완료 조건을 충족할 수 있고,
        coordinator의 terminal 전이·downstream blocking Job 생성·outbox를 같은 transaction에
        commit한 뒤에만 완료를 재평가한다. 실패 terminal이어도 Session은 COMPLETED가
        될 수 있다. ended_at + 10분 watchdog도 Session·coordinator lock 아래 미생성
        applicable downstream blocking Job을 FAILED/retryable로 먼저 생성하되 eligible
        source의 누락 FINAL_SUMMARY는 합성하지 않고 DATA_INTEGRITY_ERROR로 기록한다. Summary state를
        기록한 뒤 coordinator·Recording·Upload·나머지 gate를 FAILED로 전환하고 완료를 재평가한다.
        COMPLETED 후 Job 재시도는 Session을 PROCESSING으로 되돌리지 않는다.
        한 Course에는 READY, LIVE, PROCESSING 중 하나인 active Session이 합계 최대 1개다.

    SessionRecordingStatus:
      type: string
      enum: [CAPTURING, UPLOAD_PENDING, UPLOADING, UPLOADED, FAILED]
      description: |
        CAPTURING은 첫 audio publisher가 live PCM과 브라우저 로컬 녹음을 생성하는 상태다.
        Session 종료 시 UPLOAD_PENDING, resumable upload 시작 시 UPLOADING, upload 완결 시
        playback과 HQ STT 시작이 가능한 UPLOADED가 된다. FAILED는 capture·upload·storage
        검증 실패의 terminal 공개 상태다. HQ STT·Transcript 처리 상태는 별도
        TranscriptVersion과 RECORDING_TRANSCRIPTION Job으로 공개한다.

    RecordingUploadStatus:
      type: string
      enum: [ACTIVE, COMPLETED, EXPIRED, FAILED]
      description: |
        resumable upload resource의 공개 상태. 정확한 expiry 값과 만료·실패 후 Recording
        전이 및 재시작 정책은 구현 전에 확정해야 한다.

    TranscriptVersionSource:
      type: string
      enum: [LIVE, RECORDING]
      description: LIVE final drain 또는 Recording 기반 HQ STT로 생성된 영구 Transcript 출처

    TranscriptVersionStatus:
      type: string
      enum: [FINALIZING, FINALIZED, FAILED, EMPTY]
      description: |
        FINALIZING은 final Segment·Gap 확정 중, FINALIZED는 final Segment 1건 이상으로 정상
        확정, FAILED는 처리 실패, EMPTY는 정상 처리됐지만 final Segment가 0건임을 뜻한다.
        FAILED는 last_sequence=0이고 Segment·Gap을 공개하지 않지만 EMPTY는 last_sequence=0이어도
        재처리 후 남은 final Gap을 가질 수 있다.

    AnswerTranscriptRemapStatus:
      type: string
      enum: [PENDING, SUCCEEDED, FAILED]
      description: |
        RECORDING_TRANSCRIPTION의 canonical commit 후 SESSION_POSTPROCESSING이 Answer 원본
        LIVE 범위를 현재 canonical final Segment에 전체 재매핑하는 상태. 일부 매핑,
        미매핑 이유와 수동 복구 상태를 별도 enum으로 세분할지는 TBD이다.

    FinalSummaryStatus:
      type: string
      enum: [PENDING, AVAILABLE, FAILED, NOT_APPLICABLE, DATA_INTEGRITY_ERROR]
      description: |
        DATA_INTEGRITY_ERROR는 eligible HQ source의 필수 FINAL_SUMMARY Job, SUCCEEDED
        결과 또는 관련 원장이 불일치할 때 내부 세부정보를 노출하지 않고
        반환하는 안전한 상태다.

    MaterialProcessingStatus:
      type: string
      enum: [UPLOADED, PROCESSING, READY, FAILED]
      description: |
        UPLOADED는 업로드 수락 후 처리 대기, PROCESSING은 전처리 중, READY는 AI 검색과
        근거 생성에 사용 가능, FAILED는 전처리 실패를 뜻한다. 연결된 PROCESSING 자료는
        class 시작을 차단한다. UPLOADED, PROCESSING, FAILED와 분리된 자료는 AI 근거에서
        제외하며, 분리는 이 공개 enum에 별도 상태로 추가하지 않는다.

    QuestionStatus:
      type: string
      enum: [OPEN, SELECTED, ANSWERED]

    QuestionSort:
      type: string
      enum: [POPULAR, RECENT]
      default: POPULAR

    AnswerStatus:
      type: string
      enum: [CAPTURING, COMPLETED]
      description: 취소는 CAPTURING Answer hard delete로 처리하므로 CANCELLED를 노출하지 않음

    AnswerType:
      type: string
      enum: [VOICE, TEXT]

    AnswerOrganizationStatus:
      type: string
      enum:
        - NOT_APPLICABLE
        - NOT_STARTED
        - WAITING_SOURCE
        - PENDING
        - RUNNING
        - SUCCEEDED
        - FAILED
        - DATA_INTEGRITY_ERROR
      description: |
        TEXT는 NOT_APPLICABLE, LIVE VOICE는 NOT_STARTED, PROCESSING source 대기는
        WAITING_SOURCE다. PENDING부터 FAILED까지는 Answer별 ANSWER_ORGANIZATION Job
        상태다. 필수 Job 또는 성공 결과 원장이 누락되면 DATA_INTEGRITY_ERROR다.

    AnswerTargetType:
      type: string
      enum: [STUDENT_QUESTION, AI_REPRESENTATIVE_QUESTION]

    QuestionClusterScope:
      type: string
      enum: [CURRENT, FINAL]
      default: CURRENT

    QuestionClusteringMode:
      type: string
      enum: [LIVE_INCREMENTAL, FINAL]

    RepresentativeQuestionLifecycle:
      type: string
      enum: [ACTIVE, PRESERVED]
      description: |
        ACTIVE는 현재 Cluster 중앙, PRESERVED는 Answer 때문에 보존된 child.
        Evidence provenance만 유지하는 내부 DISCARDED tombstone은 이 공개 enum과
        대표질문 응답에 절대 노출하지 않는다.

    SummaryType:
      type: string
      enum: [LIVE, FINAL]

    SummaryVisibility:
      type: string
      enum: [REQUESTER_ONLY, COURSE_MEMBERS]
      description: LIVE는 REQUESTER_ONLY, FINAL은 COURSE_MEMBERS

    ChatMode:
      type: string
      enum: [LIVE, REVIEW]
      description: LIVE는 Session LIVE, REVIEW는 Session COMPLETED에서만 생성·사용

    ChatMessageRole:
      type: string
      enum: [USER, ASSISTANT]

    AIJobStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED]

    AIJobResultUnavailableReason:
      type: string
      enum: [SUPERSEDED]
      description: 현재는 새 generation으로 교체·폐기된 성공 clustering 결과에만 사용

    AIJobVisibility:
      type: string
      enum: [SHARED, REQUESTER_ONLY]
      description: SHARED는 Course 멤버 공개, REQUESTER_ONLY는 작업 요청자에게만 공개

    AIJobType:
      type: string
      enum:
        - MATERIAL_PROCESSING
        - QUESTION_CLUSTERING
        - LIVE_SUMMARY
        - FINAL_SUMMARY
        - CHAT_RESPONSE
        - SESSION_POSTPROCESSING
        - RECORDING_TRANSCRIPTION
        - ANSWER_ORGANIZATION
      description: 사용자에게 공개하는 작업 purpose. provider 내부 작업명은 노출하지 않음

    SharedAIJobType:
      type: string
      enum:
        - MATERIAL_PROCESSING
        - QUESTION_CLUSTERING
        - FINAL_SUMMARY
        - SESSION_POSTPROCESSING
        - RECORDING_TRANSCRIPTION
        - ANSWER_ORGANIZATION
      description: Session 공용 Job 목록에서 조회할 수 있는 유형

    RealtimeTicketScope:
      type: string
      enum: [SESSION_EVENTS_READ, SESSION_AUDIO_WRITE]

    RealtimeTicketCreateRequest:
      type: object
      additionalProperties: false
      required: [session_id, scope]
      properties:
        session_id:
          $ref: "#/components/schemas/ResourceId"
        scope:
          $ref: "#/components/schemas/RealtimeTicketScope"
        resume_cursor:
          type: [string, "null"]
          description: SESSION_EVENTS_READ 재연결 시 마지막 event cursor. 신규 연결·audio scope면 생략

    RealtimeTicket:
      type: object
      additionalProperties: false
      required: [ticket, session_id, scope, expires_at]
      properties:
        ticket:
          type: string
          minLength: 1
          description: 60초 안에 한 번만 WebSocket upgrade에 사용할 수 있는 비밀 값
        session_id:
          $ref: "#/components/schemas/ResourceId"
        scope:
          $ref: "#/components/schemas/RealtimeTicketScope"
        expires_at:
          type: string
          format: date-time

    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: ok

    DatabaseHealthResponse:
      type: object
      additionalProperties: false
      required: [status, database]
      properties:
        status:
          type: string
          const: ok
        database:
          type: string
          const: reachable

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message, request_id, details]
      properties:
        code:
          type: string
          description: 클라이언트가 분기 처리할 안정적인 오류 코드
        message:
          type: string
          description: 사용자에게 표시할 수 있는 안전한 한국어 메시지
        request_id:
          type: string
          description: 서버 로그와 연결하는 요청 ID
        details:
          description: 민감정보를 제외한 선택적 진단 정보
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"

    TextInputValidationReason:
      type: string
      enum: [EMPTY_AFTER_NORMALIZATION, MAX_LENGTH_EXCEEDED]

    TextInputValidationDetails:
      type: object
      additionalProperties: false
      required: [field, reason, max_length, actual_length]
      properties:
        field:
          type: string
          enum: [content, draft]
        reason:
          $ref: "#/components/schemas/TextInputValidationReason"
        max_length:
          type: integer
          enum: [300, 500, 2000]
        actual_length:
          type: integer
          minimum: 0
          description: 앞뒤 공백 제거·Unicode NFC 정규화 후 Unicode code point 수
      oneOf:
        - properties:
            field: { const: content }
            reason: { const: EMPTY_AFTER_NORMALIZATION }
            max_length: { const: 300 }
            actual_length: { const: 0 }
        - properties:
            field: { const: content }
            reason: { const: MAX_LENGTH_EXCEEDED }
            max_length: { const: 300 }
            actual_length: { type: integer, minimum: 301 }
        - properties:
            field: { const: draft }
            reason: { const: EMPTY_AFTER_NORMALIZATION }
            max_length: { const: 500 }
            actual_length: { const: 0 }
        - properties:
            field: { const: draft }
            reason: { const: MAX_LENGTH_EXCEEDED }
            max_length: { const: 500 }
            actual_length: { type: integer, minimum: 501 }
        - properties:
            field: { const: content }
            reason: { const: EMPTY_AFTER_NORMALIZATION }
            max_length: { const: 2000 }
            actual_length: { const: 0 }
        - properties:
            field: { const: content }
            reason: { const: MAX_LENGTH_EXCEEDED }
            max_length: { const: 2000 }
            actual_length: { type: integer, minimum: 2001 }

    TextInputValidationError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, details]
      properties:
        code:
          type: string
          const: VALIDATION_ERROR
        message:
          type: string
        request_id:
          type: string
        details:
          $ref: "#/components/schemas/TextInputValidationDetails"

    TextInputValidationErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/TextInputValidationError"

    User:
      type: object
      additionalProperties: false
      required: [id, display_name, email, avatar_url]
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        display_name:
          type: string
        email:
          type: [string, "null"]
          format: email
          description: 인증 제공자와 공개 정책에 따라 null일 수 있음
        avatar_url:
          type: [string, "null"]
          format: uri

    CourseCreateRequest:
      type: object
      additionalProperties: false
      required: [title, semester]
      properties:
        title:
          type: string
          minLength: 1
          description: 길이 제한은 제품 검토 후 확정
        semester:
          type: string
          minLength: 1
          description: 표시용 학기 문자열. 구조화 여부는 TBD

    CourseJoinRequest:
      type: object
      additionalProperties: false
      required: [join_code]
      properties:
        join_code:
          type: string
          pattern: '^\s*[A-Za-z]{6}\s*$'
          description: |
            앞뒤 공백을 제거하고 대문자로 정규화한다. 정규화 결과는 `[A-Z]{6}`이며
            구분자를 허용하지 않는다. 코드는 만료되지 않고 회전 시 이전 값이 즉시 무효화된다.

    LectureSessionSummary:
      type: object
      additionalProperties: false
      required: [id, title, lecture_date, status, started_at]
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
        lecture_date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/LectureSessionStatus"
        started_at:
          type: [string, "null"]
          format: date-time
          description: READY이면 null, 시작된 Session이면 실제 시작 시각

    Course:
      type: object
      additionalProperties: false
      description: 계정 전역 역할은 없으며 Course에는 정확히 한 명의 PROFESSOR가 존재한다.
      required:
        - id
        - title
        - semester
        - role
        - current_session
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
        semester:
          type: string
        role:
          $ref: "#/components/schemas/CourseRole"
          description: 현재 인증 사용자의 이 Course 안 역할
        join_code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: 현재 사용자가 이 Course의 PROFESSOR일 때만 제공하는 정규화된 참여 코드
        current_session:
          oneOf:
            - $ref: "#/components/schemas/LectureSessionSummary"
            - type: "null"
          description: READY, LIVE, PROCESSING 중 하나인 유일한 active Session. 없으면 null
        created_at:
          type: string
          format: date-time
    CourseListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Course"
        next_cursor:
          type: [string, "null"]

    LectureSessionCreateRequest:
      type: object
      additionalProperties: false
      required: [lecture_date]
      properties:
        title:
          type: string
          description: |
            선택적 제목. 앞뒤 공백을 제거한 값이 비어 있으면 서버가 Course 제목·class
            날짜·시각을 포함한 자동 제목을 생성한다. 정확한 문자열 형식, READY에서
            사용할 시각 원장과 timezone은 아직 미정이다.
        lecture_date:
          type: string
          format: date

    LectureSessionUpdateRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          description: |
            앞뒤 공백을 제거한 값으로 수정한다. 빈 문자열이면 Course 제목·class 날짜·시각을
            포함한 서버 자동 제목으로 되돌린다. 정확한 형식·시각 원장·timezone은 미정이며,
            lecture_date와 시작·종료·완료 시각은 이 요청으로 변경할 수 없다.

    LectureSession:
      type: object
      additionalProperties: false
      required:
        - id
        - course_id
        - title
        - lecture_date
        - status
        - version
        - canonical_transcript_version_id
        - started_at
        - ended_at
        - completed_at
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        course_id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
        lecture_date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/LectureSessionStatus"
        version:
          type: integer
          minimum: 1
          description: 실시간 이벤트의 오래된 갱신을 거르기 위한 리소스 버전 초안
        canonical_transcript_version_id:
          type: [string, "null"]
          description: |
            기본 열람에 사용할 canonical TranscriptVersion ID. READY에서는 null일 수
            있지만 class 시작 transaction이 LIVE version을 만들어 이 포인터로 설정한다.
            정상 RECORDING FINALIZED·EMPTY가 LIVE를 교체한다. 최신 HQ status와 독립이며
            HQ FAILED·무결과 deadline에는 기존 LIVE 포인터를 보존한다. 이 LIVE를
            완료 기록·Summary의 final source로 인정할지는 TBD이다.
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
          description: COMPLETED 전환 시각. 그 전에는 null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LectureSessionListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LectureSession"
        next_cursor:
          type: [string, "null"]

    SessionEndAcceptedResponse:
      type: object
      additionalProperties: false
      required: [session, recording, jobs]
      properties:
        session:
          $ref: "#/components/schemas/LectureSession"
        recording:
          oneOf:
            - $ref: "#/components/schemas/SessionRecording"
            - type: "null"
          description: 첫 audio.start가 없었던 Session이면 null. 있으면 UPLOAD_PENDING Recording
        jobs:
          type: array
          minItems: 1
          maxItems: 2
          description: |
            종료 transaction에서 생성한 SHARED·blocking PENDING SESSION_POSTPROCESSING
            coordinator를 항상 포함하고, FINAL 대상이 1건 이상이면 같은 transaction에서
            입력 상한을 고정한 SHARED·blocking FINAL QUESTION_CLUSTERING Job도 포함한다.
            RECORDING_TRANSCRIPTION은 Recording upload complete 전에는 생성하지 않으며
            그 응답에 별도로 포함한다. coordinator는 source terminal 전에 claim하지 않지만
            FINAL clustering은 source와 독립적으로 즉시 실행할 수 있다.
          items:
            $ref: "#/components/schemas/AIJob"

    SessionRecording:
      type: object
      additionalProperties: false
      description: |
        Session의 논리 녹음 aggregate를 나타내는 안전한 외부 표현이다. 물리 저장물이 단일
        파일인지 fragment와 manifest인지, storage key와 서버 경로가 무엇인지는 노출하지 않는다.
      required:
        - id
        - session_id
        - status
        - version
        - content_type
        - byte_size
        - duration_ms
        - playback_url
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        status:
          $ref: "#/components/schemas/SessionRecordingStatus"
        version:
          type: integer
          minimum: 1
          description: recording.updated의 오래된 갱신을 거르기 위한 리소스 버전
        content_type:
          type: [string, "null"]
          description: upload format 확정 전 또는 아직 upload되지 않았으면 null
        byte_size:
          type: [integer, "null"]
          minimum: 1
          description: upload 완결 전에는 null
        duration_ms:
          type: [integer, "null"]
          minimum: 0
          description: 브라우저가 보고하고 서버가 검증한 재생 길이. 검증 전에는 null
        playback_url:
          type: [string, "null"]
          description: |
            현재 권한으로 UPLOADED 녹음을 조회할 상대 API 경로. 준비 전이거나 접근 정책상
            재생할 수 없으면 null이며 내부 storage URL을 반환하지 않는다.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecordingUploadCreateRequest:
      type: object
      additionalProperties: false
      required: [client_stream_id, content_type, total_bytes, duration_ms]
      properties:
        client_stream_id:
          type: string
          minLength: 1
          description: 첫 audio.start에서 publisher를 claim한 동일한 client stream ID
        content_type:
          type: string
          minLength: 1
          description: 허용 codec·container와 MIME 목록은 TBD
        total_bytes:
          type: integer
          minimum: 1
          description: 최대 녹음 크기는 TBD
        duration_ms:
          type: integer
          minimum: 0
          description: 브라우저 로컬 녹음이 보고한 전체 재생 길이

    RecordingUpload:
      type: object
      additionalProperties: false
      description: |
        resumable upload의 안전한 공개 상태다. 임시 storage 경로, storage key, fragment와
        manifest는 포함하지 않는다. offset 전달 header와 wire protocol은 아직 미정이다.
      required:
        - id
        - recording_id
        - status
        - offset_bytes
        - total_bytes
        - expires_at
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        recording_id:
          $ref: "#/components/schemas/ResourceId"
        status:
          $ref: "#/components/schemas/RecordingUploadStatus"
        offset_bytes:
          type: integer
          minimum: 0
          description: 서버가 연속적으로 확인한 다음 write 위치
        total_bytes:
          type: integer
          minimum: 1
        expires_at:
          type: string
          format: date-time
          description: 정확한 upload 유효 기간은 TBD
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecordingUploadCompletedResponse:
      type: object
      additionalProperties: false
      required: [recording, transcript_version, job]
      properties:
        recording:
          $ref: "#/components/schemas/SessionRecording"
          description: |
            upload 완결 뒤 UPLOADED로 전이된 Recording
        transcript_version:
          $ref: "#/components/schemas/TranscriptVersion"
          description: source=RECORDING, status=FINALIZING인 새 version
        job:
          $ref: "#/components/schemas/AIJob"
          description: |
            target RECORDING, visibility SHARED, blocks_session_completion=true인
            RECORDING_TRANSCRIPTION Job. 성공 result는 TRANSCRIPT_VERSION이다.

    LectureMaterial:
      type: object
      additionalProperties: false
      description: 외부에서 연결된 강의자료. 스토리지 키와 detached_at은 공개하지 않는다.
      required:
        - id
        - session_id
        - display_name
        - mime_type
        - byte_size
        - page_count
        - processing_status
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        display_name:
          type: string
          minLength: 1
          description: 업로드 시 충돌 suffix를 적용해 확정하고 이후 조회에서 재계산하지 않는 표시명
        mime_type:
          type: string
          const: application/pdf
        byte_size:
          type: integer
          minimum: 1
          maximum: 100000000
        page_count:
          type: [integer, "null"]
          minimum: 1
          description: 전처리 전 또는 실패 시 null일 수 있음
        processing_status:
          $ref: "#/components/schemas/MaterialProcessingStatus"
        created_at:
          type: string
          format: date-time

    LectureMaterialListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          maxItems: 10
          description: 외부에서 연결된 자료만 포함
          items:
            $ref: "#/components/schemas/LectureMaterial"
        next_cursor:
          type: [string, "null"]

    MaterialUploadAcceptedResponse:
      type: object
      additionalProperties: false
      required: [material, job]
      properties:
        material:
          $ref: "#/components/schemas/LectureMaterial"
        job:
          $ref: "#/components/schemas/AIJob"
          description: visibility=SHARED, blocks_session_completion=false인 MATERIAL_PROCESSING Job

    TranscriptVersion:
      type: object
      additionalProperties: false
      description: |
        Session 안의 영구 Transcript 한 version. is_canonical은 LectureSession의
        canonical_transcript_version_id에서 계산하며 source provenance를 숨기지 않는다.
        RECORDING_TRANSCRIPTION 실패·timeout은 해당 attempt의 staged Segment·Gap을
        제거하거나 rollback한 뒤 last_sequence=0, version FAILED, Job FAILED를 함께 commit한다.
      required:
        - id
        - session_id
        - source
        - status
        - version
        - last_sequence
        - is_canonical
        - recording_id
        - created_by_job_id
        - created_by_job_attempt
        - finalized_at
        - failed_at
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        source:
          $ref: "#/components/schemas/TranscriptVersionSource"
        status:
          $ref: "#/components/schemas/TranscriptVersionStatus"
        version:
          type: integer
          minimum: 1
          description: Session 안에서 단조 증가하는 Transcript version 번호
        last_sequence:
          type: integer
          minimum: 0
          description: |
            이 TranscriptVersion의 마지막 final Segment sequence. Segment가 없으면 0.
            FAILED·EMPTY는 0이며 EMPTY는 final Gap을 가질 수 있다.
        is_canonical:
          type: boolean
          description: Session canonical_transcript_version_id와 이 ID가 같은지 계산한 값
        recording_id:
          type: [string, "null"]
          description: source=RECORDING의 입력 Recording ID. source=LIVE이면 null
        created_by_job_id:
          type: [string, "null"]
          description: RECORDING_TRANSCRIPTION 결과이면 원인 Job ID, LIVE version이면 null
        created_by_job_attempt:
          type: [integer, "null"]
          minimum: 1
          description: RECORDING_TRANSCRIPTION Job attempt snapshot. LIVE version이면 null
        finalized_at:
          type: [string, "null"]
          format: date-time
          description: FINALIZED·EMPTY 확정 시각. 그 전과 FAILED에서는 null
        failed_at:
          type: [string, "null"]
          format: date-time
          description: FAILED 확정 시각. 그 전과 FINALIZED·EMPTY에서는 null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TranscriptVersionListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptVersion"
        next_cursor:
          type: [string, "null"]

    TranscriptAggregate:
      type: object
      additionalProperties: false
      description: |
        최신 처리 version의 상태와 기본 열람 canonical 포인터를 분리한 Session Transcript 상태.
        class 시작 transaction이 LIVE version을 canonical으로 설정한다. current_version이
        FAILED여도 canonical_version은 기존 LIVE version을 보존할 수 있으며, 이를
        완료 기록·Summary final source 사용 확정으로 해석하지 않는다.
      required:
        - session_id
        - status
        - current_version
        - canonical_version_id
        - canonical_version
        - updated_at
      properties:
        session_id:
          $ref: "#/components/schemas/ResourceId"
        status:
          $ref: "#/components/schemas/TranscriptVersionStatus"
          description: current_version.status와 같은 최신 Transcript 처리 상태
        current_version:
          $ref: "#/components/schemas/TranscriptVersion"
          description: 최신 LIVE 또는 RECORDING 처리 version
        canonical_version_id:
          type: [string, "null"]
          description: LectureSession canonical_transcript_version_id와 같은 기본 열람 포인터
        canonical_version:
          oneOf:
            - $ref: "#/components/schemas/TranscriptVersion"
            - type: "null"
          description: canonical_version_id가 null이면 null
        updated_at:
          type: string
          format: date-time

    TranscriptVersionUpdatedPayload:
      type: object
      additionalProperties: false
      description: |
        RECORDING_TRANSCRIPTION이 version·Segment·Gap·Segment 녹음 시간 mapping과
        canonical 전환을 commit한 뒤 보내는 invalidation payload. Answer mapping과
        Knowledge 재연결은 이 결과를 rollback하지 않는 후속 SESSION_POSTPROCESSING 단계다.
        FAILED version 알림이면 last_sequence=0이고 해당 attempt의 segments·gaps는 없다.
      required: [transcript, version]
      properties:
        transcript:
          $ref: "#/components/schemas/TranscriptAggregate"
        version:
          $ref: "#/components/schemas/TranscriptVersion"
          description: 상태 또는 canonical 관계가 변경된 version

    TranscriptSegment:
      type: object
      additionalProperties: false
      description: 영구 저장된 final Transcript 구간. partial 구간은 이 스키마로 저장하지 않는다.
      required:
        - id
        - session_id
        - transcript_version_id
        - item_type
        - sequence
        - start_ms
        - end_ms
        - recording_start_ms
        - recording_end_ms
        - text
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        transcript_version_id:
          $ref: "#/components/schemas/ResourceId"
        item_type:
          type: string
          const: SEGMENT
        sequence:
          type: integer
          minimum: 1
          description: 같은 TranscriptVersion 안의 final Segment 순번
        start_ms:
          type: integer
          minimum: 0
          description: class timeline 기준 시작 시각
        end_ms:
          type: integer
          minimum: 0
          description: class timeline 기준 종료 시각이며 start_ms 이상
        recording_start_ms:
          type: [integer, "null"]
          minimum: 0
          description: 녹음 시작 기준 playback offset. 아직 매핑되지 않았거나 녹음이 없으면 null
        recording_end_ms:
          type: [integer, "null"]
          minimum: 0
          description: 녹음 시작 기준 playback 종료 offset. recording_start_ms와 함께 null일 수 있음
        text:
          type: string
          minLength: 1
        created_at:
          type: string
          format: date-time

    TranscriptGap:
      type: object
      additionalProperties: false
      description: 텍스트를 추측해 채우지 않고 TranscriptVersion의 class 시간축에 남긴 누락 구간
      required:
        - id
        - session_id
        - transcript_version_id
        - item_type
        - start_ms
        - end_ms
        - is_final
        - reason
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        transcript_version_id:
          $ref: "#/components/schemas/ResourceId"
        item_type:
          type: string
          const: GAP
        start_ms:
          type: integer
          minimum: 0
          description: class timeline 기준 누락 시작 시각
        end_ms:
          type: [integer, "null"]
          minimum: 0
          description: 누락 종료를 확정하지 못했으면 null
        is_final:
          type: boolean
          description: |
            RECORDING version 재처리 후 canonical 후보에도 남은 최종 Gap이면 true.
            true이면 end_ms는 반드시 non-null이다.
        reason:
          type: string
          enum:
            [
              SERVER_STATE_LOST,
              SEQUENCE_GAP,
              CLIENT_DISCONNECTED,
              BACKPRESSURE_DROP,
            ]
        created_at:
          type: string
          format: date-time
      allOf:
        - if:
            properties:
              is_final:
                const: true
            required: [is_final]
          then:
            properties:
              end_ms:
                type: integer
                minimum: 0

    TranscriptTimelinePage:
      type: object
      additionalProperties: false
      description: |
        합친 타임라인에서 페이지를 자른 뒤 유형별 배열로 분리한다.
        클라이언트는 start_ms ASC, 같은 시각의 SEGMENT 우선, id ASC로
        두 배열을 merge해 한 페이지의 시간순을 복원한다.
      required: [transcript, selected_version, segments, gaps, next_cursor]
      properties:
        transcript:
          $ref: "#/components/schemas/TranscriptAggregate"
          description: current version의 최신 상태와 canonical 포인터
        selected_version:
          $ref: "#/components/schemas/TranscriptVersion"
          description: |
            명시한 version, 아니면 canonical version, canonical이 null이면 current version.
            segments·gaps와 cursor는 이 version에 고정된다.
        segments:
          type: array
          description: |
            합친 타임라인 페이지에 속한 final Segment만 분리한 배열.
            배열 내에서 start_ms ASC, id ASC다. selected_version이 FAILED나
            EMPTY이면 빈 배열이다.
          items:
            $ref: "#/components/schemas/TranscriptSegment"
        gaps:
          type: array
          description: |
            합친 타임라인 페이지에 속한 TranscriptGap만 분리한 배열.
            배열 내에서 start_ms ASC, id ASC다. EMPTY version은 final Gap을
            포함할 수 있고 FAILED version은 빈 배열이다.
          items:
            $ref: "#/components/schemas/TranscriptGap"
        next_cursor:
          type: [string, "null"]
          description: |
            선택한 TranscriptVersion과 마지막 합친 timeline 위치를 고정하는
            불투명 cursor. 두 배열 중 하나의 마지막 원소가 아니라 merge 순서의
            마지막 원소를 기준으로 한다. segments.length + gaps.length는 요청 limit 이하다.

    AIRepresentativeQuestion:
      type: object
      additionalProperties: false
      description: |
        AI가 Cluster 중앙 노드로 생성한 immutable 질문. 대표 문구가 바뀌면
        기존 행을 수정하지 않고 새 행을 생성한다. CAPTURING 또는 완료 Answer가 있는
        과거 대표질문은 lifecycle_status=PRESERVED인 Cluster child로 계속 노출한다.
        폐기된 미답변 대표질문의 내부 DISCARDED tombstone은 이 스키마로 반환하지 않는다.
      required:
        - id
        - session_id
        - content
        - lifecycle_status
        - status
        - version
        - answer_id
        - created_by_job_id
        - created_by_job_attempt
        - created_in_generation
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        content:
          type: string
          minLength: 1
          maxLength: 300
          description: 앞뒤 공백 제거·Unicode NFC 정규화 후 저장된 Question content
        lifecycle_status:
          $ref: "#/components/schemas/RepresentativeQuestionLifecycle"
        status:
          $ref: "#/components/schemas/QuestionStatus"
        version:
          type: integer
          minimum: 1
        answer_id:
          type: [string, "null"]
          description: 현재 target Answer가 없으면 null
        created_by_job_id:
          $ref: "#/components/schemas/ResourceId"
        created_by_job_attempt:
          type: integer
          minimum: 1
        created_in_generation:
          type: integer
          minimum: 1
          description: |
            이 immutable 대표질문이 처음 생성된 Cluster generation.
            이후 lifecycle_status=PRESERVED child로 이동해도 바뀌지 않는다.
        created_at:
          type: string
          format: date-time

      oneOf:
        - title: 미답변 대표질문
          properties:
            status:
              const: OPEN
            answer_id:
              type: "null"
        - title: 선택 또는 답변된 대표질문
          properties:
            status:
              enum: [SELECTED, ANSWERED]
            answer_id:
              type: string

    ActiveAIRepresentativeQuestion:
      description: 현재 generation의 Cluster 중앙에 있는 AI 대표질문
      allOf:
        - $ref: "#/components/schemas/AIRepresentativeQuestion"
        - type: object
          properties:
            lifecycle_status:
              type: string
              const: ACTIVE

    PreservedAIRepresentativeQuestion:
      description: Answer target 보존을 위해 현재 Cluster child로 남은 과거 AI 대표질문
      allOf:
        - $ref: "#/components/schemas/AIRepresentativeQuestion"
        - type: object
          properties:
            lifecycle_status:
              type: string
              const: PRESERVED
            status:
              enum: [SELECTED, ANSWERED]
            answer_id:
              type: string

    QuestionCluster:
      type: object
      additionalProperties: false
      required:
        - id
        - session_id
        - generation
        - revision
        - ordinal
        - representative_question
        - member_count
        - members_url
        - is_final
        - finalized_at
        - created_by_job_id
        - created_by_job_attempt
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
          description: |
            공개 logical Cluster ID. LIVE generation 사이 같은 semantic Cluster는 유지하고
            새 LIVE Cluster와 FINAL full rebuild Cluster에는 새 ID를 할당한다.
        session_id:
          $ref: "#/components/schemas/ResourceId"
        generation:
          type: integer
          minimum: 1
        revision:
          type: integer
          minimum: 1
          description: 선택한 current/final generation을 가리키는 Session current_revision projection; 모든 성공 generation commit과 membership 직접 변경에서 증가
        ordinal:
          type: integer
          minimum: 0
          description: 같은 generation의 안정적인 정렬 키
        representative_question:
          $ref: "#/components/schemas/ActiveAIRepresentativeQuestion"
        member_count:
          type: integer
          minimum: 0
        members_url:
          type: string
          format: uri-reference
          description: session_id와 logical Cluster ID를 포함하고 cursor·배열 위치에 의존하지 않는 child 목록 경로
        is_final:
          type: boolean
        finalized_at:
          type: [string, "null"]
          format: date-time
        created_by_job_id:
          $ref: "#/components/schemas/ResourceId"
        created_by_job_attempt:
          type: integer
          minimum: 1
      oneOf:
        - properties:
            is_final:
              const: false
            finalized_at:
              type: "null"
        - properties:
            is_final:
              const: true
            finalized_at:
              type: string
              format: date-time

    FinalQuestionCluster:
      description: |
        PROCESSING 후 원자 확정된 FINAL generation의 Cluster. FINAL 성공은
        eligible input 각각이 정확히 한 membership에 들어감을 보장한다.
        분류 불가 input은 하나의 안정적인 `기타` Cluster에 들어가며 그
        Cluster의 representative_question.content는 정확히 `기타`다.
      allOf:
        - $ref: "#/components/schemas/QuestionCluster"
        - type: object
          properties:
            is_final:
              type: boolean
              const: true
            finalized_at:
              type: string
              format: date-time

    QuestionClusteringJobRef:
      type: object
      additionalProperties: false
      required: [id, attempt, status, mode]
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        attempt:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/AIJobStatus"
        mode:
          $ref: "#/components/schemas/QuestionClusteringMode"

    QuestionClusteringState:
      type: object
      additionalProperties: false
      required:
        - pending
        - requested_through_sequence
        - applied_through_sequence
        - current_revision
        - current_generation
        - final_generation
        - active_job_id
        - retry_job_id
        - last_job
      properties:
        pending:
          type: boolean
          description: requested_through_sequence가 applied_through_sequence보다 큰지 여부
        requested_through_sequence:
          type: integer
          minimum: 0
        applied_through_sequence:
          type: integer
          minimum: 0
        current_revision:
          type: integer
          minimum: 0
        current_generation:
          type: [integer, "null"]
          minimum: 1
        final_generation:
          type: [integer, "null"]
          minimum: 1
        active_job_id:
          type: [string, "null"]
          description: |
            Session의 유일한 PENDING·RUNNING QUESTION_CLUSTERING Job. retry requeue 시
            retry_job_id를 먼저 비우고 같은 Job ID가 이 필드로 전환된다.
        retry_job_id:
          type: [string, "null"]
          description: |
            requested>applied backlog을 소유하고 같은 행의 attempt+1 재시도를
            기다리는 retryable FAILED LIVE Job. active_job_id와 동시에 non-null일 수 없고
            있는 동안 fresh LIVE Job을 만들지 않는다.
        last_job:
          oneOf:
            - $ref: "#/components/schemas/QuestionClusteringJobRef"
            - type: "null"
      not:
        properties:
          active_job_id:
            type: string
          retry_job_id:
            type: string
        required: [active_job_id, retry_job_id]

    QuestionClusterListResponse:
      type: object
      additionalProperties: false
      description: |
        scope=FINAL이면 eligible 학생 질문과 Answer cutoff에 포함된
        AI 대표질문의 set과 전체 items의 membership set이 일치한다.
        각 input은 정확히 한 번 등장하고 분류 불가 input은 하나의 `기타`
        Cluster에 배치된다. 누락·중복·복수 `기타` Cluster는 성공 계약 위반이다.
      x-final-membership-invariants:
        eligible_input_cardinality: exactly-once
        unclassifiable_input_target: single stable 기타 Cluster
        fallback_representative_content: 기타
        success_requires_set_equality: true
      required: [scope, clustering_state, generation, items, next_cursor]
      properties:
        scope:
          $ref: "#/components/schemas/QuestionClusterScope"
        clustering_state:
          $ref: "#/components/schemas/QuestionClusteringState"
        generation:
          type: [integer, "null"]
          minimum: 1
        items:
          type: array
          description: ordinal ASC, id ASC
          items:
            $ref: "#/components/schemas/QuestionCluster"
        next_cursor:
          type: [string, "null"]
      allOf:
        - if:
            properties:
              scope:
                const: FINAL
            required: [scope]
          then:
            properties:
              items:
                type: array
                items:
                  $ref: "#/components/schemas/FinalQuestionCluster"
        - if:
            properties:
              generation:
                type: "null"
            required: [generation]
          then:
            properties:
              items:
                maxItems: 0

    QuestionClusterStudentMember:
      type: object
      additionalProperties: false
      required: [source_kind, ordinal, question]
      properties:
        source_kind:
          type: string
          const: STUDENT_QUESTION
        ordinal:
          type: integer
          minimum: 0
        question:
          $ref: "#/components/schemas/Question"

    QuestionClusterRepresentativeMember:
      type: object
      additionalProperties: false
      required: [source_kind, ordinal, representative_question]
      properties:
        source_kind:
          type: string
          const: AI_REPRESENTATIVE
        ordinal:
          type: integer
          minimum: 0
        representative_question:
          $ref: "#/components/schemas/PreservedAIRepresentativeQuestion"

    QuestionClusterMember:
      oneOf:
        - $ref: "#/components/schemas/QuestionClusterStudentMember"
        - $ref: "#/components/schemas/QuestionClusterRepresentativeMember"
      discriminator:
        propertyName: source_kind
        mapping:
          STUDENT_QUESTION: "#/components/schemas/QuestionClusterStudentMember"
          AI_REPRESENTATIVE: "#/components/schemas/QuestionClusterRepresentativeMember"

    QuestionClusterMemberListResponse:
      type: object
      additionalProperties: false
      required: [cluster_id, items, next_cursor]
      properties:
        cluster_id:
          $ref: "#/components/schemas/ResourceId"
        items:
          type: array
          description: generation 안에서 유일한 ordinal ASC. ordinal은 DB membership position projection
          items:
            $ref: "#/components/schemas/QuestionClusterMember"
        next_cursor:
          type: [string, "null"]

    Question:
      type: object
      additionalProperties: false
      description: 작성자 식별 필드를 의도적으로 포함하지 않는 공개 익명 질문 표현
      required:
        - id
        - session_id
        - content
        - status
        - version
        - clustering_sequence
        - reaction_count
        - reacted_by_me
        - cluster_id
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        content:
          type: string
          minLength: 1
          maxLength: 300
        status:
          $ref: "#/components/schemas/QuestionStatus"
        version:
          type: integer
          minimum: 1
        clustering_sequence:
          type: integer
          minimum: 1
          description: Session에서 질문 commit 순서로 할당하는 clustering watermark
        reaction_count:
          type: integer
          minimum: 0
        reacted_by_me:
          type: boolean
          description: 현재 인증 사용자의 반응 여부
        cluster_id:
          type: [string, "null"]
          description: 현재 generation의 공개 logical Cluster ID. 아직 적용되지 않았으면 null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    QuestionCreateRequest:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        content:
          type: string
          description: |
            서버가 앞뒤 공백 제거, Unicode NFC 정규화를 순서대로 적용한 결과를
            Unicode code point 기준 1~300자로 검증한다. 정규화 결과를
            저장하고, 비었거나 최대를 넘으면 자르지 않고 422 VALIDATION_ERROR의
            안정적 details를 반환한다.
          x-normalization:
            steps: [trim-surrounding-whitespace, unicode-nfc]
            order: before-length-validation
            length_unit: Unicode code points
            normalized_min_code_points: 1
            normalized_max_code_points: 300
            truncation: forbidden
            invalid_response: 422 VALIDATION_ERROR

    QuestionCreateResponse:
      type: object
      additionalProperties: false
      required: [question, clustering_state]
      properties:
        question:
          $ref: "#/components/schemas/Question"
        clustering_state:
          $ref: "#/components/schemas/QuestionClusteringState"
          description: active Job을 새로 만들지 않은 경우도 반환하는 Session clustering 원장

    QuestionListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        next_cursor:
          type: [string, "null"]

    QuestionDraftRequest:
      type: object
      additionalProperties: false
      required: [draft]
      properties:
        draft:
          type: string
          description: |
            앞뒤 공백 제거·Unicode NFC 정규화 후 1~500 Unicode code point를
            검증한다. 정규화 결과만 모델에 전달하고 영구 저장하지 않는다.
            빈 결과·초과는 자르지 않고 422 VALIDATION_ERROR의 안정적 details를 반환한다.
          x-normalization:
            steps: [trim-surrounding-whitespace, unicode-nfc]
            order: before-length-validation
            length_unit: Unicode code points
            normalized_min_code_points: 1
            normalized_max_code_points: 500
            truncation: forbidden
            invalid_response: 422 VALIDATION_ERROR

    QuestionDraftResponse:
      type: object
      additionalProperties: false
      required: [suggestions]
      properties:
        suggestions:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 300

    QuestionReactionState:
      type: object
      additionalProperties: false
      required: [question_id, reaction_count, reacted_by_me]
      properties:
        question_id:
          $ref: "#/components/schemas/ResourceId"
        reaction_count:
          type: integer
          minimum: 0
        reacted_by_me:
          type: boolean

    AnswerTargetStudentQuestion:
      type: object
      additionalProperties: false
      required: [type, question_id]
      properties:
        type:
          type: string
          const: STUDENT_QUESTION
        question_id:
          $ref: "#/components/schemas/ResourceId"

    AnswerTargetRepresentativeQuestion:
      type: object
      additionalProperties: false
      required: [type, representative_question_id]
      properties:
        type:
          type: string
          const: AI_REPRESENTATIVE_QUESTION
        representative_question_id:
          $ref: "#/components/schemas/ResourceId"

    AnswerTarget:
      oneOf:
        - $ref: "#/components/schemas/AnswerTargetStudentQuestion"
        - $ref: "#/components/schemas/AnswerTargetRepresentativeQuestion"
      discriminator:
        propertyName: type
        mapping:
          STUDENT_QUESTION: "#/components/schemas/AnswerTargetStudentQuestion"
          AI_REPRESENTATIVE_QUESTION: "#/components/schemas/AnswerTargetRepresentativeQuestion"

    VoiceAnswerCreateRequest:
      type: object
      additionalProperties: false
      required: [answer_type, target]
      properties:
        answer_type:
          type: string
          const: VOICE
        target:
          $ref: "#/components/schemas/AnswerTarget"

    TextAnswerCreateRequest:
      type: object
      additionalProperties: false
      required: [answer_type, target, text_content]
      properties:
        answer_type:
          type: string
          const: TEXT
        target:
          $ref: "#/components/schemas/AnswerTargetStudentQuestion"
          description: |
            COMPLETED Session의 미답변 status=OPEN 학생 질문만 허용한다.
            AI 대표질문은 새 text-only Answer target이 아니다.
        text_content:
          type: string
          minLength: 1
          description: 정확한 최대 길이는 TBD이며 서버는 빈 값을 새 Answer로 저장하지 않음

    AnswerCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/VoiceAnswerCreateRequest"
        - $ref: "#/components/schemas/TextAnswerCreateRequest"
      discriminator:
        propertyName: answer_type
        mapping:
          VOICE: "#/components/schemas/VoiceAnswerCreateRequest"
          TEXT: "#/components/schemas/TextAnswerCreateRequest"

    AnswerTextUpdateRequest:
      type: object
      additionalProperties: false
      required: [text_content]
      properties:
        text_content:
          type: string
          description: |
            텍스트 최대 길이와 빈 문자열·삭제 정책은 TBD이므로
            이 PATCH schema는 길이 제약을 선결정하지 않는다.
          x-empty-string-policy: TBD

    AnswerCompleteRequest:
      type: object
      additionalProperties: false
      required: [transcript_version_id, start_sequence, end_sequence]
      properties:
        transcript_version_id:
          $ref: "#/components/schemas/ResourceId"
          description: Answer가 캡처를 시작한 source TranscriptVersion과 같아야 함
        start_sequence:
          type: integer
          minimum: 1
        end_sequence:
          type: integer
          minimum: 1
          description: start_sequence 이상이며 같은 source TranscriptVersion과 Session에 속해야 함

    AnswerTranscriptCanonicalMapping:
      type: object
      additionalProperties: false
      description: |
        RECORDING_TRANSCRIPTION canonical commit 후 SESSION_POSTPROCESSING이 Answer의 원본
        LIVE Transcript 범위를 현재 canonical final Segment에 재매핑한 공개 상태.
        실패해도 HQ Transcript·canonical을 rollback하지 않고 원본 Answer 범위를 유지한다.
        일부만 대응하거나 대응하지 못한 이유를 별도 enum으로 세분하는 계약은 TBD이다.
      required:
        - target_transcript_version_id
        - status
        - start_segment_id
        - end_segment_id
        - updated_at
      properties:
        target_transcript_version_id:
          $ref: "#/components/schemas/ResourceId"
        status:
          $ref: "#/components/schemas/AnswerTranscriptRemapStatus"
        start_segment_id:
          type: [string, "null"]
          description: 전체 범위가 성공적으로 매핑됐을 때의 canonical 첫 Segment ID
        end_segment_id:
          type: [string, "null"]
          description: 전체 범위가 성공적으로 매핑됐을 때의 canonical 마지막 Segment ID
        updated_at:
          type: string
          format: date-time
      oneOf:
        - title: 재매핑 대기 또는 실패
          properties:
            status:
              enum: [PENDING, FAILED]
            start_segment_id:
              type: "null"
            end_segment_id:
              type: "null"
        - title: 재매핑 성공
          properties:
            status:
              const: SUCCEEDED
            start_segment_id:
              type: string
            end_segment_id:
              type: string

    AnswerOrganization:
      type: object
      additionalProperties: false
      description: 교수자 text_content와 분리된 immutable AI 음성 답변 정리 결과
      required:
        - content
        - source_transcript_version_id
        - start_sequence
        - end_sequence
        - created_by_job_id
        - created_by_job_attempt
        - model_name
        - prompt_version
        - created_at
      properties:
        content:
          type: string
          minLength: 1
          description: 정리문 형식과 최대 길이는 TBD
        source_transcript_version_id:
          $ref: "#/components/schemas/ResourceId"
        start_sequence:
          type: integer
          minimum: 1
        end_sequence:
          type: integer
          minimum: 1
          description: start_sequence 이상인 실제 AI 입력 범위의 마지막 sequence
        created_by_job_id:
          $ref: "#/components/schemas/ResourceId"
        created_by_job_attempt:
          type: integer
          minimum: 1
        model_name:
