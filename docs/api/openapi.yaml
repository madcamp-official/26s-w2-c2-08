  /api/v1/sessions/{session_id}/transcript:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Transcript]
      operationId: listFinalTranscriptSegments
      summary: final Transcript 조회
      description: |
        DB에 영구 저장된 final 구간만 sequence 오름차순으로 반환한다.
        partial 결과는 포함하지 않으며 WebSocket 재연결 후 누락 데이터 복구에 사용한다.
      parameters:
        - name: after_sequence
          in: query
          required: false
          description: 이 값보다 큰 Transcript sequence만 반환
          schema:
            type: integer
            minimum: 0
        - name: limit
          in: query
          required: false
          description: 반환할 최대 구간 수
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: final Transcript 구간 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptSegmentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/questions:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: listSessionQuestions
      summary: 익명 질문 목록 조회
      description: |
        Course 멤버만 조회할 수 있다. 응답과 실시간 이벤트에는 질문 작성자의
        계정 ID, 이름 또는 이메일을 포함하지 않는다.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QuestionStatus"
        - name: sort
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QuestionSort"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 익명 질문 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Questions]
      operationId: createAnonymousQuestion
      summary: 익명 질문 생성
      description: |
        해당 Course의 STUDENT가 LIVE Session에서만 요청할 수 있다. 질문은 즉시 저장하고
        클러스터링은 비동기로 실행하므로 클러스터링 실패가 질문 생성을 롤백하지 않는다.
        응답에는 저장된 Question과 공용 QUESTION_CLUSTERING Job을 함께 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionCreateRequest"
            example:
              content: 다익스트라에서 음수 가중치를 쓸 수 없는 이유가 궁금합니다.
      responses:
        "201":
          description: 생성된 익명 질문
          headers:
            Location:
              description: 생성된 Question의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionCreateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/sessions/{session_id}/question-drafts:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Questions]
      operationId: suggestQuestionDrafts
      summary: AI 질문 문장 후보 생성
      description: |
        해당 Course의 STUDENT가 LIVE Session에서 사용한다. 현재 Session 문맥을 이용해
        짧은 후보를 반환하지만 실제 질문을 저장하거나 공개하지 않는다. 초안과 제안은
        기본적으로 영구 저장하지 않는 방향이며 보관 정책은 구현 전 확정해야 한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionDraftRequest"
            example:
              draft: 음수 가중치 왜 안돼요?
      responses:
        "200":
          description: 질문 문장 후보
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/questions/{question_id}:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: getQuestion
      summary: 익명 질문 단건 조회
      description: |
        Session의 Course 멤버만 조회한다. 목록·이벤트와 동일하게 작성자 식별 정보는
        반환하지 않으며 현재 사용자의 반응 여부만 개인화한다.
      responses:
        "200":
          description: 익명 Question
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/questions/{question_id}/reaction:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
      - $ref: "#/components/parameters/RequestId"
    put:
      tags: [Questions]
      operationId: addQuestionReaction
      summary: ‘나도 궁금해요’ 반응 추가
      description: |
        해당 Course의 STUDENT가 LIVE Session에서만 실행할 수 있다. 같은 사용자의
        반복 호출은 반응 한 개 상태를 유지하며 최신 집계를 반환한다. 자신이 작성한
        질문에는 반응할 수 없고 작성자 식별은 서버 내부에서만 사용한다.
      responses:
        "200":
          description: 최신 반응 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionReactionState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Questions]
      operationId: removeQuestionReaction
      summary: ‘나도 궁금해요’ 반응 취소
      description: 기존 반응이 없어도 성공하는 멱등 요청이다.
      responses:
        "204":
          description: 반응 없음 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/answers:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Answers]
      operationId: listSessionAnswers
      summary: 교수자 답변 목록 조회
      description: |
        Course 멤버가 저장된 Answer를 조회한다. LIVE 재연결 시 질문 상태와 답변 구간을
        REST로 복구하는 기준이며 `started_at ASC, id ASC`로 안정적으로 정렬한다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Answer 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Answers]
      operationId: startAnswerCapture
      summary: 교수자 답변 캡처 시작
      description: |
        해당 Course의 PROFESSOR가 LIVE Session에서 질문 또는 질문 클러스터를 선택한다.
        클러스터 선택 시 선택 시점의 미답변 질문 목록을 스냅샷으로 고정하고 질문을
        SELECTED로 변경한다. Answer 상태 설계는 구현 전 검토가 필요한 초안이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerCreateRequest"
            examples:
              questions:
                summary: 질문 직접 선택
                value:
                  target:
                    type: QUESTIONS
                    question_ids: [question_01HXYZ]
              cluster:
                summary: 클러스터 선택
                value:
                  target:
                    type: CLUSTER
                    cluster_id: cluster_01HXYZ
      responses:
        "201":
          description: CAPTURING 상태의 Answer
          headers:
            Location:
              description: 생성된 Answer의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/answers/{answer_id}/complete:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Answers]
      operationId: completeAnswerCapture
      summary: 교수자 답변 완료
      description: |
        해당 Course의 PROFESSOR만 실행할 수 있다. 답변 시작 이후의 final Transcript
        범위를 확정하고 Answer를 COMPLETED, 연결 질문을 ANSWERED로 변경한다.
        본문을 생략하면 서버의 자동 후보를 사용하고, 본문을 보내면 같은 Session의
        sequence 범위인지 검증한다. 반복 호출은 기존 완료 결과를 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        description: 자동 후보 범위를 조정할 때만 전달
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerCompleteRequest"
            example:
              start_sequence: 110
              end_sequence: 128
      responses:
        "200":
          description: 완료된 Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/answers/{answer_id}:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Answers]
      operationId: getAnswer
      summary: 교수자 답변 단건 조회
      description: Answer가 속한 Session의 Course 멤버만 조회한다.
      responses:
        "200":
          description: Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/answers/{answer_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Answers]
      operationId: cancelAnswerCapture
      summary: 교수자 답변 취소
      description: |
        CAPTURING Answer를 CANCELLED로 변경하고 연결 질문을 OPEN으로 복귀시키는
        복구용 초안이다. 반복 호출은 기존 취소 결과를 반환한다.
      responses:
        "200":
          description: 취소된 Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/summaries:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Summaries]
      operationId: listSessionSummaries
      summary: 저장된 요약 목록 조회
      description: |
        Course 멤버만 조회할 수 있다. 저장된 LIVE 요약은 요청자에게만, FINAL 요약은
        Course 멤버에게 공개한다. 성공한 LIVE 요약도 반드시 저장한 뒤 Job을 SUCCEEDED로
        변경하므로 연결이 끊겨도 Job result URL로 복구할 수 있다.
      parameters:
        - name: summary_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SummaryType"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 요약 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Summaries]
      operationId: requestSessionSummary
      summary: AI 요약 요청
      description: |
        LIVE Session에서 요청 시점까지 또는 선택한 final Transcript 범위와 같은 Session의
        PDF만 사용한다. UI는 학생 중심이지만 교수자의 LIVE 요약 권한은 아직 미정이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummaryCreateRequest"
            example:
              summary_type: LIVE
              range:
                start_sequence: null
                end_sequence: 128
      responses:
        "202":
          description: 요약 작업 수락
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/summaries/{summary_id}:
    parameters:
      - $ref: "#/components/parameters/SummaryId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Summaries]
      operationId: getSummary
      summary: 저장된 요약 단건 조회
      description: |
        FINAL 요약은 Course 멤버가 조회할 수 있다. 저장된 LIVE 요약은 요청자만 조회한다.
        권한이 없는 사용자에게는 리소스 존재를 공개하지 않는다.
      responses:
        "200":
          description: LectureSummary
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/chats:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: listMySessionChats
      summary: 내 AI 대화 목록 조회
      description: 현재 사용자가 이 Session에서 생성한 개인 대화만 반환한다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 개인 대화 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chats]
      operationId: createSessionChat
      summary: AI 대화 생성
      description: |
        LIVE는 진행 중 class, REVIEW는 정리 중·완료 class에서 사용한다. 대화는 생성한
        사용자에게만 노출하는 초안이며 교수자의 LIVE 사용 범위는 미정이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCreateRequest"
            example:
              mode: LIVE
      responses:
        "201":
          description: 생성된 개인 대화
          headers:
            Location:
              description: 생성된 Chat의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/chats/{chat_id}:
    parameters:
      - $ref: "#/components/parameters/ChatId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: getChat
      summary: 내 AI 대화 단건 조회
      description: Chat 소유자이면서 현재도 Session의 Course 멤버인 사용자만 조회한다.
      responses:
        "200":
          description: Chat
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/chats/{chat_id}/messages:
    parameters:
      - $ref: "#/components/parameters/ChatId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: listChatMessages
      summary: AI 대화 메시지 목록 조회
      description: 대화 소유자만 sequence 오름차순으로 조회할 수 있다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: 메시지 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chats]
      operationId: createChatMessage
      summary: 사용자 메시지 전송과 AI 답변 요청
      description: |
        대화 소유자만 요청할 수 있다. 서버가 URL로 확정된 Session의 PDF, final Transcript와
        Q&A만 검색한다. 사용자 메시지를 먼저 저장하고 AI 답변 작업을 비동기로 생성한다.
        같은 Chat에 RUNNING/PENDING 답변 Job이 있으면 409 CHAT_RESPONSE_IN_PROGRESS를 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageCreateRequest"
            example:
              content: 음수 가중치가 있을 때는 어떤 알고리즘을 써야 해?
      responses:
        "202":
          description: 사용자 메시지가 저장되고 AI 답변 작업이 수락됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatTurnAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/jobs/{job_id}:
    parameters:
      - $ref: "#/components/parameters/JobId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Jobs]
      operationId: getAIJob
      summary: AI 작업 상태 조회
      description: |
        개인 작업은 요청자, 공유 작업은 권한 있는 Course 멤버만 조회한다. 내부 스택,
        프롬프트 원문 또는 외부 모델 응답 원문은 오류에 포함하지 않는다.
      responses:
        "200":
          description: AI 작업 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/retry:
    parameters:
      - $ref: "#/components/parameters/JobId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Jobs]
      operationId: retryAIJob
      summary: 실패한 AI 작업 재시도
      description: |
        FAILED 작업만 재시도할 수 있다. 개인 작업은 요청자, 공유 후처리 작업은 해당
        Course의 PROFESSOR가 실행한다. 새 Job을 생성할지 기존 attempt를 올릴지는 미정이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: 재시도 작업 수락
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/sessions/{session_id}/jobs:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Jobs]
      operationId: listSessionSharedJobs
      summary: Session 공용 AI 작업 목록 조회
      description: |
        Course 멤버가 자료 처리, 질문 클러스터링과 Session 후처리처럼 참여자가 알아야 할
        공용 Job만 조회한다. 개인 LIVE 요약, 질문 초안과 Chat Job은 절대 포함하지 않는다.
        재시도는 별도 Job API의 권한 규칙을 따른다.
      parameters:
        - name: job_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedAIJobType"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AIJobStatus"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Session 공용 AIJob 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/record:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Records]
      operationId: getSessionRecord
      summary: 수업 기록 통합 조회
      description: |
        PROCESSING 또는 COMPLETED Session에서 저장된 강의자료, final Transcript,
        최종 요약, 익명 질문·답변과 Job 상태를 반환한다. 일부 AI 작업이 실패해도
        이미 저장된 핵심 데이터는 조회 가능해야 한다. 응답이 커지면 세부 목록 API로
        분리하고 이 응답은 가용성 요약으로 축소할 수 있다.
      responses:
        "200":
          description: 통합 수업 기록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

components:
  securitySchemes:
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: goal_session
      description: |
        Google OAuth/OIDC authorization code 흐름 완료 후 서버가 발급하는 세션 Cookie다.
        HttpOnly, Secure, SameSite=Lax를 사용하고 기본 만료는 7일이다. 클라이언트
        JavaScript는 Cookie 값을 읽거나 저장하지 않는다.

  headers:
    RequestId:
      description: 요청 추적용 식별자. 요청의 `X-Request-ID`를 수용하거나 서버가 생성한다.
      schema:
        type: string
        example: req_01HXYZ
    RetryAfter:
      description: 다시 요청하기 전 대기 시간(초)
      schema:
        type: integer
        minimum: 0

  parameters:
    CourseId:
      name: course_id
      in: path
      required: true
      description: 불투명 Course ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    SessionId:
      name: session_id
      in: path
      required: true
      description: 불투명 LectureSession ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    MaterialId:
      name: material_id
      in: path
      required: true
      description: 불투명 LectureMaterial ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    QuestionId:
      name: question_id
      in: path
      required: true
      description: 불투명 Question ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    AnswerId:
      name: answer_id
      in: path
      required: true
      description: 불투명 Answer ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    SummaryId:
      name: summary_id
      in: path
      required: true
      description: 불투명 LectureSummary ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    ChatId:
      name: chat_id
      in: path
      required: true
      description: 불투명 Chat ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    JobId:
      name: job_id
      in: path
      required: true
      description: 불투명 AIJob ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    Cursor:
      name: cursor
      in: query
      required: false
      description: 직전 응답에서 받은 불투명 페이지 커서
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: 반환할 최대 항목 수
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        중복 제출을 방지하는 클라이언트 생성 키. 같은 사용자·경로·키와 같은 본문은
        기존 결과를 반환하고, 같은 키에 다른 본문을 사용하면 409를 반환한다.
      schema:
        type: string
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      description: 클라이언트가 선택적으로 지정하는 요청 추적 ID
      schema:
        type: string

  responses:
    BadRequest:
      description: 요청 형식 또는 커서가 유효하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidCursor:
              value:
                error:
                  code: INVALID_CURSOR
                  message: 유효하지 않은 페이지 커서입니다.
                  request_id: req_01HXYZ
                  details: null
    Unauthorized:
      description: 인증 정보가 없거나 유효하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: AUTHENTICATION_REQUIRED
              message: 로그인이 필요합니다.
              request_id: req_01HXYZ
              details: null
    Forbidden:
      description: Course 멤버십 또는 Course별 역할 권한이 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: COURSE_ACCESS_DENIED
              message: 이 Course에 접근할 권한이 없습니다.
              request_id: req_01HXYZ
              details: null
    NotFound:
      description: 리소스가 없거나 존재를 공개하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: 요청한 리소스를 찾을 수 없습니다.
              request_id: req_01HXYZ
              details: null
    Conflict:
      description: 상태 전이, 멤버십 또는 멱등성 충돌
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: 현재 class 상태에서는 요청을 수행할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: READY
                    required_status: LIVE
            idempotencyKey:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    PayloadTooLarge:
      description: 업로드 파일이 서버 설정의 크기 제한을 초과함
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FILE_TOO_LARGE
              message: 업로드 가능한 파일 크기를 초과했습니다.
              request_id: req_01HXYZ
              details:
                max_bytes: 52428800
    UnsupportedMediaType:
      description: 지원하지 않는 파일 또는 Content-Type
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: PDF_REQUIRED
              message: PDF 파일만 업로드할 수 있습니다.
              request_id: req_01HXYZ
              details: null
    ValidationFailed:
      description: 요청 필드의 의미 또는 값이 유효하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: 요청 값을 확인해 주세요.
              request_id: req_01HXYZ
              details:
                field_violations:
                  - field: content
                    reason: 빈 문자열일 수 없습니다.
    RateLimited:
      description: 요청 한도를 초과함
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RATE_LIMITED
              message: 잠시 후 다시 시도해 주세요.
              request_id: req_01HXYZ
              details: null
    InternalServerError:
      description: 예상하지 못한 서버 오류
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_ERROR
              message: 요청을 처리하지 못했습니다.
              request_id: req_01HXYZ
              details: null
    ServiceUnavailable:
      description: 데이터베이스 또는 AI 의존 서비스를 사용할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: DEPENDENCY_UNAVAILABLE
              message: 일시적으로 서비스를 사용할 수 없습니다.
              request_id: req_01HXYZ
              details: null

  schemas:
    ResourceId:
      type: string
      minLength: 1
      description: 형식을 클라이언트가 해석하지 않는 불투명 리소스 ID
      examples: [resource_01HXYZ]

    CourseRole:
      type: string
      enum: [PROFESSOR, STUDENT]
      description: 전역 역할이 아닌 특정 Course 안에서의 사용자 역할

    CourseRoleFilter:
      type: string
      enum: [ALL, PROFESSOR, STUDENT]
      default: ALL

    LectureSessionStatus:
      type: string
      enum: [READY, LIVE, PROCESSING, COMPLETED]
      description: |
