        prompt_version:
          type: [string, "null"]
          description: 내부 prompt 원문이 아닌 버전 식별자이며 미정 정책에 따라 null일 수 있음
        created_at:
          type: string
          format: date-time

    AnswerOrganizationState:
      type: object
      additionalProperties: false
      required: [status, job_id, attempt, retryable, organization]
      properties:
        status:
          $ref: "#/components/schemas/AnswerOrganizationStatus"
        job_id:
          type: [string, "null"]
        attempt:
          type: [integer, "null"]
          minimum: 1
        retryable:
          type: boolean
        organization:
          oneOf:
            - $ref: "#/components/schemas/AnswerOrganization"
            - type: "null"
      oneOf:
        - title: Job 생성 전 또는 적용 대상 아님
          properties:
            status:
              enum: [NOT_APPLICABLE, NOT_STARTED, WAITING_SOURCE]
            job_id:
              type: "null"
            attempt:
              type: "null"
            retryable:
              const: false
            organization:
              type: "null"
        - title: AI 정리 실행 중
          properties:
            status:
              enum: [PENDING, RUNNING]
            job_id:
              type: string
            attempt:
              type: integer
              minimum: 1
            retryable:
              const: false
            organization:
              type: "null"
        - title: AI 정리 실패
          properties:
            status:
              const: FAILED
            job_id:
              type: string
            attempt:
              type: integer
              minimum: 1
            organization:
              type: "null"
        - title: AI 정리 성공
          properties:
            status:
              const: SUCCEEDED
            job_id:
              type: string
            attempt:
              type: integer
              minimum: 1
            retryable:
              const: false
            organization:
              $ref: "#/components/schemas/AnswerOrganization"
        - title: AI 정리 원장 무결성 오류
          properties:
            status:
              const: DATA_INTEGRITY_ERROR
            retryable:
              const: false
            organization:
              type: "null"
          oneOf:
            - title: 필수 Job 누락
              properties:
                job_id:
                  type: "null"
                attempt:
                  type: "null"
            - title: Job은 있으나 상태 또는 결과 원장 모순
              properties:
                job_id:
                  type: string
                attempt:
                  type: integer
                  minimum: 1

    Answer:
      type: object
      additionalProperties: false
      description: |
        target은 STUDENT_QUESTION과 AI_REPRESENTATIVE_QUESTION 중 정확히 하나다.
        VOICE/CAPTURING은 source TranscriptVersion과 capture watermark를 갖고 범위는
        완료 전까지 null이다. VOICE/COMPLETED는 원본 범위를 갖는다.
        TEXT는 즉시 COMPLETED이고 Transcript·mapping·capture 필드가 null이다.
      required:
        - id
        - session_id
        - answer_type
        - status
        - version
        - target
        - target_text_snapshot
        - text_content
        - source_transcript_version_id
        - canonical_transcript_mapping
        - organization_state
        - capture_started_after_sequence
        - start_sequence
        - end_sequence
        - started_at
        - completed_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        answer_type:
          $ref: "#/components/schemas/AnswerType"
        status:
          $ref: "#/components/schemas/AnswerStatus"
        version:
          type: integer
          minimum: 1
        target:
          $ref: "#/components/schemas/AnswerTarget"
        target_text_snapshot:
          type: string
          minLength: 1
          maxLength: 300
          description: |
            Answer 선택 시점의 학생 질문 또는 AI 대표질문 exact text.
            대표질문이 교체되어도 변경하지 않는다.
        text_content:
          type: [string, "null"]
          description: |
            교수자가 작성한 TEXT Answer 본문 또는 COMPLETED 음성 Answer의 추가 설명.
            AI 정리 결과는 organization_state.organization에 별도로 저장한다.
        source_transcript_version_id:
          type: [string, "null"]
          description: VOICE Answer 캡처와 원본 범위가 속한 LIVE TranscriptVersion; TEXT는 null
        canonical_transcript_mapping:
          oneOf:
            - $ref: "#/components/schemas/AnswerTranscriptCanonicalMapping"
            - type: "null"
          description: |
            TEXT Answer에서는 not applicable로 null. VOICE는 canonical 전환 전에
            null이고 전환 후 SESSION_POSTPROCESSING이 PENDING을 SUCCEEDED 또는
            FAILED로 완료한다. VOICE의 null 상태를 추가 enum으로 나눌지는 TBD이다.
        organization_state:
          $ref: "#/components/schemas/AnswerOrganizationState"
          description: 교수자 text_content와 독립적인 AI 음성 답변 정리 상태·결과
        capture_started_after_sequence:
          type: [integer, "null"]
          minimum: 0
          description: VOICE 선택 시점의 마지막 final sequence. 없으면 0, TEXT는 null
        start_sequence:
          type: [integer, "null"]
          minimum: 1
          description: source_transcript_version_id 안의 첫 final sequence. 아직 없으면 null
        end_sequence:
          type: [integer, "null"]
          minimum: 1
          description: source_transcript_version_id 안에서 답변 완료 시 확정된 마지막 final sequence
        started_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: string
          format: date-time
      oneOf:
        - title: LIVE 음성 캡처 중
          properties:
            answer_type:
              const: VOICE
            status:
              const: CAPTURING
            text_content:
              type: "null"
            source_transcript_version_id:
              $ref: "#/components/schemas/ResourceId"
            canonical_transcript_mapping:
              type: "null"
            organization_state:
              allOf:
                - $ref: "#/components/schemas/AnswerOrganizationState"
                - properties:
                    status:
                      enum: [NOT_STARTED, DATA_INTEGRITY_ERROR]
            capture_started_after_sequence:
              type: integer
              minimum: 0
            start_sequence:
              type: "null"
            end_sequence:
              type: "null"
            completed_at:
              type: "null"
        - title: 완료된 음성 Answer
          properties:
            answer_type:
              const: VOICE
            status:
              const: COMPLETED
            source_transcript_version_id:
              $ref: "#/components/schemas/ResourceId"
            capture_started_after_sequence:
              type: integer
              minimum: 0
            start_sequence:
              type: integer
              minimum: 1
            end_sequence:
              type: integer
              minimum: 1
            completed_at:
              type: string
              format: date-time
            organization_state:
              allOf:
                - $ref: "#/components/schemas/AnswerOrganizationState"
                - not:
                    properties:
                      status:
                        const: NOT_APPLICABLE
                    required: [status]
        - title: 완료된 텍스트 Answer
          properties:
            answer_type:
              const: TEXT
            status:
              const: COMPLETED
            text_content:
              type: string
              minLength: 1
            source_transcript_version_id:
              type: "null"
            canonical_transcript_mapping:
              type: "null"
            organization_state:
              allOf:
                - $ref: "#/components/schemas/AnswerOrganizationState"
                - properties:
                    status:
                      const: NOT_APPLICABLE
            capture_started_after_sequence:
              type: "null"
            start_sequence:
              type: "null"
            end_sequence:
              type: "null"
            completed_at:
              type: string
              format: date-time

    AnswerListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Answer"
        next_cursor:
          type: [string, "null"]

    SummaryRange:
      type: object
      additionalProperties: false
      required: [start_sequence, end_sequence]
      properties:
        start_sequence:
          type: [integer, "null"]
          minimum: 1
          description: null이면 서버가 현재까지 요약할 시작점을 결정
        end_sequence:
          type: [integer, "null"]
          minimum: 1
          description: null이면 요청 수락 시점의 마지막 final sequence를 고정

    SummaryCreateRequest:
      type: object
      additionalProperties: false
      required: [summary_type, range]
      properties:
        summary_type:
          type: string
          const: LIVE
          description: FINAL 요약은 Session 종료 후처리에서 서버가 생성
        range:
          oneOf:
            - $ref: "#/components/schemas/SummaryRange"
            - type: "null"
          description: LIVE 요약 범위. FINAL 요약은 서버 후처리 흐름에서 생성

    LectureSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - session_id
        - job_id
        - summary_type
        - visibility
        - content
        - source_transcript_version_id
        - source_start_sequence
        - source_end_sequence
        - model_name
        - prompt_version
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        job_id:
          $ref: "#/components/schemas/ResourceId"
          description: 이 요약을 생성한 AIJob
        summary_type:
          $ref: "#/components/schemas/SummaryType"
        visibility:
          $ref: "#/components/schemas/SummaryVisibility"
        content:
          type: string
        source_transcript_version_id:
          $ref: "#/components/schemas/ResourceId"
          description: |
            이 Summary가 사용한 영구 TranscriptVersion provenance. summary_type=FINAL이면
            source=RECORDING, status=FINALIZED이고 final Segment가 1건 이상인 version이다.
        source_start_sequence:
          type: [integer, "null"]
          minimum: 1
        source_end_sequence:
          type: [integer, "null"]
          minimum: 1
        model_name:
          type: [string, "null"]
          description: 모델 공개 정책에 따라 null일 수 있음
        prompt_version:
          type: [string, "null"]
          description: 내부 프롬프트 원문이 아닌 버전 식별자
        created_at:
          type: string
          format: date-time
      oneOf:
        - title: 요청자 전용 LIVE Summary
          properties:
            summary_type:
              const: LIVE
            visibility:
              const: REQUESTER_ONLY
        - title: Course 공용 FINAL Summary
          properties:
            summary_type:
              const: FINAL
            visibility:
              const: COURSE_MEMBERS

    NoFinalTranscriptSummaryReason:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          const: NO_FINAL_TRANSCRIPT
        message:
          type: string
          const: 요약할 강의 내용이 없습니다.

    SummarySourceUnavailableReason:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          const: SUMMARY_SOURCE_UNAVAILABLE
        message:
          type: string
          const: Transcript 처리 문제로 요약을 만들지 못했습니다.

    FinalSummaryPendingState:
      type: object
      additionalProperties: false
      required: [status, reason]
      properties:
        status:
          $ref: "#/components/schemas/FinalSummaryStatus"
          const: PENDING
        reason:
          type: "null"

    FinalSummaryAvailableState:
      type: object
      additionalProperties: false
      required: [status, reason]
      properties:
        status:
          $ref: "#/components/schemas/FinalSummaryStatus"
          const: AVAILABLE
        reason:
          type: "null"

    FinalSummaryNotApplicableState:
      type: object
      additionalProperties: false
      required: [status, reason]
      properties:
        status:
          $ref: "#/components/schemas/FinalSummaryStatus"
          const: NOT_APPLICABLE
        reason:
          $ref: "#/components/schemas/NoFinalTranscriptSummaryReason"

    FinalSummaryFailedState:
      type: object
      additionalProperties: false
      required: [status, reason]
      properties:
        status:
          $ref: "#/components/schemas/FinalSummaryStatus"
          const: FAILED
        reason:
          oneOf:
            - $ref: "#/components/schemas/SummarySourceUnavailableReason"
            - type: "null"

    FinalSummaryDataIntegrityErrorState:
      type: object
      additionalProperties: false
      required: [status, reason]
      properties:
        status:
          $ref: "#/components/schemas/FinalSummaryStatus"
          const: DATA_INTEGRITY_ERROR
        reason:
          type: "null"

    FinalSummaryState:
      description: |
        자동 FINAL_SUMMARY source gate는 canonical 상태가 아니라 최신 HQ RECORDING
        TranscriptVersion을 기준으로 한다. RECORDING/FINALIZED와 final Segment 1건 이상일
        때만 Job을 생성한다. RECORDING/EMPTY는 NOT_APPLICABLE/NO_FINAL_TRANSCRIPT,
        Recording source가 없으면 LIVE drain terminal 직후, RECORDING/FAILED나
        Recording은 있지만 10분 deadline까지 HQ 결과가 없으면 해당 시점에
        FAILED/SUMMARY_SOURCE_UNAVAILABLE이며 FINAL_SUMMARY Job을 생성하지 않는다.
        HQ source gate가 아직 terminal이 아닌 PROCESSING은 Job 없는 PENDING이
        정상이다. PROCESSING의 active Job은 attempt와 관계없이 PENDING·RUNNING이
        정상이며, COMPLETED에서는 명시적 Summary 재시도 attempt>1이 정상이다.
        또한 HQ retry 성공 후 SESSION_POSTPROCESSING attempt>1 복구가 active이면
        eligible source에 FINAL_SUMMARY Job이 아직 없거나 복구가 새로 생성한
        attempt=1 Job이 PENDING·RUNNING인 것도 정상 PENDING이다. 복구 coordinator가
        terminal이 된 뒤 eligible source에 Job이 없으면 DATA_INTEGRITY_ERROR다.
        복구와 무관한 COMPLETED 최초 attempt=1 active Job은 DATA_INTEGRITY_ERROR다. 반면
        RECORDING/FINALIZED와 final Segment 1건 이상으로 생성
        자격이 확정됐는데 FINAL_SUMMARY Job이 없거나, SUCCEEDED Job의 Summary
        결과가 없거나, 필수 원장이 불일치하면 DATA_INTEGRITY_ERROR/reason=null이다.
        유효한 RECORDING/FINALIZED source의 필수 FINAL_SUMMARY Job이 없으면 10분
        watchdog도 Job을 합성하지 않고 DATA_INTEGRITY_ERROR/reason=null을 유지한다.
        preserved LIVE canonical을 final source로 쓸지는 TBD이며 현재 자동 생성에서 제외한다.
      oneOf:
        - $ref: "#/components/schemas/FinalSummaryPendingState"
        - $ref: "#/components/schemas/FinalSummaryAvailableState"
        - $ref: "#/components/schemas/FinalSummaryNotApplicableState"
        - $ref: "#/components/schemas/FinalSummaryFailedState"
        - $ref: "#/components/schemas/FinalSummaryDataIntegrityErrorState"

    SummaryListStatus:
      type: string
      enum:
        [
          NOT_STARTED,
          PENDING,
          AVAILABLE,
          FAILED,
          NOT_APPLICABLE,
          DATA_INTEGRITY_ERROR,
        ]
      description: |
        NOT_STARTED는 summary_type=LIVE의 READY 또는 요청 전 LIVE 정상 무요약
        상태에만 사용한다. summary_type=FINAL은 FinalSummaryStatus 의미를
        그대로 사용하고 NOT_STARTED를 사용하지 않는다.

    SummaryListReason:
      oneOf:
        - $ref: "#/components/schemas/NoFinalTranscriptSummaryReason"
        - $ref: "#/components/schemas/SummarySourceUnavailableReason"
        - type: "null"
      description: |
        summary_status=NOT_APPLICABLE이면 NO_FINAL_TRANSCRIPT,
        source unavailable FAILED이면 SUMMARY_SOURCE_UNAVAILABLE이다.
        나머지 정상 조합과 Job 자체 실패는 null이다.

    SummaryListResponse:
      type: object
      additionalProperties: false
      description: |
        필수 summary_type query에 대한 목록과 aggregate 상태를 함께 반환한다.
        LIVE의 READY·요청 전 LIVE 무요약은 NOT_STARTED/null이다.
        FINAL은 /record.summary.state의 status·reason 조합을 그대로 projection한다.
      x-summary-type-invariants:
        LIVE:
          not_started: READY or LIVE Session with no requested or stored Summary maps to NOT_STARTED with null reason
        FINAL:
          status_domain:
            [PENDING, AVAILABLE, FAILED, NOT_APPLICABLE, DATA_INTEGRITY_ERROR]
          forbidden_status: NOT_STARTED
          projection_source: /record.summary.state
      required: [summary_status, summary_reason, items, next_cursor]
      properties:
        summary_status:
          $ref: "#/components/schemas/SummaryListStatus"
        summary_reason:
          $ref: "#/components/schemas/SummaryListReason"
        items:
          type: array
          items:
            $ref: "#/components/schemas/LectureSummary"
        next_cursor:
          type: [string, "null"]
      allOf:
        - if:
            properties:
              summary_status:
                const: NOT_STARTED
            required: [summary_status]
          then:
            properties:
              summary_reason:
                type: "null"
              items:
                maxItems: 0
        - if:
            properties:
              summary_status:
                const: NOT_APPLICABLE
            required: [summary_status]
          then:
            properties:
              summary_reason:
                $ref: "#/components/schemas/NoFinalTranscriptSummaryReason"
        - if:
            properties:
              summary_status:
                enum: [PENDING, AVAILABLE, DATA_INTEGRITY_ERROR]
            required: [summary_status]
          then:
            properties:
              summary_reason:
                type: "null"
        - if:
            properties:
              summary_status:
                const: FAILED
            required: [summary_status]
          then:
            properties:
              summary_reason:
                oneOf:
                  - $ref: "#/components/schemas/SummarySourceUnavailableReason"
                  - type: "null"

    ChatCreateRequest:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          $ref: "#/components/schemas/ChatMode"

    Chat:
      type: object
      additionalProperties: false
      required: [id, session_id, mode, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        mode:
          $ref: "#/components/schemas/ChatMode"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChatListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Chat"
        next_cursor:
          type: [string, "null"]

    ChatMessageCreateRequest:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        content:
          type: string
          description: |
            서버가 앞뒤 공백 제거, Unicode NFC 정규화를 순서대로 적용한 결과를 Unicode code point
            기준 1~2,000자로 검증한다. 범위 밖 입력은 잘라내지 않고
            422 VALIDATION_ERROR의 field·reason·max_length·actual_length를 반환한다.
            정규화 결과를 USER Message에 저장한다. 이 제한은 USER 입력에만 적용하고
            ASSISTANT Message content에는 적용하지 않는다.
          x-normalization:
            steps: [trim-surrounding-whitespace, unicode-nfc]
            order: before-length-validation
            length_unit: Unicode code points
            normalized_min_code_points: 1
            normalized_max_code_points: 2000
            truncation: forbidden
            invalid_response: 422 VALIDATION_ERROR

    ChatEvidenceSourceKind:
      type: string
      enum: [MATERIAL, TRANSCRIPT, QUESTION, ANSWER]
      description: |
        사용자에게 공개하는 정확한 네 유형. 내부 Transcript Segment·학생 질문·
        AI 대표질문 typed FK 구분을 공개 enum으로 노출하지 않고, 두 질문
        유형은 모두 QUESTION으로 projection한다. knowledge_chunk_id나 generic source ID도
        노출하지 않는다.

    ChatEvidenceBase:
      type: object
      additionalProperties: false
      required: [source_kind, label, link]
      properties:
        source_kind:
          $ref: "#/components/schemas/ChatEvidenceSourceKind"
        label:
          type: string
          minLength: 1
          description: |
            Evidence 생성 시점의 non-empty 안전 표시 snapshot. Material 표시명·페이지,
            Transcript 시간 범위, 학생 질문·AI 대표질문·교수자 답변 범주처럼
            사용자가 이해할 정보만 포함한다. 정확한 locale 문자열 format은 고정하지
            않지만 학생 식별정보, 내부 ID·storage key·path를 포함하지 않는다.
        link:
          oneOf:
            - type: string
              format: uri-reference
            - type: "null"
          description: |
            권한 검사를 거치는 API root 기준 상대 경로. 정상적으로 접근 가능한
            source는 반드시 non-null이다. source가 분리·삭제됐거나 현재 사용자에게
            안전한 경로를 제공할 수 없을 때만 label을 유지하고 null이다. pagination
            cursor·배열 순번·knowledge_chunk_id를 포함하지 않는다. 폐기된 AI 대표질문은
            내부 tombstone이 provenance용으로 남아도 공개 단건 조회가 404이므로 null이다.

    MaterialChatEvidence:
      allOf:
        - $ref: "#/components/schemas/ChatEvidenceBase"
        - type: object
          properties:
            source_kind:
              type: string
              const: MATERIAL
            link:
              oneOf:
                - type: string
                  format: uri-reference
                  pattern: "^/api/v1/materials/[^/?#]+/content(?:#page=[1-9][0-9]*)?$"
                - type: "null"

    TranscriptChatEvidence:
      allOf:
        - $ref: "#/components/schemas/ChatEvidenceBase"
        - type: object
          properties:
            source_kind:
              type: string
              const: TRANSCRIPT
            link:
              oneOf:
                - type: string
                  format: uri-reference
                  pattern: '^/api/v1/sessions/[^/?#]+/transcript\?transcript_version_id=[^&#]+&start_sequence=[1-9][0-9]*&end_sequence=[1-9][0-9]*$'
                  description: |
                    Session·TranscriptVersion·inclusive stable sequence 범위를 고정한
                    canonical 상대 경로. start_sequence는 end_sequence 이상이 아니어야
                    하고 두 sequence는 같은 version의 final Segment여야 한다.
                - type: "null"

    QuestionChatEvidence:
      allOf:
        - $ref: "#/components/schemas/ChatEvidenceBase"
        - type: object
          properties:
            source_kind:
              type: string
              const: QUESTION
            link:
              oneOf:
                - type: string
                  format: uri-reference
                  pattern: "^/api/v1/questions/[^/?#]+$"
                - type: string
                  format: uri-reference
                  pattern: "^/api/v1/representative-questions/[^/?#]+$"
                - type: "null"
              description: |
                학생 Question 또는 AI RepresentativeQuestion 안정 경로. 두 경로 모두
                source_kind=QUESTION을 사용하고 하위 구분 enum을 노출하지 않는다.

    AnswerChatEvidence:
      allOf:
        - $ref: "#/components/schemas/ChatEvidenceBase"
        - type: object
          properties:
            source_kind:
              type: string
              const: ANSWER
            link:
              oneOf:
                - type: string
                  format: uri-reference
                  pattern: "^/api/v1/answers/[^/?#]+$"
                - type: "null"

    ChatEvidence:
      description: |
        source_kind가 공개 상대 경로의 유형을 판별한다. non-null link는 해당 유형의
        anchored path와 일치해야 하며 외부 URL이나 다른 source_kind의 경로를 허용하지 않는다.
        source가 공개에서 사라졌을 때만 link=null인 unavailable branch를 사용한다.
      oneOf:
        - $ref: "#/components/schemas/MaterialChatEvidence"
        - $ref: "#/components/schemas/TranscriptChatEvidence"
        - $ref: "#/components/schemas/QuestionChatEvidence"
        - $ref: "#/components/schemas/AnswerChatEvidence"
      discriminator:
        propertyName: source_kind
        mapping:
          MATERIAL: "#/components/schemas/MaterialChatEvidence"
          TRANSCRIPT: "#/components/schemas/TranscriptChatEvidence"
          QUESTION: "#/components/schemas/QuestionChatEvidence"
          ANSWER: "#/components/schemas/AnswerChatEvidence"
      examples:
        - source_kind: TRANSCRIPT
          label: 05:20~05:35 강의 내용
          link: /api/v1/sessions/session_01HXYZ/transcript?transcript_version_id=transcript_version_01HXYZ&start_sequence=42&end_sequence=47
        - source_kind: QUESTION
          label: AI 대표질문
          link: null

    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - id
        - chat_id
        - job_id
        - response_job_id
        - sequence
        - role
        - content
        - evidence
        - model_name
        - prompt_version
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        chat_id:
          $ref: "#/components/schemas/ResourceId"
        job_id:
          type: [string, "null"]
          description: USER 메시지는 null, 생성된 ASSISTANT 메시지는 원인 AIJob ID
        response_job_id:
          type: [string, "null"]
          description: |
            USER 메시지에 응답할 CHAT_RESPONSE Job ID. 202 transaction이 메시지와
            Job을 함께 저장하므로 USER에서는 non-null이고 ASSISTANT에서는 null이다.
            새로고침 후에도 이 필드로 같은 turn의 Job을 다시 polling할 수 있다.
        sequence:
          type: integer
          minimum: 1
        role:
          $ref: "#/components/schemas/ChatMessageRole"
        content:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ChatEvidence"
        model_name:
          type: [string, "null"]
        prompt_version:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
      oneOf:
        - title: 사용자 메시지
          properties:
            role:
              type: string
              const: USER
            job_id:
              type: "null"
            response_job_id:
              $ref: "#/components/schemas/ResourceId"
            content:
              type: string
              minLength: 1
              maxLength: 2000
              description: 앞뒤 공백 제거·Unicode NFC 정규화 후 저장된 1~2,000 Unicode code point USER 입력
              x-normalization:
                steps: [trim-surrounding-whitespace, unicode-nfc]
                order: before-length-validation
                length_unit: Unicode code points
                truncation: forbidden
                invalid_response: 422 VALIDATION_ERROR
            evidence:
              type: array
              maxItems: 0
            model_name:
              type: "null"
            prompt_version:
              type: "null"
        - title: AI 응답 메시지
          properties:
            role:
              type: string
              const: ASSISTANT
            job_id:
              $ref: "#/components/schemas/ResourceId"
            response_job_id:
              type: "null"
            content:
              type: string
              minLength: 1
              description: 저장된 최종 Assistant Message. USER용 2,000자 상한을 적용하지 않음
            evidence:
              type: array
              items:
                $ref: "#/components/schemas/ChatEvidence"
      examples:
        - id: message_user_01HXYZ
          chat_id: chat_01HXYZ
          job_id: null
          response_job_id: job_01HXYZ
          sequence: 1
          role: USER
          content: 음수 가중치가 있을 때는 어떤 알고리즘을 써야 해?
          evidence: []
          model_name: null
          prompt_version: null
          created_at: "2026-07-13T10:00:00Z"
        - id: message_assistant_01HXYZ
          chat_id: chat_01HXYZ
          job_id: job_01HXYZ
          response_job_id: null
          sequence: 2
          role: ASSISTANT
          content: 음수 가중치가 있으면 벨만-포드 알고리즘을 사용할 수 있습니다.
          evidence:
            - source_kind: TRANSCRIPT
              label: 05:20~05:35 강의 내용
              link: /api/v1/sessions/session_01HXYZ/transcript?transcript_version_id=transcript_version_01HXYZ&start_sequence=42&end_sequence=47
          model_name: null
          prompt_version: prompt-v1
          created_at: "2026-07-13T10:00:02Z"

    ChatMessageListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        next_cursor:
          type: [string, "null"]

    ChatTurnAcceptedResponse:
      type: object
      additionalProperties: false
      description: |
        한 transaction에서 앞뒤 공백 제거·Unicode NFC 정규화·검증을 거친 USER
        Message, 그 메시지를 immutable 입력으로 삼는 PENDING CHAT_RESPONSE Job,
        outbox와 terminal 202 멱등성 응답을 함께 commit한다. user_message.response_job_id는
        job.id와 같고 job.target.resource_id는 user_message.id와 같다.
      required: [user_message, job]
      properties:
        user_message:
          allOf:
            - $ref: "#/components/schemas/ChatMessage"
            - properties:
                role:
                  const: USER
        job:
          allOf:
            - $ref: "#/components/schemas/AIJob"
            - properties:
                job_type:
                  const: CHAT_RESPONSE
                visibility:
                  const: REQUESTER_ONLY
                status:
                  const: PENDING
                target:
                  allOf:
                    - $ref: "#/components/schemas/AIJobResourceLink"
                    - properties:
                        resource_type:
                          const: CHAT_MESSAGE
                        resource_id:
                          type: string
                        resource_url:
                          type: string
                          format: uri-reference
                          pattern: "^/api/v1/chat-messages/[^/?#]+$"

    AIJobResourceType:
      type: string
      enum:
        - MATERIAL
        - QUESTION
        - QUESTION_CLUSTER_GENERATION
        - SUMMARY
        - CHAT_MESSAGE
        - SESSION
        - RECORDING
        - TRANSCRIPT_VERSION
        - ANSWER

    AIJobResourceLink:
      type: object
      additionalProperties: false
      required: [resource_type, resource_id, resource_url]
      properties:
        resource_type:
          $ref: "#/components/schemas/AIJobResourceType"
        resource_id:
          type: [string, "null"]
          description: 결과 리소스 생성 전에는 null일 수 있음
        resource_url:
          type: [string, "null"]
          description: 권한 검사를 거쳐 결과를 조회할 상대 URL. 준비 전에는 null

    AIJobError:
      type: object
      additionalProperties: false
      required: [code, message, retryable]
      properties:
        code:
          type: string
          description: |
            AI_TIMEOUT, AI_SERVICE_UNAVAILABLE 등 provider 원문을 제거한 안전한 오류 코드.
            Session 10분 deadline이 생성·종료한 downstream Job은 SESSION_PROCESSING_TIMEOUT.
            PRESERVED membership 취소가 stale 처리한 실행은
            CLUSTER_REVISION_CHANGED, retryable=false이다. Session 종료가 중지한
            LIVE clustering의 공개 terminal status·error를 CANCELLED/SUPERSEDED 또는
            재시도 불가 FAILED 중 어떻게 표현할지는 TBD이다.
        message:
          type: string
          description: 프롬프트·모델 응답·내부 stack을 포함하지 않는 안전한 사용자 메시지
        retryable:
          type: boolean

    AIJobProgress:
      type: object
      additionalProperties: false
      required: [stage, percent]
      properties:
        stage:
          type: string
          description: |
            QUEUED, EXTRACTING, GENERATING, FINALIZING 등 사용자에게 공개해도 안전한
            작업별 phase. provider 내부 단계명과 민감한 입력·오류 정보는 노출하지 않는다.
        percent:
          type: [integer, "null"]
          minimum: 0
          maximum: 100
          description: 계산할 수 없는 작업이면 null

    QuestionClusteringJobContext:
      type: object
      additionalProperties: false
      required:
        [mode, input_through_sequence, base_revision, final_answered_through_at]
      properties:
        mode:
          $ref: "#/components/schemas/QuestionClusteringMode"
        input_through_sequence:
          type: integer
          minimum: 0
          description: |
            학생 질문 input watermark. LIVE_INCREMENTAL은 Job 생성 시 캡처하고 retry가
            같은 값을 재사용하며 더 늦은 질문은 성공 후 새 Job이 처리한다. FINAL은
            Session 종료 시 requested_sequence를 캡처하고 실패 retry에도 유지한다.
        base_revision:
          type: integer
          minimum: 0
          description: |
            result fence가 검증할 시작 Cluster revision. LIVE retry는 원래 값을 유지하고,
            실패한 FINAL의 교수자 명시 재시도는 수락 시점 current revision으로 다시 캡처한다.
        final_answered_through_at:
          type: [string, "null"]
          format: date-time
          description: |
            FINAL 최초 실행이면 Session ended_at과 같은 Answer 완료 상한. 실패한 FINAL을
            교수자가 명시적으로 재시도할 때는 수락 시각으로 다시 캡처해 그 사이 새로
            답변된 AI 대표질문을 포함한다. LIVE_INCREMENTAL이면 null이다.
      oneOf:
        - properties:
            mode:
              const: LIVE_INCREMENTAL
            final_answered_through_at:
              type: "null"
        - properties:
            mode:
              const: FINAL
            final_answered_through_at:
              type: string
              format: date-time

    AIJob:
      type: object
      additionalProperties: false
      description: |
        RUNNING worker는 내부 heartbeat를 15초마다 보내 lease를 갱신하고 60초 미갱신 시
        watchdog이 Job을 FAILED로 종료한다. RECORDING_TRANSCRIPTION을 제외한
        일반 후처리 Job의 기본 실행 상한은 started_at+5분이다.
        HQ STT RECORDING_TRANSCRIPTION 개별 Job timeout은 이 기본값에서 제외하며
        정확한 상한은 TBD이다. 이 lease는 Session WebSocket의 20초 ping과 별개이고
        Session 전체 ended_at+10분 deadline은 HQ에도 적용한다.
        Session 10분 deadline에 watchdog이 handoff를 보전하기 위해 생성하는 미생성
        downstream blocking Job은 FAILED, retryable=true, started_at=null, finished_at=now,
        error.code=SESSION_PROCESSING_TIMEOUT이다. 누락된 FINAL QUESTION_CLUSTERING은
        input_through_sequence=requested_sequence, base_revision=current_revision,
        final_answered_through_at=Session.ended_at으로 원래 종료 상한을 복원한다. 단 eligible
        RECORDING/FINALIZED source의 누락 FINAL_SUMMARY Job은 합성하지 않고 Summary를
        DATA_INTEGRITY_ERROR로 표시한다.
      required:
        - id
        - session_id
        - job_type
        - visibility
        - status
        - attempt
        - version
        - progress
        - retryable
        - blocks_session_completion
        - clustering
        - error
        - target
        - result
        - result_unavailable_reason
        - created_at
        - updated_at
        - started_at
        - finished_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        job_type:
          $ref: "#/components/schemas/AIJobType"
          description: 사용자에게 공개하는 작업 purpose
        visibility:
          $ref: "#/components/schemas/AIJobVisibility"
        status:
          $ref: "#/components/schemas/AIJobStatus"
        attempt:
          type: integer
          minimum: 1
        version:
          type: integer
          minimum: 1
        progress:
          oneOf:
            - $ref: "#/components/schemas/AIJobProgress"
            - type: "null"
        retryable:
          type: boolean
          description: |
            FAILED Job이 작업 정책상 재실행 가능한지 여부. 일반 요청형·공유 후처리는
            별도 권한 검사를 통과한 사용자가 retry endpoint를 호출할 수 있다.
            retry_job_id에 예약된 LIVE_INCREMENTAL은 true여도 시스템 scheduler 전용이다.
        blocks_session_completion:
          type: boolean
          description: |
            true이면 최초 PROCESSING 완료 판정에서 이 Job이 SUCCEEDED 또는 FAILED
            terminal이 될 때까지 Session은 PROCESSING을 유지한다. 이미 COMPLETED인
            Session에서 실패 Job을 재시도해 PENDING/RUNNING으로 바뀌어도 상태를 역전하지
            않는다. true인 Job의 visibility는 반드시 SHARED이며, Session ended_at + 10분
            deadline에는 남은 blocking Job도 FAILED terminal이 된다.
        clustering:
          oneOf:
            - $ref: "#/components/schemas/QuestionClusteringJobContext"
            - type: "null"
          description: QUESTION_CLUSTERING이면 non-null, 다른 job_type은 null
        error:
          oneOf:
            - $ref: "#/components/schemas/AIJobError"
            - type: "null"
        target:
          $ref: "#/components/schemas/AIJobResourceLink"
          description: 작업이 처리하는 입력·논리 대상
        result:
          oneOf:
            - $ref: "#/components/schemas/AIJobResourceLink"
            - type: "null"
          description: |
            SUCCEEDED이면 원칙적으로 결과 리소스 링크다. 다만 일반 이력을 보관하지 않는
            QUESTION_CLUSTERING generation이 새 결과로 교체되면 null이고
            result_unavailable_reason=SUPERSEDED다. 완료 전 또는 실패하면 null이다.
            RECORDING_TRANSCRIPTION 성공 result의 resource_type은 TRANSCRIPT_VERSION이다.
        result_unavailable_reason:
          oneOf:
            - $ref: "#/components/schemas/AIJobResultUnavailableReason"
            - type: "null"
          description: 결과가 정책상 폐기되어 SUCCEEDED Job에서 조회할 수 없을 때의 안전한 이유
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: [string, "null"]
          format: date-time
        finished_at:
          type: [string, "null"]
          format: date-time
      allOf:
        - if:
            properties:
              job_type:
                const: QUESTION_CLUSTERING
            required: [job_type]
          then:
            properties:
              clustering:
                $ref: "#/components/schemas/QuestionClusteringJobContext"
              visibility:
                const: SHARED
              target:
                properties:
                  resource_type:
                    const: SESSION
                  resource_id:
                    type: string
          else:
            properties:
              clustering:
                type: "null"
        - if:
            properties:
              job_type:
                const: ANSWER_ORGANIZATION
            required: [job_type]
          then:
            properties:
              visibility:
                const: SHARED
              blocks_session_completion:
                const: true
              target:
                properties:
                  resource_type:
                    const: ANSWER
                  resource_id:
                    type: string
        - if:
            properties:
              job_type:
                enum: [LIVE_SUMMARY, CHAT_RESPONSE]
            required: [job_type]
          then:
            properties:
              visibility:
                const: REQUESTER_ONLY
              blocks_session_completion:
                const: false
        - if:
            properties:
              job_type:
                const: CHAT_RESPONSE
            required: [job_type]
          then:
            properties:
              target:
                allOf:
                  - $ref: "#/components/schemas/AIJobResourceLink"
                  - properties:
                      resource_type:
                        const: CHAT_MESSAGE
                      resource_id:
                        type: string
                      resource_url:
                        type: string
                        format: uri-reference
                        pattern: "^/api/v1/chat-messages/[^/?#]+$"
        - if:
            properties:
              job_type:
                const: FINAL_SUMMARY
            required: [job_type]
          then:
            properties:
              visibility:
                const: SHARED
              blocks_session_completion:
                const: true
        - if:
            properties:
              job_type:
                const: LIVE_SUMMARY
              status:
                const: SUCCEEDED
            required: [job_type, status]
          then:
            properties:
              result:
                allOf:
                  - $ref: "#/components/schemas/AIJobResourceLink"
                  - properties:
                      resource_type:
                        const: SUMMARY
                      resource_id:
                        type: string
                      resource_url:
                        type: string
                        format: uri-reference
                        pattern: "^/api/v1/summaries/[^/?#]+$"
        - if:
            properties:
              job_type:
                const: FINAL_SUMMARY
              status:
                const: SUCCEEDED
            required: [job_type, status]
          then:
            properties:
              result:
                allOf:
                  - $ref: "#/components/schemas/AIJobResourceLink"
                  - properties:
                      resource_type:
                        const: SUMMARY
                      resource_id:
                        type: string
                      resource_url:
                        type: string
                        format: uri-reference
                        pattern: "^/api/v1/summaries/[^/?#]+$"
        - if:
            properties:
              job_type:
                const: CHAT_RESPONSE
              status:
                const: SUCCEEDED
            required: [job_type, status]
          then:
            properties:
              result:
                allOf:
                  - $ref: "#/components/schemas/AIJobResourceLink"
                  - properties:
                      resource_type:
                        const: CHAT_MESSAGE
                      resource_id:
                        type: string
                      resource_url:
                        type: string
                        format: uri-reference
                        pattern: "^/api/v1/chat-messages/[^/?#]+$"
        - if:
            properties:
              job_type:
                const: QUESTION_CLUSTERING
              clustering:
                properties:
                  mode:
                    const: LIVE_INCREMENTAL
            required: [job_type, clustering]
          then:
            properties:
              blocks_session_completion:
                const: false
        - if:
            properties:
              job_type:
                const: QUESTION_CLUSTERING
              clustering:
                properties:
                  mode:
                    const: FINAL
            required: [job_type, clustering]
          then:
            properties:
              blocks_session_completion:
                const: true
        - if:
            properties:
              result_unavailable_reason:
                const: SUPERSEDED
            required: [result_unavailable_reason]
          then:
            properties:
              job_type:
                const: QUESTION_CLUSTERING
              status:
                const: SUCCEEDED
              result:
                type: "null"
        - if:
            properties:
              job_type:
                const: QUESTION_CLUSTERING
              status:
                const: SUCCEEDED
              result_unavailable_reason:
                type: "null"
            required: [job_type, status, result_unavailable_reason]
          then:
            properties:
              result:
                allOf:
                  - $ref: "#/components/schemas/AIJobResourceLink"
                  - properties:
                      resource_type:
                        const: QUESTION_CLUSTER_GENERATION
                      resource_id:
                        type: string
        - if:
            properties:
              status:
                enum: [PENDING, RUNNING, FAILED]
            required: [status]
          then:
            properties:
              result:
                type: "null"
              result_unavailable_reason:
                type: "null"

    AIJobAcceptedResponse:
      type: object
      additionalProperties: false
      required: [job]
      properties:
        job:
          $ref: "#/components/schemas/AIJob"

    AIJobListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AIJob"
        next_cursor:
          type: [string, "null"]

    RecordCollectionIndex:
      type: object
      additionalProperties: false
      description: |
        /record 응답 transaction 시점에 현재 사용자에게 보이는 전체 개수와
        첫 cursor 없이 시작하는 안정적인 목록 경로. count는 후속 목록 페이지를
        snapshot token으로 잠그지 않는다.
      required: [total_count, list_url]
      properties:
        total_count:
          type: integer
          minimum: 0
        list_url:
          type: string
          format: uri-reference
          description: Session·stable filter를 포함하고 cursor·배열 순번을 포함하지 않는 상대 경로

    RecordTranscriptIndex:
      type: object
      additionalProperties: false
      required:
        - state
        - selected_version_id
        - segment_count
        - gap_count
        - timeline_url
        - versions_url
      properties:
        state:
          oneOf:
            - $ref: "#/components/schemas/TranscriptAggregate"
            - type: "null"
          description: 최신 처리 상태와 canonical 포인터. 영구 Transcript가 아직 없으면 null
        selected_version_id:
          oneOf:
            - $ref: "#/components/schemas/ResourceId"
            - type: "null"
          description: |
            timeline 조회에 고정한 canonical version ID. canonical이 null이면 current version ID,
            state가 null이면 null이다. version 본문은 versions_url에서 별도로 조회한다.
        segment_count:
          type: integer
          minimum: 0
          description: selected_version_id에 귀속된 final TranscriptSegment 전체 개수
        gap_count:
          type: integer
          minimum: 0
          description: selected_version_id에 귀속된 TranscriptGap 전체 개수
        timeline_url:
          type: string
          format: uri-reference
          description: |
            첫 cursor 없는 Transcript 목록 경로. selected_version_id가 non-null이면
            `transcript_version_id` query 값이 그 ID와 정확히 같아야 하며, null이면 query 없는
            base path만 반환한다.
        versions_url:
          type: string
          format: uri-reference
          description: 첫 cursor 없는 TranscriptVersion 목록 경로
          pattern: "^/api/v1/sessions/[^/?#]+/transcript/versions$"
      oneOf:
        - title: Transcript 없음
          properties:
            state:
              type: "null"
            selected_version_id:
              type: "null"
            segment_count:
              const: 0
            gap_count:
              const: 0
            timeline_url:
              type: string
              format: uri-reference
              pattern: "^/api/v1/sessions/[^/?#]+/transcript$"
        - title: Transcript 있음
          properties:
            state:
              $ref: "#/components/schemas/TranscriptAggregate"
            selected_version_id:
              $ref: "#/components/schemas/ResourceId"
            timeline_url:
              type: string
              format: uri-reference
              pattern: '^/api/v1/sessions/[^/?#]+/transcript\?transcript_version_id=[^&#]+$'
              description: transcript_version_id query 값은 같은 객체의 selected_version_id와 정확히 같다.

    RecordSummaryIndex:
      type: object
      additionalProperties: false
      description: |
        Summary 본문을 embed하지 않고 상태와 안정적인 조회 경로만 반환하는
        compact index. HQ source gate 대기는 Job 없는 PENDING이 정상이다. 반면
        eligible RECORDING/FINALIZED source의 필수 Job 누락, SUCCEEDED Job의 결과
        누락 또는 다른 필수 원장 불일치는 DATA_INTEGRITY_ERROR/reason=null로
        감추고 summary_url을 null로 반환한다.
        단 HQ retry 성공 후 SESSION_POSTPROCESSING attempt>1 복구가 active이면
        eligible Job이 아직 없거나 새 attempt=1 FINAL_SUMMARY Job이 active인 상태는
        PENDING이다. 복구 coordinator terminal 후에도 eligible Job이 없으면 무결성
        오류이며, 복구와 무관한 COMPLETED 최초 attempt active도 무결성 오류다.
      required: [state, summary_url, summaries_url]
      properties:
        state:
          $ref: "#/components/schemas/FinalSummaryState"
        summary_url:
          oneOf:
            - type: string
              format: uri-reference
            - type: "null"
          description: AVAILABLE인 최종 Summary 단건 경로. 그 외 상태는 null
        summaries_url:
          type: string
          format: uri-reference
          description: summary_type=FINAL을 포함한 첫 cursor 없는 Summary 목록 경로
      oneOf:
        - title: Summary 사용 가능
          properties:
            state:
              $ref: "#/components/schemas/FinalSummaryAvailableState"
            summary_url:
              type: string
              format: uri-reference
        - title: Summary 생성 대기
          properties:
            state:
              $ref: "#/components/schemas/FinalSummaryPendingState"
            summary_url:
              type: "null"
        - title: Summary 대상 없음
          properties:
            state:
              $ref: "#/components/schemas/FinalSummaryNotApplicableState"
            summary_url:
              type: "null"
        - title: Summary 생성 실패
          properties:
            state:
              $ref: "#/components/schemas/FinalSummaryFailedState"
            summary_url:
              type: "null"
        - title: Summary 원장 무결성 오류
          properties:
            state:
              $ref: "#/components/schemas/FinalSummaryDataIntegrityErrorState"
            summary_url:
              type: "null"
      examples:
        - state:
            status: PENDING
            reason: null
          summary_url: null
          summaries_url: /api/v1/sessions/session_01HXYZ/summaries?summary_type=FINAL
        - state:
            status: AVAILABLE
            reason: null
          summary_url: /api/v1/summaries/summary_01HXYZ
          summaries_url: /api/v1/sessions/session_01HXYZ/summaries?summary_type=FINAL
        - state:
            status: NOT_APPLICABLE
            reason:
              code: NO_FINAL_TRANSCRIPT
              message: 요약할 강의 내용이 없습니다.
          summary_url: null
          summaries_url: /api/v1/sessions/session_01HXYZ/summaries?summary_type=FINAL
        - state:
            status: FAILED
            reason:
              code: SUMMARY_SOURCE_UNAVAILABLE
              message: Transcript 처리 문제로 요약을 만들지 못했습니다.
          summary_url: null
          summaries_url: /api/v1/sessions/session_01HXYZ/summaries?summary_type=FINAL
        - state:
            status: DATA_INTEGRITY_ERROR
            reason: null
          summary_url: null
          summaries_url: /api/v1/sessions/session_01HXYZ/summaries?summary_type=FINAL

    RecordQuestionClustersIndex:
      type: object
      additionalProperties: false
      required: [state, current, final]
      properties:
        state:
          $ref: "#/components/schemas/QuestionClusteringState"
        current:
          allOf:
            - $ref: "#/components/schemas/RecordCollectionIndex"
            - type: object
              description: scope=CURRENT인 Cluster count와 목록 경로
        final:
          allOf:
            - $ref: "#/components/schemas/RecordCollectionIndex"
            - type: object
              description: scope=FINAL인 Cluster count와 목록 경로

    SessionRecord:
      type: object
      additionalProperties: false
      description: |
        PROCESSING·COMPLETED Session의 compact manifest. Summary 본문과 Material·Segment·Gap·Question·
        Cluster·Answer·AIJob 배열을 embed하지 않고 상태·count·cursor 목록 경로를 제공한다.
      required:
        - session
        - recording
        - recording_url
        - materials
        - transcript
        - summary
        - questions
        - question_clusters
        - answers
        - jobs
      properties:
        session:
          $ref: "#/components/schemas/LectureSession"
        recording:
          oneOf:
            - $ref: "#/components/schemas/SessionRecording"
            - type: "null"
          description: |
            첫 audio.start가 없거나 현재 사용자의 녹음 접근 정책이 허용하지 않으면 null.
            storage key, 서버 경로와 물리 fragment 구성은 포함하지 않는다.
        recording_url:
          type: string
          format: uri-reference
          description: Session ID를 사용하는 안정적인 Recording 메타데이터 경로. recording이 null이면 404일 수 있음
        materials:
          $ref: "#/components/schemas/RecordCollectionIndex"
          description: 외부에 연결된 Material만 count하며 분리된 자료는 즉시 제외
        transcript:
          $ref: "#/components/schemas/RecordTranscriptIndex"
        summary:
          $ref: "#/components/schemas/RecordSummaryIndex"
        questions:
          $ref: "#/components/schemas/RecordCollectionIndex"
          description: 학생 Question 전체 count와 sort=RECENT인 list_url
        question_clusters:
          $ref: "#/components/schemas/RecordQuestionClustersIndex"
        answers:
          $ref: "#/components/schemas/RecordCollectionIndex"
        jobs:
          $ref: "#/components/schemas/RecordCollectionIndex"
          description: SHARED AIJob만 count·조회하고 요청자 개인 Summary·Chat Job은 제외

    RealtimeEventType:
      type: string
      enum:
        - connection.ready
        - resync.required
        - transcript.partial
        - transcript.final
        - transcript.status
        - transcript.version.updated
        - question.created
        - question.updated
        - clustering.updated
        - reaction.updated
        - answer.updated
        - answer.deleted
        - session.updated
        - recording.updated
        - job.updated

    ConnectionReadyPayload:
      type: object
      additionalProperties: false
      required:
        - connection_id
        - role
        - server_time
        - heartbeat_interval_ms
        - resume_status
      properties:
        connection_id:
          $ref: "#/components/schemas/ResourceId"
        role:
          $ref: "#/components/schemas/CourseRole"
        server_time:
          type: string
          format: date-time
        heartbeat_interval_ms:
          type: integer
          const: 20000
        resume_status:
          type: string
          enum: [FRESH, REPLAYED, RESYNC_REQUIRED]

    ResyncRequiredPayload:
      type: object
      additionalProperties: false
      required: [reason, resources]
      properties:
        reason:
          type: string
          enum: [CURSOR_EXPIRED, SERVER_RESTARTED, CURSOR_UNKNOWN]
        resources:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
              [
                SESSION,
                RECORDING,
                TRANSCRIPT,
                QUESTIONS,
                CLUSTERS,
                ANSWERS,
                JOBS,
              ]

    TranscriptStatusPayload:
      type: object
      additionalProperties: false
