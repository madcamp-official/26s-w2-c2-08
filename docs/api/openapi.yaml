              draft: 음수 가중치 왜 안돼요?
      responses:
        "200":
          description: 질문 문장 후보
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/questions/{question_id}:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: getQuestion
      summary: 익명 질문 단건 조회
      description: |
        Session의 Course 멤버만 조회한다. 목록·이벤트와 동일하게 작성자 식별 정보는
        반환하지 않으며 현재 사용자의 반응 여부만 개인화한다.
      responses:
        "200":
          description: 익명 Question
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/questions/{question_id}/reaction:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
      - $ref: "#/components/parameters/RequestId"
    put:
      tags: [Questions]
      operationId: addQuestionReaction
      summary: ‘나도 궁금해요’ 반응 추가
      description: |
        해당 Course의 STUDENT가 LIVE Session에서만 실행할 수 있다. 같은 사용자의
        반복 호출은 반응 한 개 상태를 유지하며 최신 집계를 반환한다. 자신이 작성한
        질문에는 반응할 수 없고 작성자 식별은 서버 내부에서만 사용한다.
      responses:
        "200":
          description: 최신 반응 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionReactionState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Questions]
      operationId: removeQuestionReaction
      summary: ‘나도 궁금해요’ 반응 취소
      description: 기존 반응이 없어도 성공하는 멱등 요청이다.
      responses:
        "204":
          description: 반응 없음 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/answers:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Answers]
      operationId: listSessionAnswers
      summary: 교수자 답변 목록 조회
      description: |
        Course 멤버가 저장된 Answer를 조회한다. LIVE 재연결 시 질문 상태와 답변 구간을
        REST로 복구하는 기준이며 `started_at ASC, id ASC`로 안정적으로 정렬한다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Answer 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Answers]
      operationId: startAnswerCapture
      summary: 교수자 답변 캡처 시작
      description: |
        해당 Course의 PROFESSOR가 LIVE Session에서 질문 또는 질문 클러스터를 선택한다.
        클러스터 선택 시 선택 시점의 미답변 질문 목록을 스냅샷으로 고정하고 질문을
        SELECTED로 변경한다. Answer 상태 설계는 구현 전 검토가 필요한 초안이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerCreateRequest"
            examples:
              questions:
                summary: 질문 직접 선택
                value:
                  target:
                    type: QUESTIONS
                    question_ids: [question_01HXYZ]
              cluster:
                summary: 클러스터 선택
                value:
                  target:
                    type: CLUSTER
                    cluster_id: cluster_01HXYZ
      responses:
        "201":
          description: CAPTURING 상태의 Answer
          headers:
            Location:
              description: 생성된 Answer의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/answers/{answer_id}/complete:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Answers]
      operationId: completeAnswerCapture
      summary: 교수자 답변 완료
      description: |
        해당 Course의 PROFESSOR만 실행할 수 있다. 답변 시작 이후의 final Transcript
        범위를 확정하고 Answer를 COMPLETED, 연결 질문을 ANSWERED로 변경한다.
        본문을 생략하면 서버의 자동 후보를 사용하고, 본문을 보내면 같은 Session의
        sequence 범위인지 검증한다. 반복 호출은 기존 완료 결과를 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        description: 자동 후보 범위를 조정할 때만 전달
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerCompleteRequest"
            example:
              start_sequence: 110
              end_sequence: 128
      responses:
        "200":
          description: 완료된 Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/answers/{answer_id}:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Answers]
      operationId: getAnswer
      summary: 교수자 답변 단건 조회
      description: Answer가 속한 Session의 Course 멤버만 조회한다.
      responses:
        "200":
          description: Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/answers/{answer_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Answers]
      operationId: cancelAnswerCapture
      summary: 교수자 답변 취소
      description: |
        CAPTURING Answer를 CANCELLED로 변경하고 연결 질문을 OPEN으로 복귀시키는
        복구용 초안이다. 반복 호출은 기존 취소 결과를 반환한다.
      responses:
        "200":
          description: 취소된 Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/summaries:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Summaries]
      operationId: listSessionSummaries
      summary: 저장된 요약 목록 조회
      description: |
        Course 멤버만 조회할 수 있다. 저장된 LIVE 요약은 요청자에게만, FINAL 요약은
        Course 멤버에게 공개한다. 성공한 LIVE 요약도 반드시 저장한 뒤 Job을 SUCCEEDED로
        변경하므로 연결이 끊겨도 Job result URL로 복구할 수 있다.
      parameters:
        - name: summary_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SummaryType"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 요약 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Summaries]
      operationId: requestSessionSummary
      summary: AI 요약 요청
      description: |
        LIVE Session에서 요청 시점까지 또는 선택한 final Transcript 범위와 같은 Session에
        연결된 READY PDF만 사용한다. UPLOADED, PROCESSING, FAILED 또는 분리된 자료는
        제외한다. UI는 학생 중심이지만 교수자의 LIVE 요약 권한은 아직 미정이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummaryCreateRequest"
            example:
              summary_type: LIVE
              range:
                start_sequence: null
                end_sequence: 128
      responses:
        "202":
          description: 요약 작업 수락
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/summaries/{summary_id}:
    parameters:
      - $ref: "#/components/parameters/SummaryId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Summaries]
      operationId: getSummary
      summary: 저장된 요약 단건 조회
      description: |
        FINAL 요약은 Course 멤버가 조회할 수 있다. 저장된 LIVE 요약은 요청자만 조회한다.
        권한이 없는 사용자에게는 리소스 존재를 공개하지 않는다.
      responses:
        "200":
          description: LectureSummary
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/chats:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: listMySessionChats
      summary: 내 AI 대화 목록 조회
      description: 현재 사용자가 이 Session에서 생성한 개인 대화만 반환한다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 개인 대화 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chats]
      operationId: createSessionChat
      summary: AI 대화 생성
      description: |
        LIVE는 진행 중 class, REVIEW는 정리 중·완료 class에서 사용한다. 대화는 생성한
        사용자에게만 노출하는 초안이며 교수자의 LIVE 사용 범위는 미정이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCreateRequest"
            example:
              mode: LIVE
      responses:
        "201":
          description: 생성된 개인 대화
          headers:
            Location:
              description: 생성된 Chat의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/chats/{chat_id}:
    parameters:
      - $ref: "#/components/parameters/ChatId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: getChat
      summary: 내 AI 대화 단건 조회
      description: Chat 소유자이면서 현재도 Session의 Course 멤버인 사용자만 조회한다.
      responses:
        "200":
          description: Chat
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/chats/{chat_id}/messages:
    parameters:
      - $ref: "#/components/parameters/ChatId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: listChatMessages
      summary: AI 대화 메시지 목록 조회
      description: 대화 소유자만 sequence 오름차순으로 조회할 수 있다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: 메시지 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chats]
      operationId: createChatMessage
      summary: 사용자 메시지 전송과 AI 답변 요청
      description: |
        대화 소유자만 요청할 수 있다. 서버가 URL로 확정된 Session에 연결된 READY PDF,
        final Transcript와 Q&A만 검색하며 UPLOADED, PROCESSING, FAILED 또는 분리된 자료는
        제외한다. 사용자 메시지를 먼저 저장하고 AI 답변 작업을 비동기로 생성한다.
        같은 Chat에 RUNNING/PENDING 답변 Job이 있으면 409 CHAT_RESPONSE_IN_PROGRESS를 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageCreateRequest"
            example:
              content: 음수 가중치가 있을 때는 어떤 알고리즘을 써야 해?
      responses:
        "202":
          description: 사용자 메시지가 저장되고 AI 답변 작업이 수락됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatTurnAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/jobs/{job_id}:
    parameters:
      - $ref: "#/components/parameters/JobId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Jobs]
      operationId: getAIJob
      summary: AI 작업 상태 조회
      description: |
        개인 작업은 요청자, 공유 작업은 권한 있는 Course 멤버만 조회한다. 내부 스택,
        프롬프트 원문 또는 외부 모델 응답 원문은 오류에 포함하지 않는다.
      responses:
        "200":
          description: AI 작업 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/retry:
    parameters:
      - $ref: "#/components/parameters/JobId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Jobs]
      operationId: retryAIJob
      summary: 실패한 AI 작업 재시도
      description: |
        FAILED 작업만 재시도할 수 있다. 개인 작업은 요청자, 공유 후처리 작업은 해당
        Course의 PROFESSOR가 실행한다. 같은 Job ID의 attempt와 version을 1씩 올리고
        status를 PENDING으로 되돌린다. progress, error, started_at, finished_at은 null,
        retryable은 false로 초기화한다. 이전 attempt worker의 늦은 결과는 Job ID, attempt,
        실행 token과 RUNNING 상태가 현재 실행과 모두 일치하지 않으면 반영하지 않는다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: 재시도 작업 수락
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/AIJobRetryConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/sessions/{session_id}/jobs:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Jobs]
      operationId: listSessionSharedJobs
      summary: Session 공용 AI 작업 목록 조회
      description: |
        Course 멤버가 자료 처리, 질문 클러스터링, 녹음 전사와 Session 후처리처럼 참여자가
        알아야 할 공용 Job만 조회한다. 개인 LIVE 요약, 질문 초안과 Chat Job은 절대
        포함하지 않는다. 재시도는 별도 Job API의 권한 규칙을 따른다.
      parameters:
        - name: job_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedAIJobType"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AIJobStatus"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Session 공용 AIJob 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/record:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Records]
      operationId: getSessionRecord
      summary: 수업 기록 통합 조회
      description: |
        PROCESSING 또는 COMPLETED Session에서 안전한 Recording 메타데이터, 연결된 강의자료, final Transcript,
        최종 요약, 익명 질문·답변과 Job 상태를 반환한다. 일부 AI 작업이 실패해도
        이미 저장된 핵심 데이터는 조회 가능해야 한다. 응답이 커지면 세부 목록 API로
        분리하고 이 응답은 가용성 요약으로 축소할 수 있다. 분리된 자료는 즉시 제외한다.
      responses:
        "200":
          description: 통합 수업 기록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/recording:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Recordings]
      operationId: getSessionRecording
      summary: Session 녹음 메타데이터 조회
      description: |
        첫 성공 audio.start가 만든 논리 SessionRecording aggregate를 반환한다. 물리 저장물이
        파일 하나인지 여러 fragment와 manifest인지는 공개하지 않는다. 현재 인증과 Course
        접근 권한을 매번 다시 확인하며 동의와 역할별 세부 접근 범위는 아직 미정이다.
        storage key, 서버 경로, fragment key와 manifest는 반환하지 않는다.
      responses:
        "200":
          description: 안전한 Session 녹음 메타데이터
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecording"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingNotFound"

  /api/v1/sessions/{session_id}/recording/uploads:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Recordings]
      operationId: createRecordingUpload
      summary: 녹음 resumable upload 초기화
      x-contract-status: provisional
      description: |
        첫 publisher와 같은 client_stream_id를 사용하는 Course PROFESSOR가 PROCESSING
        Session의 UPLOAD_PENDING Recording에 active upload를 하나 만든다. codec·container,
        허용 content_type, 브라우저 로컬 저장 방식, 최대 크기와 정확한 expiry 값은 TBD이다.
      parameters:
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordingUploadCreateRequest"
      responses:
        "201":
          description: Recording upload가 초기화됨
          headers:
            Location:
              description: 생성된 RecordingUpload의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUpload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingNotFound"
        "409":
          $ref: "#/components/responses/RecordingUploadConflict"
        "415":
          $ref: "#/components/responses/UnsupportedRecordingFormat"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/recording-uploads/{upload_id}:
    parameters:
      - $ref: "#/components/parameters/RecordingUploadId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Recordings]
      operationId: getRecordingUploadOffset
      summary: 녹음 upload offset 조회 초안
      x-contract-status: provisional
      description: |
        현재 upload 상태와 offset_bytes를 조회하는 비규범적 placeholder다. 최종 protocol에서
        GET과 HEAD 중 무엇을 사용할지, offset header와 응답 status는 TBD이다.
      responses:
        "200":
          description: 현재 RecordingUpload 상태와 byte offset
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUpload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingUploadNotFound"
        "410":
          $ref: "#/components/responses/RecordingUploadExpired"
    patch:
      tags: [Recordings]
      operationId: uploadRecordingChunk
      summary: 녹음 binary chunk 전송 초안
      x-contract-status: provisional
      description: |
        현재 서버 byte offset부터 녹음 chunk를 이어 쓰는 비규범적 placeholder다. PATCH 사용
        여부, offset 전달 header, request Content-Type, chunk 크기와 성공 status·응답 offset
        전달 방식은 TBD이다. 아래 application/octet-stream과 200 응답은 최종 wire 계약이 아니다.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: 실제 media type과 chunk 크기는 resumable upload protocol에서 확정
      responses:
        "200":
          description: chunk가 수락된 뒤의 임시 RecordingUpload 표현
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUpload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingUploadNotFound"
        "409":
          $ref: "#/components/responses/RecordingUploadChunkConflict"
        "410":
          $ref: "#/components/responses/RecordingUploadExpired"
        "415":
          $ref: "#/components/responses/UnsupportedRecordingFormat"

  /api/v1/recording-uploads/{upload_id}/complete:
    parameters:
      - $ref: "#/components/parameters/RecordingUploadId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Recordings]
      operationId: completeRecordingUpload
      summary: 녹음 upload 완료와 HQ STT 시작 gate
      x-contract-status: provisional
      description: |
        전체 byte 수와 향후 확정할 checksum 규칙을 검증해 Recording을 UPLOADED로 확정한 뒤
        HQ STT 시작을 요청한다. 구체 Job type·응답·상태, Transcript generation·canonical·timeout과
        Answer 재매핑은 PR4 범위다.
      parameters:
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      x-checksum-mismatch-response:
        status: TBD
        code: RECORDING_CHECKSUM_MISMATCH
        message: 녹음 무결성 검증에 실패했습니다.
      responses:
        "202":
          description: upload가 완결되고 HQ STT 시작 요청이 수락됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUploadCompletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingUploadNotFound"
        "409":
          $ref: "#/components/responses/RecordingUploadCompleteConflict"
        "410":
          $ref: "#/components/responses/RecordingUploadExpired"

  /api/v1/recordings/{recording_id}/playback:
    parameters:
      - $ref: "#/components/parameters/RecordingId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Recordings]
      operationId: playSessionRecording
      summary: 권한 재검증 녹음 playback
      description: |
        UPLOADED인 논리 Recording을 전체 또는 HTTP byte Range로 재생한다. 요청마다 현재 인증과
        Course 접근을 다시 확인한다. proxy streaming과 권한 확인 뒤 opaque signed delivery
        URL로 redirect하는 방식, codec·container와 실제 응답 MIME은 TBD이다. 어느 방식도
        내부 storage key, 서버 경로, fragment key나 manifest를 공개하지 않는다.
      parameters:
        - name: Range
          in: header
          required: false
          description: RFC byte range. 실제 전달 방식이 Range를 보존해야 함
          schema:
            type: string
      responses:
        "200":
          description: 전체 녹음 binary. 실제 MIME은 codec·container 확정 후 결정
          headers:
            Accept-Ranges:
              description: byte Range 지원
              schema:
                type: string
                const: bytes
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: 요청한 byte Range의 녹음 binary
          headers:
            Accept-Ranges:
              description: byte Range 지원
              schema:
                type: string
                const: bytes
            Content-Range:
              description: 반환한 byte 범위와 전체 길이
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "307":
          description: opaque signed delivery URL 방식을 선택할 때의 임시 redirect 초안
          headers:
            Location:
              description: 내부 storage key나 서버 경로를 노출하지 않는 짧은 수명 URL
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingNotFound"
        "409":
          $ref: "#/components/responses/RecordingNotReady"
        "416":
          $ref: "#/components/responses/RangeNotSatisfiable"

components:
  securitySchemes:
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: goal_session
      description: |
        Google OAuth/OIDC authorization code 흐름 완료 후 서버가 발급하는 세션 Cookie다.
        HttpOnly, Secure, SameSite=Lax를 사용하고 기본 만료는 7일이다. 클라이언트
        JavaScript는 Cookie 값을 읽거나 저장하지 않는다.

  headers:
    RequestId:
      description: 요청 추적용 식별자. 요청의 `X-Request-ID`를 수용하거나 서버가 생성한다.
      schema:
        type: string
        example: req_01HXYZ
    RetryAfter:
      description: 다시 요청하기 전 대기 시간(초)
      schema:
        type: integer
        minimum: 0

  parameters:
    CourseId:
      name: course_id
      in: path
      required: true
      description: 불투명 Course ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    SessionId:
      name: session_id
      in: path
      required: true
      description: 불투명 LectureSession ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    MaterialId:
      name: material_id
      in: path
      required: true
      description: 불투명 LectureMaterial ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    RecordingId:
      name: recording_id
      in: path
      required: true
      description: 물리 파일·fragment 구성을 숨기는 불투명 SessionRecording ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    RecordingUploadId:
      name: upload_id
      in: path
      required: true
      description: 불투명 RecordingUpload ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    QuestionId:
      name: question_id
      in: path
      required: true
      description: 불투명 Question ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    AnswerId:
      name: answer_id
      in: path
      required: true
      description: 불투명 Answer ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    SummaryId:
      name: summary_id
      in: path
      required: true
      description: 불투명 LectureSummary ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    ChatId:
      name: chat_id
      in: path
      required: true
      description: 불투명 Chat ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    JobId:
      name: job_id
      in: path
      required: true
      description: 불투명 AIJob ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    Cursor:
      name: cursor
      in: query
      required: false
      description: 직전 응답에서 받은 불투명 페이지 커서
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: 반환할 최대 항목 수
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        중복 제출을 방지하는 클라이언트 생성 키. 서버는 정규화한 HTTP method·path·body로
        request_hash를 계산한다. 같은 사용자·경로·키와 같은 request_hash가 처리 중이면
        중복 실행하지 않고 기존 처리 상태를 재사용하며, terminal 완료 후에는 같은 HTTP
        status와 body를 반환한다. 다른 request_hash면 409 IDEMPOTENCY_KEY_REUSED를 반환한다.
        terminal 완료 응답은 완료 시각부터 정확히 24시간 보관하고 재사용한다.
      schema:
        type: string
        minLength: 1
    RequiredIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        필수 멱등성 키. 서버는 정규화한 HTTP method·path·body로 request_hash를 계산한다.
        같은 사용자·경로·키와 같은 request_hash가 처리 중이면 중복 실행하지 않고 기존
        처리 상태를 재사용하며, terminal 완료 후에는 같은 HTTP status와 body를 반환한다.
        다른 request_hash면 409 IDEMPOTENCY_KEY_REUSED를 반환한다. terminal 완료 응답은
        완료 시각부터 정확히 24시간 보관하고 재사용한다.
      schema:
        type: string
        minLength: 1
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      description: 클라이언트가 선택적으로 지정하는 요청 추적 ID
      schema:
        type: string

  responses:
    BadRequest:
      description: 요청 형식 또는 커서가 유효하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidCursor:
              value:
                error:
                  code: INVALID_CURSOR
                  message: 유효하지 않은 페이지 커서입니다.
                  request_id: req_01HXYZ
                  details: null
    Unauthorized:
      description: 인증 정보가 없거나 유효하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: AUTHENTICATION_REQUIRED
              message: 로그인이 필요합니다.
              request_id: req_01HXYZ
              details: null
    Forbidden:
      description: Course 멤버십 또는 Course별 역할 권한이 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: COURSE_ACCESS_DENIED
              message: 이 Course에 접근할 권한이 없습니다.
              request_id: req_01HXYZ
              details: null
    NotFound:
      description: 리소스가 없거나 존재를 공개하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: 요청한 리소스를 찾을 수 없습니다.
              request_id: req_01HXYZ
              details: null
    MaterialNotFound:
      description: 강의자료가 없거나 분리되어 존재를 공개하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: MATERIAL_NOT_FOUND
              message: 요청한 강의자료를 찾을 수 없습니다.
              request_id: req_01HXYZ
              details: null
    RecordingNotFound:
      description: Session 녹음이 없거나 현재 사용자에게 존재를 공개하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RECORDING_NOT_FOUND
              message: 요청한 녹음을 찾을 수 없습니다.
              request_id: req_01HXYZ
              details: null
    RecordingUploadNotFound:
      description: 녹음 upload가 없거나 현재 사용자에게 존재를 공개하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RECORDING_UPLOAD_NOT_FOUND
              message: 요청한 녹음 upload를 찾을 수 없습니다.
              request_id: req_01HXYZ
              details: null
    RecordingUploadConflict:
      description: Recording 상태, active upload 또는 멱등성 키 충돌로 upload를 초기화할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            recordingState:
              value:
                error:
                  code: RECORDING_STATE_CONFLICT
                  message: 현재 녹음 상태에서는 upload를 시작할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: CAPTURING
                    required_status: UPLOAD_PENDING
            activeUpload:
              value:
                error:
                  code: RECORDING_UPLOAD_CONFLICT
                  message: 이미 진행 중인 녹음 upload가 있습니다.
                  request_id: req_01HXYZ
                  details: null
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    RecordingUploadChunkConflict:
      description: upload 상태 또는 byte offset이 현재 서버 상태와 일치하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            offsetMismatch:
              value:
                error:
                  code: UPLOAD_OFFSET_MISMATCH
                  message: 서버가 확인한 byte offset부터 다시 전송해 주세요.
                  request_id: req_01HXYZ
                  details:
                    current_offset_bytes: 1048576
            uploadState:
              value:
                error:
                  code: RECORDING_STATE_CONFLICT
                  message: 현재 녹음 upload 상태에서는 chunk를 받을 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: COMPLETED
                    required_status: ACTIVE
    RecordingUploadCompleteConflict:
      description: upload·Recording 상태, byte 수 또는 멱등성 키 충돌로 완료할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            recordingState:
              value:
                error:
                  code: RECORDING_STATE_CONFLICT
                  message: 현재 녹음 상태에서는 upload를 완료할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: FAILED
                    required_status: UPLOADING
            incompleteUpload:
              value:
                error:
                  code: UPLOAD_OFFSET_MISMATCH
                  message: 전체 녹음이 아직 전송되지 않았습니다.
                  request_id: req_01HXYZ
                  details:
                    current_offset_bytes: 1048576
                    total_bytes: 2097152
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    RecordingNotReady:
      description: 녹음이 아직 playback 가능한 UPLOADED 상태가 아님
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RECORDING_NOT_READY
              message: 녹음이 아직 재생 준비 중입니다.
              request_id: req_01HXYZ
              details:
                current_status: UPLOADING
                required_status: UPLOADED
    RecordingUploadExpired:
      description: 녹음 upload가 만료됨. 정확한 expiry 값은 TBD
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RECORDING_UPLOAD_EXPIRED
              message: 녹음 upload가 만료되었습니다.
              request_id: req_01HXYZ
              details: null
    UnsupportedRecordingFormat:
      description: 지원하지 않는 녹음 codec·container 또는 Content-Type. 지원 목록은 TBD
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNSUPPORTED_RECORDING_FORMAT
              message: 지원하지 않는 녹음 형식입니다.
              request_id: req_01HXYZ
              details: null
    RangeNotSatisfiable:
      description: 요청한 playback byte Range를 반환할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RANGE_NOT_SATISFIABLE
              message: 요청한 녹음 범위를 재생할 수 없습니다.
              request_id: req_01HXYZ
              details: null
    Conflict:
      description: 상태 전이, 멤버십 또는 멱등성 충돌
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: 현재 class 상태에서는 요청을 수행할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: READY
                    required_status: LIVE
            idempotencyKey:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    IdempotencyKeyReused:
      description: 같은 멱등성 키가 다른 request_hash에 재사용됨
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: IDEMPOTENCY_KEY_REUSED
              message: 같은 멱등 키가 다른 요청에 사용되었습니다.
              request_id: req_01HXYZ
              details: null
    JoinCodeRotationForbidden:
      description: Course 최초 생성자가 아니어서 참여 코드를 회전할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: ROLE_REQUIRED
              message: Course를 처음 생성한 교수자만 참여 코드를 회전할 수 있습니다.
              request_id: req_01HXYZ
              details:
                required_role: COURSE_CREATOR_PROFESSOR
    SessionCreateConflict:
      description: active Session 존재 또는 멱등성 키 재사용으로 class를 생성할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            activeSessionExists:
              value:
                error:
                  code: ACTIVE_SESSION_EXISTS
                  message: 이 Course에는 이미 진행 중인 class가 있습니다.
                  request_id: req_01HXYZ
                  details:
                    active_statuses: [READY, LIVE, PROCESSING]
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    SessionStateConflict:
      description: 현재 Session 상태에서는 요청을 수행할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: SESSION_STATE_CONFLICT
              message: 현재 class 상태에서는 요청을 수행할 수 없습니다.
              request_id: req_01HXYZ
              details:
                current_status: LIVE
                allowed_statuses: [READY, COMPLETED]
    SessionStartConflict:
      description: Session 상태 또는 연결된 자료 처리 상태 때문에 class를 시작할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: READY 상태의 class만 시작할 수 있습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: LIVE
                    required_status: READY
            materialProcessingActive:
              value:
                error:
                  code: MATERIAL_PROCESSING_ACTIVE
                  message: 처리 중인 강의자료가 있어 class를 시작할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    processing_material_count: 1
    SessionDeleteConflict:
      description: Session 상태 또는 멱등성 키 재사용으로 class를 삭제할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: 현재 class 상태에서는 삭제할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: LIVE
                    allowed_statuses: [READY, COMPLETED]
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    MaterialUploadConflict:
      description: Session 상태, 연결된 자료 수 또는 멱등성 키 충돌로 업로드할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: 정리 중인 class에는 강의자료를 업로드할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: PROCESSING
                    allowed_statuses: [READY, LIVE, COMPLETED]
            materialLimitExceeded:
              value:
                error:
                  code: MATERIAL_LIMIT_EXCEEDED
                  message: class당 강의자료 개수 제한을 초과했습니다.
                  request_id: req_01HXYZ
                  details:
                    max_active_materials: 10
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    MaterialDetachConflict:
      description: Session 상태, 동시 상태 변경 또는 멱등성 키 충돌로 자료를 분리할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sessionState:
              value:
                error:
                  code: SESSION_STATE_CONFLICT
                  message: 정리 중인 class에서는 강의자료를 분리할 수 없습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: PROCESSING
                    allowed_statuses: [READY, LIVE, COMPLETED]
            deleteConflict:
              value:
                error:
                  code: MATERIAL_DELETE_CONFLICT
                  message: 강의자료 상태가 변경되었습니다. 목록을 다시 불러온 뒤 재시도해 주세요.
                  request_id: req_01HXYZ
                  details: null
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    AIJobRetryConflict:
      description: AI Job 상태 또는 재시도 가능 여부가 재시도 조건과 맞지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            stateConflict:
              value:
                error:
                  code: AI_JOB_STATE_CONFLICT
                  message: FAILED 상태의 작업만 재시도할 수 있습니다.
                  request_id: req_01HXYZ
                  details:
                    current_status: RUNNING
                    required_status: FAILED
            notRetryable:
              value:
                error:
                  code: AI_JOB_NOT_RETRYABLE
                  message: 이 작업은 재시도할 수 없습니다.
                  request_id: req_01HXYZ
                  details: null
            idempotencyKeyReused:
              value:
                error:
                  code: IDEMPOTENCY_KEY_REUSED
                  message: 같은 멱등 키가 다른 요청에 사용되었습니다.
                  request_id: req_01HXYZ
                  details: null
    PayloadTooLarge:
      description: 업로드 파일이 십진수 100000000 bytes 제한을 초과함
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FILE_TOO_LARGE
              message: 업로드 가능한 파일 크기를 초과했습니다.
              request_id: req_01HXYZ
              details:
                max_bytes: 100000000
    UnsupportedMediaType:
      description: 지원하지 않는 파일 또는 Content-Type
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNSUPPORTED_MEDIA_TYPE
              message: PDF 파일만 업로드할 수 있습니다.
              request_id: req_01HXYZ
              details: null
    ValidationFailed:
      description: 요청 필드의 의미 또는 값이 유효하지 않음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: 요청 값을 확인해 주세요.
              request_id: req_01HXYZ
              details:
                field_violations:
                  - field: content
                    reason: 빈 문자열일 수 없습니다.
    RateLimited:
      description: 요청 한도를 초과함
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RATE_LIMITED
              message: 잠시 후 다시 시도해 주세요.
              request_id: req_01HXYZ
              details: null
    InternalServerError:
      description: 예상하지 못한 서버 오류
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_ERROR
              message: 요청을 처리하지 못했습니다.
              request_id: req_01HXYZ
              details: null
    ServiceUnavailable:
      description: 데이터베이스 또는 AI 의존 서비스를 사용할 수 없음
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: DEPENDENCY_UNAVAILABLE
              message: 일시적으로 서비스를 사용할 수 없습니다.
              request_id: req_01HXYZ
              details: null

  schemas:
    ResourceId:
      type: string
      minLength: 1
      description: 형식을 클라이언트가 해석하지 않는 불투명 리소스 ID
      examples: [resource_01HXYZ]

    CourseRole:
      type: string
      enum: [PROFESSOR, STUDENT]
      description: 전역 역할이 아닌 특정 Course 안에서의 사용자 역할

    CourseRoleFilter:
      type: string
      enum: [ALL, PROFESSOR, STUDENT]
      default: ALL

    LectureSessionStatus:
      type: string
      enum: [READY, LIVE, PROCESSING, COMPLETED]
      description: |
        PROCESSING은 종료 후 공용 Job 또는 Recording upload를 기다리는 상태다. Recording이
        있으면 UPLOADED/FAILED가 PR3 저장 gate의 terminal 상태다. HQ STT Job·Transcript 상태,
        upload 미완료 timeout과 최종 Session 완료 조건은 PR4에서 확정한다.
        한 Course에는 READY, LIVE, PROCESSING 중 하나인 active Session이 합계 최대 1개다.

    SessionRecordingStatus:
      type: string
      enum: [CAPTURING, UPLOAD_PENDING, UPLOADING, UPLOADED, FAILED]
      description: |
        CAPTURING은 첫 audio publisher가 live PCM과 브라우저 로컬 녹음을 생성하는 상태다.
        Session 종료 시 UPLOAD_PENDING, resumable upload 시작 시 UPLOADING, upload 완결 시
        playback과 HQ STT 시작이 가능한 UPLOADED가 된다. FAILED는 capture·upload·storage
        검증 실패의 terminal 공개 상태다. HQ STT·Transcript 처리 상태는 PR4 책임이다.

    RecordingUploadStatus:
      type: string
      enum: [ACTIVE, COMPLETED, EXPIRED, FAILED]
      description: |
        resumable upload resource의 공개 상태. 정확한 expiry 값과 만료·실패 후 Recording
        전이 및 재시작 정책은 구현 전에 확정해야 한다.

    MaterialProcessingStatus:
      type: string
      enum: [UPLOADED, PROCESSING, READY, FAILED]
      description: |
        UPLOADED는 업로드 수락 후 처리 대기, PROCESSING은 전처리 중, READY는 AI 검색과
        근거 생성에 사용 가능, FAILED는 전처리 실패를 뜻한다. 연결된 PROCESSING 자료는
        class 시작을 차단한다. UPLOADED, PROCESSING, FAILED와 분리된 자료는 AI 근거에서
        제외하며, 분리는 이 공개 enum에 별도 상태로 추가하지 않는다.

    QuestionStatus:
      type: string
      enum: [OPEN, SELECTED, ANSWERED]

    QuestionSort:
      type: string
      enum: [POPULAR, RECENT]
      default: POPULAR

    AnswerStatus:
      type: string
      enum: [CAPTURING, COMPLETED, CANCELLED]
      description: 답변 구간 캡처 흐름을 위한 초안 상태

    SummaryType:
      type: string
      enum: [LIVE, FINAL]

    SummaryVisibility:
      type: string
      enum: [REQUESTER_ONLY, COURSE_MEMBERS]
      description: LIVE는 REQUESTER_ONLY, FINAL은 COURSE_MEMBERS

    ChatMode:
      type: string
      enum: [LIVE, REVIEW]

    ChatMessageRole:
      type: string
      enum: [USER, ASSISTANT]

    AIJobStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED]

    AIJobVisibility:
      type: string
      enum: [SHARED, REQUESTER_ONLY]
      description: SHARED는 Course 멤버 공개, REQUESTER_ONLY는 작업 요청자에게만 공개

    AIJobType:
      type: string
      enum:
        - MATERIAL_PROCESSING
        - QUESTION_CLUSTERING
        - LIVE_SUMMARY
        - FINAL_SUMMARY
        - CHAT_RESPONSE
        - SESSION_POSTPROCESSING
      description: 사용자에게 공개하는 작업 purpose. provider 내부 작업명은 노출하지 않음

    SharedAIJobType:
      type: string
      enum:
        - MATERIAL_PROCESSING
        - QUESTION_CLUSTERING
        - FINAL_SUMMARY
        - SESSION_POSTPROCESSING
      description: Session 공용 Job 목록에서 조회할 수 있는 유형

    RealtimeTicketScope:
      type: string
      enum: [SESSION_EVENTS_READ, SESSION_AUDIO_WRITE]

    RealtimeTicketCreateRequest:
      type: object
      additionalProperties: false
      required: [session_id, scope]
      properties:
        session_id:
          $ref: "#/components/schemas/ResourceId"
        scope:
          $ref: "#/components/schemas/RealtimeTicketScope"
        resume_cursor:
          type: [string, "null"]
          description: SESSION_EVENTS_READ 재연결 시 마지막 event cursor. 신규 연결·audio scope면 생략

    RealtimeTicket:
      type: object
      additionalProperties: false
      required: [ticket, session_id, scope, expires_at]
      properties:
        ticket:
          type: string
          minLength: 1
          description: 60초 안에 한 번만 WebSocket upgrade에 사용할 수 있는 비밀 값
        session_id:
          $ref: "#/components/schemas/ResourceId"
        scope:
          $ref: "#/components/schemas/RealtimeTicketScope"
        expires_at:
          type: string
          format: date-time

    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: ok

    DatabaseHealthResponse:
      type: object
      additionalProperties: false
      required: [status, database]
      properties:
        status:
          type: string
          const: ok
        database:
          type: string
          const: reachable

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message, request_id, details]
      properties:
        code:
          type: string
          description: 클라이언트가 분기 처리할 안정적인 오류 코드
        message:
          type: string
          description: 사용자에게 표시할 수 있는 안전한 한국어 메시지
        request_id:
          type: string
          description: 서버 로그와 연결하는 요청 ID
        details:
          description: 민감정보를 제외한 선택적 진단 정보
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"

    User:
      type: object
      additionalProperties: false
      required: [id, display_name, email, avatar_url]
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        display_name:
          type: string
        email:
          type: [string, "null"]
          format: email
          description: 인증 제공자와 공개 정책에 따라 null일 수 있음
        avatar_url:
          type: [string, "null"]
          format: uri

    CourseCreateRequest:
      type: object
      additionalProperties: false
      required: [title, semester]
      properties:
        title:
          type: string
          minLength: 1
          description: 길이 제한은 제품 검토 후 확정
        semester:
          type: string
          minLength: 1
          description: 표시용 학기 문자열. 구조화 여부는 TBD

    CourseJoinRequest:
      type: object
      additionalProperties: false
      required: [join_code]
      properties:
        join_code:
          type: string
          pattern: '^\s*[A-Za-z]{6}\s*$'
          description: |
            앞뒤 공백을 제거하고 대문자로 정규화한다. 정규화 결과는 `[A-Z]{6}`이며
            구분자를 허용하지 않는다. 코드는 만료되지 않고 회전 시 이전 값이 즉시 무효화된다.

    LectureSessionSummary:
      type: object
      additionalProperties: false
      required: [id, title, lecture_date, status, started_at]
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
        lecture_date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/LectureSessionStatus"
        started_at:
          type: [string, "null"]
          format: date-time
          description: READY이면 null, 시작된 Session이면 실제 시작 시각

    Course:
      type: object
      additionalProperties: false
      description: 계정 전역 역할은 없으며 Course에는 정확히 한 명의 PROFESSOR가 존재한다.
      required:
        - id
        - title
        - semester
        - role
        - current_session
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
        semester:
          type: string
        role:
          $ref: "#/components/schemas/CourseRole"
          description: 현재 인증 사용자의 이 Course 안 역할
        join_code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[A-Z]{6}$'
          description: 현재 사용자가 이 Course의 PROFESSOR일 때만 제공하는 정규화된 참여 코드
        current_session:
          oneOf:
            - $ref: "#/components/schemas/LectureSessionSummary"
            - type: "null"
          description: READY, LIVE, PROCESSING 중 하나인 유일한 active Session. 없으면 null
        created_at:
          type: string
          format: date-time

    CourseListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Course"
        next_cursor:
          type: [string, "null"]

    LectureSessionCreateRequest:
      type: object
      additionalProperties: false
      required: [lecture_date]
      properties:
        title:
          type: string
          description: |
            선택적 제목. 앞뒤 공백을 제거한 값이 비어 있으면 서버가 Course 제목·class
            날짜·시각을 포함한 자동 제목을 생성한다. 정확한 문자열 형식, READY에서
            사용할 시각 원장과 timezone은 아직 미정이다.
        lecture_date:
          type: string
          format: date

    LectureSessionUpdateRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          description: |
            앞뒤 공백을 제거한 값으로 수정한다. 빈 문자열이면 Course 제목·class 날짜·시각을
            포함한 서버 자동 제목으로 되돌린다. 정확한 형식·시각 원장·timezone은 미정이며,
            lecture_date와 시작·종료·완료 시각은 이 요청으로 변경할 수 없다.

    LectureSession:
      type: object
      additionalProperties: false
      required:
        - id
        - course_id
        - title
        - lecture_date
        - status
        - version
        - started_at
        - ended_at
        - completed_at
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        course_id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
        lecture_date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/LectureSessionStatus"
        version:
          type: integer
          minimum: 1
          description: 실시간 이벤트의 오래된 갱신을 거르기 위한 리소스 버전 초안
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
          description: COMPLETED 전환 시각. 그 전에는 null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LectureSessionListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LectureSession"
        next_cursor:
          type: [string, "null"]

    SessionEndAcceptedResponse:
      type: object
      additionalProperties: false
      required: [session, recording, jobs]
      properties:
        session:
          $ref: "#/components/schemas/LectureSession"
        recording:
          oneOf:
            - $ref: "#/components/schemas/SessionRecording"
            - type: "null"
          description: 첫 audio.start가 없었던 Session이면 null. 있으면 UPLOAD_PENDING Recording
        jobs:
          type: array
          description: |
            종료 시점에 생성할 수 있는 upload 비의존 공용 Job. HQ STT의 구체 Job type과
            응답은 PR4에서 정의하며 Recording upload complete 전에는 시작하지 않는다.
          items:
            $ref: "#/components/schemas/AIJob"

    SessionRecording:
      type: object
      additionalProperties: false
      description: |
        Session의 논리 녹음 aggregate를 나타내는 안전한 외부 표현이다. 물리 저장물이 단일
        파일인지 fragment와 manifest인지, storage key와 서버 경로가 무엇인지는 노출하지 않는다.
      required:
        - id
        - session_id
        - status
        - version
        - content_type
        - byte_size
        - duration_ms
        - playback_url
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        status:
          $ref: "#/components/schemas/SessionRecordingStatus"
        version:
          type: integer
          minimum: 1
          description: recording.updated의 오래된 갱신을 거르기 위한 리소스 버전
        content_type:
          type: [string, "null"]
          description: upload format 확정 전 또는 아직 upload되지 않았으면 null
        byte_size:
          type: [integer, "null"]
          minimum: 1
          description: upload 완결 전에는 null
        duration_ms:
          type: [integer, "null"]
          minimum: 0
          description: 브라우저가 보고하고 서버가 검증한 재생 길이. 검증 전에는 null
        playback_url:
          type: [string, "null"]
          description: |
            현재 권한으로 UPLOADED 녹음을 조회할 상대 API 경로. 준비 전이거나 접근 정책상
            재생할 수 없으면 null이며 내부 storage URL을 반환하지 않는다.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecordingUploadCreateRequest:
      type: object
      additionalProperties: false
      required: [client_stream_id, content_type, total_bytes, duration_ms]
      properties:
        client_stream_id:
          type: string
          minLength: 1
          description: 첫 audio.start에서 publisher를 claim한 동일한 client stream ID
        content_type:
          type: string
          minLength: 1
          description: 허용 codec·container와 MIME 목록은 TBD
        total_bytes:
          type: integer
          minimum: 1
          description: 최대 녹음 크기는 TBD
        duration_ms:
          type: integer
          minimum: 0
          description: 브라우저 로컬 녹음이 보고한 전체 재생 길이

    RecordingUpload:
      type: object
      additionalProperties: false
      description: |
        resumable upload의 안전한 공개 상태다. 임시 storage 경로, storage key, fragment와
        manifest는 포함하지 않는다. offset 전달 header와 wire protocol은 아직 미정이다.
      required:
        - id
        - recording_id
        - status
        - offset_bytes
        - total_bytes
        - expires_at
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        recording_id:
          $ref: "#/components/schemas/ResourceId"
        status:
          $ref: "#/components/schemas/RecordingUploadStatus"
        offset_bytes:
          type: integer
          minimum: 0
          description: 서버가 연속적으로 확인한 다음 write 위치
        total_bytes:
          type: integer
          minimum: 1
        expires_at:
          type: string
          format: date-time
          description: 정확한 upload 유효 기간은 TBD
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecordingUploadCompletedResponse:
      type: object
      additionalProperties: false
      required: [recording]
      properties:
        recording:
          $ref: "#/components/schemas/SessionRecording"
          description: |
            upload 완결 뒤 UPLOADED로 전이된 Recording. HQ STT의 구체 Job·Transcript 응답은
            PR4에서 추가한다.

    LectureMaterial:
      type: object
      additionalProperties: false
      description: 외부에서 연결된 강의자료. 스토리지 키와 detached_at은 공개하지 않는다.
      required:
        - id
        - session_id
        - display_name
        - mime_type
        - byte_size
        - page_count
        - processing_status
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        display_name:
          type: string
          minLength: 1
          description: 업로드 시 충돌 suffix를 적용해 확정하고 이후 조회에서 재계산하지 않는 표시명
        mime_type:
          type: string
          const: application/pdf
        byte_size:
          type: integer
          minimum: 1
          maximum: 100000000
        page_count:
          type: [integer, "null"]
          minimum: 1
          description: 전처리 전 또는 실패 시 null일 수 있음
        processing_status:
          $ref: "#/components/schemas/MaterialProcessingStatus"
        created_at:
          type: string
          format: date-time

    LectureMaterialListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          maxItems: 10
          description: 외부에서 연결된 자료만 포함
          items:
            $ref: "#/components/schemas/LectureMaterial"
        next_cursor:
          type: [string, "null"]

    MaterialUploadAcceptedResponse:
      type: object
      additionalProperties: false
      required: [material, job]
      properties:
        material:
          $ref: "#/components/schemas/LectureMaterial"
        job:
          $ref: "#/components/schemas/AIJob"
          description: visibility=SHARED, blocks_session_completion=false인 MATERIAL_PROCESSING Job

    TranscriptSegment:
      type: object
      additionalProperties: false
      description: 영구 저장된 final Transcript 구간. partial 구간은 이 스키마로 저장하지 않는다.
      required:
        - id
        - session_id
        - sequence
        - start_ms
        - end_ms
        - text
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        sequence:
          type: integer
          minimum: 1
        start_ms:
          type: integer
          minimum: 0
        end_ms:
          type: integer
          minimum: 0
          description: start_ms 이상이어야 함
        text:
          type: string
          minLength: 1
        created_at:
          type: string
          format: date-time

    TranscriptSegmentListResponse:
      type: object
      additionalProperties: false
      required: [items, next_sequence]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptSegment"
        next_sequence:
          type: [integer, "null"]
          minimum: 1
          description: 다음 증분 조회에 사용할 마지막 sequence. 더 없으면 null

    QuestionClusterSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - summary
        - generation
        - ordinal
        - is_final
        - finalized_at
        - created_by_job_id
        - created_by_job_attempt
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
          description: 클러스터링 결과가 만든 대표 질문 문장
        summary:
          type: [string, "null"]
        generation:
          type: integer
          minimum: 1
          description: 같은 클러스터링 결과의 Cluster가 공유하는 Session 내 세대 번호
        ordinal:
          type: integer
          minimum: 0
          description: 같은 generation 안의 안정적인 표시 순서
        is_final:
          type: boolean
          description: 수업 종료 후 확정된 최종 클러스터인지 여부
        finalized_at:
          type: [string, "null"]
          format: date-time
          description: is_final이면 확정 시각, 아니면 null
        created_by_job_id:
          $ref: "#/components/schemas/ResourceId"
        created_by_job_attempt:
          type: integer
          minimum: 1
          description: Cluster를 생성한 Job attempt snapshot

    Question:
      type: object
      additionalProperties: false
      description: 작성자 식별 필드를 의도적으로 포함하지 않는 공개 익명 질문 표현
      required:
        - id
        - session_id
        - content
        - status
        - version
        - reaction_count
        - reacted_by_me
        - cluster
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        content:
          type: string
        status:
          $ref: "#/components/schemas/QuestionStatus"
        version:
          type: integer
          minimum: 1
        reaction_count:
          type: integer
          minimum: 0
        reacted_by_me:
          type: boolean
          description: 현재 인증 사용자의 반응 여부
        cluster:
          oneOf:
            - $ref: "#/components/schemas/QuestionClusterSummary"
            - type: "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    QuestionCreateRequest:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          description: 최대 길이와 정규화 규칙은 TBD

    QuestionCreateResponse:
      type: object
      additionalProperties: false
      required: [question, clustering_job]
      properties:
        question:
          $ref: "#/components/schemas/Question"
        clustering_job:
          $ref: "#/components/schemas/AIJob"
          description: 질문 저장과 독립적으로 실행되는 공용 클러스터링 Job

    QuestionListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        next_cursor:
          type: [string, "null"]

    QuestionDraftRequest:
      type: object
      additionalProperties: false
      required: [draft]
      properties:
        draft:
          type: string
          minLength: 1
          description: 공개 질문이 아니며 기본적으로 영구 저장하지 않는 사용자 초안

    QuestionDraftResponse:
      type: object
      additionalProperties: false
      required: [suggestions]
      properties:
        suggestions:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1

    QuestionReactionState:
      type: object
      additionalProperties: false
      required: [question_id, reaction_count, reacted_by_me]
      properties:
        question_id:
          $ref: "#/components/schemas/ResourceId"
        reaction_count:
          type: integer
          minimum: 0
        reacted_by_me:
          type: boolean

    AnswerTargetQuestions:
      type: object
      additionalProperties: false
      required: [type, question_ids]
      properties:
        type:
          type: string
          const: QUESTIONS
        question_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ResourceId"

    AnswerTargetCluster:
      type: object
      additionalProperties: false
      required: [type, cluster_id]
      properties:
        type:
          type: string
          const: CLUSTER
        cluster_id:
          $ref: "#/components/schemas/ResourceId"

    AnswerTarget:
      oneOf:
        - $ref: "#/components/schemas/AnswerTargetQuestions"
        - $ref: "#/components/schemas/AnswerTargetCluster"
      discriminator:
        propertyName: type
        mapping:
          QUESTIONS: "#/components/schemas/AnswerTargetQuestions"
          CLUSTER: "#/components/schemas/AnswerTargetCluster"

    AnswerCreateRequest:
      type: object
      additionalProperties: false
      required: [target]
      properties:
        target:
          $ref: "#/components/schemas/AnswerTarget"

    AnswerCompleteRequest:
      type: object
      additionalProperties: false
      required: [start_sequence, end_sequence]
      properties:
        start_sequence:
          type: integer
          minimum: 1
        end_sequence:
          type: integer
          minimum: 1
          description: start_sequence 이상이며 같은 Session에 속해야 함

    Answer:
      type: object
      additionalProperties: false
      required:
        - id
        - session_id
        - status
        - version
        - question_ids
        - source_cluster_id
        - source_cluster_title_snapshot
        - capture_started_after_sequence
        - start_sequence
        - end_sequence
        - started_at
        - completed_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        status:
          $ref: "#/components/schemas/AnswerStatus"
        version:
          type: integer
          minimum: 1
        question_ids:
          type: array
          minItems: 1
          uniqueItems: true
          description: 클러스터 선택 시에도 선택 시점 질문 ID를 스냅샷으로 저장
          items:
            $ref: "#/components/schemas/ResourceId"
        source_cluster_id:
          type: [string, "null"]
          description: 클러스터 선택 당시 ID snapshot. 직접 질문 선택이면 null
        source_cluster_title_snapshot:
          type: [string, "null"]
          description: |
            클러스터 선택 당시 대표 질문 문장의 정확한 text snapshot. 직접 질문 선택이면
            source_cluster_id와 함께 null이며 이후 Cluster 교체·삭제와 무관하게 유지된다.
        capture_started_after_sequence:
          type: integer
          minimum: 0
          description: 답변 대상 선택 시점에 이미 존재하던 마지막 final sequence. 없으면 0
        start_sequence:
          type: [integer, "null"]
          minimum: 1
          description: 자동 후보 또는 확정 답변에 포함되는 첫 final sequence. 아직 없으면 null
        end_sequence:
          type: [integer, "null"]
          minimum: 1
          description: 답변 완료 시 확정된 마지막 final Transcript sequence
        started_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time

    AnswerListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Answer"
        next_cursor:
          type: [string, "null"]

    SummaryRange:
      type: object
      additionalProperties: false
      required: [start_sequence, end_sequence]
