openapi: 3.1.0
info:
  title: GOAL API
  version: 0.1.0
  description: |
    GOAL(God Of All Lectures) MVP의 HTTP API 설계 초안이다.

    - 비즈니스 API는 `/api/v1`을 권장 경로로 사용한다.
    - ID는 형식이 확정되지 않았으므로 불투명 문자열로 정의한다.
    - Google OAuth/OIDC 완료 후 서버 세션을 만들고 HttpOnly Cookie로 인증한다.
    - Course 역할은 전역 권한이 아니라 Course 멤버십으로 판정한다.
    - WebSocket과 오디오 스트리밍 계약은 OpenAPI 표준 범위 밖이므로
      최상위 `x-websocket-channels`에 참고용 초안으로 기록한다.
    - 구현 후에는 FastAPI가 생성하는 `/openapi.json`과 이 문서를 함께 검증한다.
  contact:
    name: GOAL Team
servers:
  - url: /
    description: 현재 호스트
tags:
  - name: Health
    description: 인증이 필요 없는 상태 점검
  - name: Auth
    description: Google 로그인과 서버 세션 종료
  - name: Users
    description: 현재 사용자 정보
  - name: Courses
    description: 한 학기 단위 Course와 Course별 역할
  - name: Sessions
    description: Course 안의 날짜별 강의 세션
  - name: Materials
    description: 강의자료 PDF와 전처리 상태
  - name: Transcript
    description: 영구 저장된 final Transcript
  - name: Questions
    description: 익명 질문, 질문 작성 도움과 반응
  - name: Answers
    description: 교수자 답변 구간 연결
  - name: Summaries
    description: 수업 중·수업 후 AI 요약
  - name: Chats
    description: 세션 문맥 기반 개인 AI 대화
  - name: Jobs
    description: 비동기 AI 작업 상태와 재시도
  - name: Realtime
    description: WebSocket 연결용 단기·1회용 티켓
  - name: Records
    description: 정리 중·완료 수업 기록
security:
  - sessionCookieAuth: []

paths:
  /api/health:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Health]
      operationId: getApiHealth
      summary: API 프로세스 상태 확인
      description: 외부 서비스에 의존하지 않는 liveness probe이다.
      security: []
      responses:
        "200":
          description: API 프로세스가 요청을 처리할 수 있음
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

  /api/health/db:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Health]
      operationId: getDatabaseHealth
      summary: 데이터베이스 연결 상태 확인
      description: PostgreSQL 연결과 간단한 쿼리를 확인하는 readiness probe이다.
      security: []
      responses:
        "200":
          description: 데이터베이스에 연결할 수 있음
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseHealthResponse"
              example:
                status: ok
                database: reachable
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/auth/google/start:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Auth]
      operationId: startGoogleLogin
      summary: Google 로그인 시작
      description: |
        state, nonce와 PKCE 값을 서버 세션에 저장한 뒤 Google authorization endpoint로
        redirect한다. `return_to`는 같은 서비스의 허용된 상대 경로만 받는다.
      security: []
      parameters:
        - name: return_to
          in: query
          required: false
          description: 로그인 완료 후 이동할 허용된 프런트엔드 상대 경로
          schema:
            type: string
            default: /
      responses:
        "302":
          description: Google 로그인 화면으로 redirect
          headers:
            Location:
              description: Google authorization URL
              schema:
                type: string
                format: uri
            Cache-Control:
              description: 인증 redirect 캐시 금지
              schema:
                type: string
                const: no-store
            Set-Cookie:
              description: state·PKCE 검증용 10분 만료 HttpOnly 임시 Cookie
              schema:
                type: string
                example: goal_oauth=opaque; Path=/api/v1/auth/google; HttpOnly; Secure; SameSite=Lax; Max-Age=600
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/auth/google/callback:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Auth]
      operationId: completeGoogleLogin
      summary: Google 로그인 callback
      description: |
        state·nonce·PKCE를 검증하고 authorization code를 교환한 뒤 User와 서버 세션을
        생성하거나 갱신한다. 성공 시 `goal_session` Cookie를 설정하고 저장된 return_to로
        redirect한다. Provider 오류 원문은 브라우저나 로그에 남기지 않는다.
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: 사용자가 동의하지 않았을 때 Provider가 전달할 수 있는 오류 코드
          schema:
            type: string
      responses:
        "302":
          description: 로그인 완료 또는 안전한 로그인 실패 화면으로 redirect
          headers:
            Location:
              description: 검증된 프런트엔드 상대 경로
              schema:
                type: string
            Set-Cookie:
              description: 성공 시 HttpOnly 서버 세션 Cookie를 설정하고 임시 goal_oauth Cookie를 만료
              schema:
                type: string
                example: goal_session=opaque; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=604800
            Cache-Control:
              description: 인증 callback 캐시 금지
              schema:
                type: string
                const: no-store
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/auth/logout:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Auth]
      operationId: logout
      summary: 로그아웃
      description: |
        서버 세션을 폐기하고 Cookie를 만료시킨다. 반복 호출은 성공하며 상태 변경 요청은
        허용된 Origin인지 검사한다.
      security: []
      responses:
        "204":
          description: 서버 세션 폐기 또는 이미 로그아웃 상태
          headers:
            Set-Cookie:
              description: goal_session Cookie 만료
              schema:
                type: string
                example: goal_session=; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=0
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/me:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Users]
      operationId: getCurrentUser
      summary: 내 정보 조회
      description: 인증된 사용자의 기본 프로필을 반환한다.
      responses:
        "200":
          description: 현재 사용자 정보
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/realtime-tickets:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Realtime]
      operationId: createRealtimeTicket
      summary: WebSocket 연결 티켓 발급
      description: |
        정상 HTTP 인증으로 Session scope의 60초 만료·1회용 티켓을 발급한다.
        `SESSION_EVENTS_READ`는 Course 멤버, `SESSION_AUDIO_WRITE`는 해당 Course의
        PROFESSOR이면서 LIVE Session일 때만 발급한다. 응답과 티켓을 로그에 남기지 않는다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RealtimeTicketCreateRequest"
            examples:
              events:
                value:
                  session_id: session_01HXYZ
                  scope: SESSION_EVENTS_READ
                  resume_cursor: null
              audio:
                value:
                  session_id: session_01HXYZ
                  scope: SESSION_AUDIO_WRITE
      responses:
        "201":
          description: 발급된 단기·1회용 WebSocket 티켓
          headers:
            Cache-Control:
              description: 티켓 응답 캐시 금지
              schema:
                type: string
                const: no-store
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeTicket"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/courses:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Courses]
      operationId: listMyCourses
      summary: 내 Course 목록 조회
      description: 현재 사용자가 멤버인 Course만 반환한다.
      parameters:
        - name: role
          in: query
          required: false
          description: 현재 사용자의 Course별 역할 필터
          schema:
            $ref: "#/components/schemas/CourseRoleFilter"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Course 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Courses]
      operationId: createCourse
      summary: Course 생성
      description: Course를 생성하고 요청 사용자를 해당 Course의 PROFESSOR로 등록한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseCreateRequest"
            example:
              title: 알고리즘
              semester: 2026 여름학기
      responses:
        "201":
          description: 생성된 Course
          headers:
            Location:
              description: 생성된 Course의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/courses/join:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Courses]
      operationId: joinCourse
      summary: 참여 코드로 Course 참여
      description: |
        참여 코드를 검증하고 요청 사용자를 STUDENT로 등록한다.
        이미 같은 Course의 학생이면 기존 멤버십을 반환할 수 있으며,
        PROFESSOR 멤버십을 STUDENT로 덮어쓰지 않는다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseJoinRequest"
            example:
              join_code: A7K9Q2
      responses:
        "200":
          description: 이미 존재하는 학생 멤버십의 Course
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "201":
          description: 새 학생 멤버십이 생성된 Course
          headers:
            Location:
              description: 참여한 Course의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/courses/{course_id}:
    parameters:
      - $ref: "#/components/parameters/CourseId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Courses]
      operationId: getCourse
      summary: Course 상세 조회
      description: |
        Course 멤버만 조회할 수 있다. `join_code`는 현재 사용자가 이 Course의
        PROFESSOR일 때만 포함하고 다른 사용자 응답에서는 필드를 생략한다.
      responses:
        "200":
          description: Course 상세
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/courses/{course_id}/sessions:
    parameters:
      - $ref: "#/components/parameters/CourseId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Sessions]
      operationId: listCourseSessions
      summary: Course의 class 목록 조회
      description: Course 멤버만 조회할 수 있다.
      parameters:
        - name: status
          in: query
          required: false
          description: Session 상태 필터
          schema:
            $ref: "#/components/schemas/LectureSessionStatus"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: LectureSession 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSessionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Sessions]
      operationId: createCourseSession
      summary: class 생성
      description: 해당 Course의 PROFESSOR만 생성할 수 있으며 초기 상태는 READY이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LectureSessionCreateRequest"
            example:
              title: 그래프 탐색과 최단 경로
              lecture_date: "2026-07-11"
      responses:
        "201":
          description: 생성된 LectureSession
          headers:
            Location:
              description: 생성된 Session의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/sessions/{session_id}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Sessions]
      operationId: getSession
      summary: class 상세 조회
      description: Session이 속한 Course의 멤버만 조회할 수 있다.
      responses:
        "200":
          description: LectureSession 상세
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/start:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Sessions]
      operationId: startSession
      summary: class 시작
      description: |
        해당 Course의 PROFESSOR만 실행할 수 있다. READY에서 LIVE로 전이한다.
        PDF 준비 완료를 필수 선행 조건으로 둘지는 아직 미정이다.
      responses:
        "200":
          description: LIVE로 전환된 LectureSession
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/end:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Sessions]
      operationId: endSession
      summary: class 종료와 후처리 시작
      description: |
        해당 Course의 PROFESSOR만 실행할 수 있다. LIVE에서 PROCESSING으로 전이하고
        Transcript 확정과 종료 후처리 작업을 생성한다. 같은 요청의 반복 호출은 새 작업을
        중복 생성하지 않고 기존 Session과 작업을 반환해야 한다. 정상 흐름은 audio.stop과
        audio.stopped 이후 호출하며, 먼저 호출되면 새 audio frame을 차단하고 수신분만 drain한다.
        CAPTURING Answer가 있으면 409로 거부한다. 종료 시 생성한 공용 Job이 모두 SUCCEEDED
        또는 FAILED에 도달하면 일부 실패가 있어도 COMPLETED로 전환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: 종료 요청이 수락되어 후처리가 시작됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEndAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/materials:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Materials]
      operationId: listSessionMaterials
      summary: 강의자료 목록 조회
      description: Session이 속한 Course의 멤버만 조회할 수 있다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 강의자료 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureMaterialListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Materials]
      operationId: uploadSessionMaterial
      summary: 강의자료 PDF 업로드
      description: |
        해당 Course의 PROFESSOR만 업로드할 수 있다. 원본 PDF 저장 후 텍스트 추출과
        임베딩 작업을 비동기로 수행한다. 파일 제한은 서버 `MAX_UPLOAD_BYTES` 설정을
        따르며 현재 예시는 50 MiB이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: MIME과 실제 내용이 유효한 PDF 파일
            encoding:
              file:
                contentType: application/pdf
      responses:
        "202":
          description: 파일이 저장되고 전처리 작업이 수락됨
          headers:
            Location:
              description: 업로드된 Material의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialUploadAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"

