    RealtimeEvent:
      type: object
      additionalProperties: false
      description: |
        WebSocket 서버 이벤트의 공통 envelope 초안. 이벤트는 중복 전달될 수 있으며
        클라이언트는 event_id로 중복을 제거하고 낮은 resource_version을 무시한다.
      required:
        - schema_version
        - event_id
        - type
        - session_id
        - cursor
        - resource_version
        - correlation_id
        - occurred_at
        - data
      properties:
