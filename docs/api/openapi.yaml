        - last_final_sequence
        - lag_ms
      properties:
        stream_status:
          type: string
          enum: [LISTENING, DEGRADED, FINALIZING, FINALIZED, STOPPED]
          description: 영구 TranscriptVersionStatus와 별개인 live STT 전송 상태
        transcript_version_id:
          $ref: "#/components/schemas/ResourceId"
        transcript_version:
          type: integer
          minimum: 1
        transcript_version_status:
          $ref: "#/components/schemas/TranscriptVersionStatus"
        is_canonical:
          type: boolean
        last_final_sequence:
          type: [integer, "null"]
          minimum: 1
        lag_ms:
          type: [integer, "null"]
          minimum: 0

    ReactionUpdatedPayload:
      type: object
      additionalProperties: false
      required: [question_id, reaction_count]
      properties:
