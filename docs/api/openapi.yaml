          type: string
          minLength: 1
          description: 최대 길이는 모델·제품 정책 확정 후 결정

    ChatEvidence:
      type: object
      additionalProperties: false
      required: [source_type, label, resource_url]
      properties:
        source_type:
          type: string
          enum: [MATERIAL_CHUNK, TRANSCRIPT_SEGMENT, QUESTION, ANSWER]
        label:
          type: [string, "null"]
