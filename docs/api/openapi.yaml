        - source_end_sequence
        - model_name
        - prompt_version
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        job_id:
          $ref: "#/components/schemas/ResourceId"
          description: 이 요약을 생성한 AIJob
        summary_type:
          $ref: "#/components/schemas/SummaryType"
        visibility:
          $ref: "#/components/schemas/SummaryVisibility"
        content:
          type: string
        source_start_sequence:
          type: [integer, "null"]
          minimum: 1
        source_end_sequence:
          type: [integer, "null"]
          minimum: 1
        model_name:
          type: [string, "null"]
          description: 모델 공개 정책에 따라 null일 수 있음
        prompt_version:
          type: [string, "null"]
          description: 내부 프롬프트 원문이 아닌 버전 식별자
        created_at:
          type: string
          format: date-time

    SummaryListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LectureSummary"
        next_cursor:
          type: [string, "null"]

    ChatCreateRequest:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          $ref: "#/components/schemas/ChatMode"

    Chat:
      type: object
      additionalProperties: false
      required: [id, session_id, mode, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        session_id:
          $ref: "#/components/schemas/ResourceId"
        mode:
          $ref: "#/components/schemas/ChatMode"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChatListResponse:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
