        - last_processed_sequence
        - last_final_transcript_sequence
      properties:
        type:
          type: string
          const: audio.stopped
        last_received_sequence:
          type: [integer, "null"]
          minimum: 0
        last_processed_sequence:
          type: [integer, "null"]
          minimum: 0
        last_final_transcript_sequence:
          type: [integer, "null"]
          minimum: 1

    AudioResumeRejectedControl:
      type: object
      additionalProperties: false
      required: [type, reason]
      properties:
        type:
          type: string
          const: audio.resume_rejected
        reason:
          type: string
          enum: [SERVER_STATE_LOST, SEQUENCE_EXPIRED, SESSION_CLOSING]

    AudioStopControl:
      type: object
      additionalProperties: false
      required: [type, request_id]
      properties:
        type:
          type: string
          const: audio.stop
        request_id:
          type: string

    RealtimeError:
      type: object
      additionalProperties: false
      required: [type, code, message, retryable, request_id]
      properties:
        type:
          type: string
          const: error
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        request_id:
          type: [string, "null"]

x-recording-contract:
  status: draft-with-explicit-tbd
  live_capture:
    source: same browser microphone source
    branches:
      - PCM_S16LE 16000 Hz mono fixed 500 ms frames over the audio WebSocket for live STT
      - browser-local binary recording finalized at Session end and sent by HTTP resumable upload
    channel_separation: Session event WebSocket and audio WebSocket use separate connections and tickets
    publisher: first successful audio.start client_stream_id atomically claims the Session publisher
    reconnect: the same client_stream_id reuses the publisher claim and Recording
    conflict: a different client_stream_id receives AUDIO_PUBLISHER_CONFLICT and close code 4409
    tab_exit_warning: UI responsibility during capture or upload; release condition is TBD, not a WebSocket control message
  recording:
    public_cardinality: zero before audio.start and exactly one logical SessionRecording after the first successful start
    physical_storage: TBD whether one object or multiple fragments, rows and a manifest; public cardinality does not decide DB or object-store cardinality
    safe_metadata: storage keys, server paths, fragment keys and manifests are never exposed
  upload:
    lifecycle: init, offset lookup, binary chunk transfer, complete
    provisional_operations:
      - GET /api/v1/recording-uploads/{upload_id}
      - PATCH /api/v1/recording-uploads/{upload_id}
    checksum_error_code: RECORDING_CHECKSUM_MISMATCH
    hq_stt_gate: successful upload complete atomically creates a RECORDING/FINALIZING TranscriptVersion and SHARED blocking RECORDING_TRANSCRIPTION Job
  transcript:
    statuses: [FINALIZING, FINALIZED, FAILED, EMPTY]
    sources: [LIVE, RECORDING]
    current_status: latest TranscriptVersion status exposed independently from the readable canonical pointer
    canonical_pointer: LectureSession.canonical_transcript_version_id; class start sets LIVE, normal RECORDING FINALIZED or EMPTY replaces it, and RECORDING FAILED preserves LIVE
    job_target: RECORDING
    job_result: TRANSCRIPT_VERSION
    timeline: one merged keyset cursor pinned to a version, with each selected page split into segments and gaps arrays whose combined length is at most limit
    segment_playback_offsets: nullable recording_start_ms and recording_end_ms on Segment only
    gap_fields: start_ms, nullable end_ms and is_final; recording playback offsets are not exposed
    canonical_commit: RECORDING_TRANSCRIPTION commits version, Segment, Gap, Segment time mapping and canonical first
    failure_commit: RECORDING_TRANSCRIPTION failure or timeout removes or rolls back staged Segment and Gap rows, then atomically commits last_sequence 0, TranscriptVersion FAILED and Job FAILED
    failed_timeline: segments and gaps are both empty
    empty_timeline: segments is empty while gaps may contain final Gap entries
    retry_version: each RECORDING_TRANSCRIPTION retry attempt uses the same Job row with attempt plus one and creates a new RECORDING and FINALIZING TranscriptVersion while preserving prior failed versions
    completed_retry_success: automatically requeue the same SESSION_POSTPROCESSING coordinator row with attempt plus one without reverting Session COMPLETED; idempotently rebuild Answer mappings and canonical Knowledge links and create FINAL_SUMMARY if newly eligible, while preserving existing ANSWER_ORGANIZATION Jobs, results, and frozen sources
    answer_remap: SESSION_POSTPROCESSING later commits PENDING, SUCCEEDED or FAILED whole-range mapping; failure never rolls back HQ canonical and partial or unmapped detail enum is TBD
  playback:
    endpoint: GET /api/v1/recordings/{recording_id}/playback
    authorization: revalidated on every request
    range: supports full response and byte Range when UPLOADED
  tbd:
    - resumable offset lookup GET versus HEAD
    - chunk method, offset header, request media type, chunk size and success status
    - checksum algorithm, transport location, verification point and mismatch HTTP status
    - exact upload expiry duration and cleanup behavior
    - recording codec, container, accepted content types, browser-local storage and maximum size
    - physical single object versus fragments and manifest
    - publisher disconnect lease, reacquisition and explicit takeover
    - transcript DEGRADED threshold, audio stop timeout and event replay window
    - recording consent, role-based access, retention and deletion
    - permission-checked proxy playback versus opaque short-lived signed delivery URL
    - whether the preserved LIVE canonical is eligible as the completed record and Summary final source after RECORDING_TRANSCRIPTION failure or no-result deadline
    - exact per-Job timeout for RECORDING_TRANSCRIPTION, which is excluded from the generic 5-minute postprocessing default while the 10-minute Session deadline remains fixed
    - partial or unmapped Answer remap detail enum and manual recovery policy

x-contract-notes:
  worker_liveness:
    heartbeat_interval_seconds: 15
    lease_timeout_seconds: 60
    generic_postprocessing_job_timeout_seconds: 300
    generic_timeout_excludes: [RECORDING_TRANSCRIPTION]
    recording_transcription_job_timeout_seconds: TBD
    websocket_ping_seconds: 20
    note: worker heartbeat and lease are fixed internal execution liveness values independent from WebSocket ping; the Session-wide processing deadline remains 600 seconds even though the HQ per-Job timeout is TBD
  session_processing_deadline:
    starts_at: LectureSession.ended_at
    timeout_seconds: 600
    locks: Session and SESSION_POSTPROCESSING coordinator
    synthesize_missing_downstream_jobs:
      status: FAILED
      retryable: true
      started_at: null
      finished_at: watchdog transaction time
      error_code: SESSION_PROCESSING_TIMEOUT
      missing_final_clustering_input: input_through_sequence is current requested_sequence, base_revision is current_revision, and final_answered_through_at is LectureSession.ended_at
      excludes: eligible RECORDING FINALIZED source missing FINAL_SUMMARY; project DATA_INTEGRITY_ERROR without synthesizing a Job
    summary_state_before_terminal:
      recording_finalized_missing_final_summary: DATA_INTEGRITY_ERROR with null reason; never synthesize a FINAL_SUMMARY Job
      recording_empty: NOT_APPLICABLE with NO_FINAL_TRANSCRIPT
      recording_failed_or_no_hq_or_no_recording_source: FAILED with SUMMARY_SOURCE_UNAVAILABLE
    action_order: synthesize applicable missing downstream blocking Jobs except eligible missing FINAL_SUMMARY and its outbox, record Summary state including DATA_INTEGRITY_ERROR, fail coordinator and remaining Recording or Upload and blocking gates, then evaluate COMPLETED
    retry_after_completed: Job retry does not transition the Session back to PROCESSING
  session_postprocessing_coordinator:
    creation: Session end transaction creates a SHARED blocking PENDING SESSION_POSTPROCESSING Job
    claim_gate: wait until the Recording and HQ source, or the LIVE source when no Recording exists, is terminal
    wake_on_hq_statuses: [FINALIZED, EMPTY, FAILED]
    atomic_terminal: commit coordinator terminal, downstream blocking Job creation and outbox in one transaction before completion reevaluation
    watchdog_terminal: the 10-minute watchdog synthesizes applicable missing downstream blocking Jobs before failing the coordinator, except an eligible missing FINAL_SUMMARY which remains DATA_INTEGRITY_ERROR without a synthetic Job
    failure_isolation: Answer mapping or Knowledge relink failure never rolls back the committed HQ Transcript or canonical pointer
    completed_hq_retry_recovery:
      trigger: a retry of the same RECORDING_TRANSCRIPTION row succeeds after Session COMPLETED
      requeue: automatically move the same SESSION_POSTPROCESSING row to attempt plus one
      session_state: keep COMPLETED and preserve completed_at
      idempotent_rebuild:
        [
          Answer mappings for the new canonical HQ version,
          canonical Knowledge links,
        ]
      create_if_newly_eligible_and_missing: FINAL_SUMMARY
      immutable_existing_outputs: never mutate or silently regenerate an existing ANSWER_ORGANIZATION Job, result, or frozen source
      public_control: use only the already specified Course PROFESSOR generic AIJob retry endpoint for the failed RECORDING_TRANSCRIPTION; no separate HQ retry endpoint or control
  final_summary:
    create_job_only_when: latest HQ TranscriptVersion has source RECORDING, status FINALIZED and at least one final Segment
    recording_empty: no Job; NOT_APPLICABLE with NO_FINAL_TRANSCRIPT
    unavailable: no Job; no Recording source maps to FAILED with SUMMARY_SOURCE_UNAVAILABLE immediately after the LIVE drain becomes terminal; RECORDING FAILED or no HQ result by the 10-minute deadline maps to the same state at that time
    state_reason_combinations:
      PENDING: null
      AVAILABLE: null
      NOT_APPLICABLE: NO_FINAL_TRANSCRIPT
      FAILED: SUMMARY_SOURCE_UNAVAILABLE or null when the Job error carries the downstream failure
      DATA_INTEGRITY_ERROR: null
    ledger_matrix:
      source_gate_waiting_without_job: PENDING with null reason; normal during PROCESSING
      processing_any_attempt_pending_or_running: PENDING with null reason
      completed_explicit_retry_attempt_greater_than_one_pending_or_running: PENDING with null reason
      completed_active_hq_recovery_missing_final_summary_job: PENDING with null reason
      completed_hq_recovery_created_initial_attempt_pending_or_running: PENDING with null reason
      completed_hq_recovery_terminal_and_eligible_source_missing_job: DATA_INTEGRITY_ERROR with null reason and null summary_url
      completed_initial_attempt_pending_or_running_unrelated_to_hq_recovery: DATA_INTEGRITY_ERROR with null reason and null summary_url
      succeeded_job_with_matching_summary: AVAILABLE with null reason and non-null summary_url
      failed_job: FAILED with null reason
      recording_empty_without_job: NOT_APPLICABLE with NO_FINAL_TRANSCRIPT
      source_unavailable_without_job: FAILED with SUMMARY_SOURCE_UNAVAILABLE
      eligible_source_missing_job: DATA_INTEGRITY_ERROR with null reason and null summary_url
      succeeded_job_missing_result_or_other_required_ledger_mismatch: DATA_INTEGRITY_ERROR with null reason and null summary_url
    record_index_examples:
      waiting:
        state: { status: PENDING, reason: null }
        summary_url: null
        summaries_url: /api/v1/sessions/{session_id}/summaries?summary_type=FINAL
      available:
        state: { status: AVAILABLE, reason: null }
        summary_url: /api/v1/summaries/{summary_id}
        summaries_url: /api/v1/sessions/{session_id}/summaries?summary_type=FINAL
      no_transcript:
        state:
          status: NOT_APPLICABLE
          reason: { code: NO_FINAL_TRANSCRIPT }
        summary_url: null
        summaries_url: /api/v1/sessions/{session_id}/summaries?summary_type=FINAL
      source_unavailable:
        state:
          status: FAILED
          reason: { code: SUMMARY_SOURCE_UNAVAILABLE }
        summary_url: null
        summaries_url: /api/v1/sessions/{session_id}/summaries?summary_type=FINAL
      integrity_error:
        state: { status: DATA_INTEGRITY_ERROR, reason: null }
        summary_url: null
        summaries_url: /api/v1/sessions/{session_id}/summaries?summary_type=FINAL
    preserved_live_canonical: excluded from automatic FINAL_SUMMARY; eligibility as completed-record final source is TBD
  question_clustering:
    trigger: every committed student Question increments requested_through_sequence
    concurrency: at most one PENDING or RUNNING QUESTION_CLUSTERING Job per Session
    retry_reservation: a retryable FAILED LIVE Job owning requested greater than applied blocks fresh Job creation and is retried in the same row with attempt plus one
    retry_actor: retry-reserved LIVE Jobs are system-scheduler-only and reject the public retry endpoint
    retry_input: reuse the failed attempt's captured input watermark; later Questions are handled by a fresh Job after success
    live_mode: place only new student Questions into existing Clusters; never move an existing Question
    live_identity: expose a stable logical Cluster ID across LIVE generations; physical generation rows are internal and FINAL full rebuild allocates new logical IDs
    representative_refresh: create immutable representative Questions only for affected Clusters; representative generation is part of Job success
    coalescing: Questions committed while a Job is active or retry-reserved remain pending and are batched by the next fresh Job
    session_end: fence active or retry-reserved LIVE execution and retries, reject late results, and stop LIVE reruns; public terminal representation as CANCELLED or SUPERSEDED versus nonretryable FAILED is TBD
    final_creation: when eligible input exists, the same LIVE-to-PROCESSING transaction creates the SHARED blocking FINAL Job and outbox without waiting for Recording, HQ Transcript or the coordinator; zero-input semantics remain TBD
    final_input: student Questions through the fixed captured requested sequence plus AI representative Questions whose Answer completed by the cutoff; initial cutoff is Session ended_at and an explicit retry of a failed FINAL Job recaptures it at retry acceptance
    watchdog_recovery: a missing eligible FINAL ledger is synthesized as FAILED and retryable with input_through_sequence equal to current requested_sequence, base_revision equal to current_revision, and final_answered_through_at equal to Session ended_at
    final_mode: rebuild every eligible input placement from scratch and create an is_final generation
    final_success_invariant: every eligible input appears in exactly one membership; omissions and duplicates reject success
    final_unclassifiable_input: place it in one stable fallback Cluster whose public representative content is exactly 기타
    result: the current successful Job points to a QUESTION_CLUSTER_GENERATION list aggregate; a replaced generation returns null result with SUPERSEDED
    events: every externally visible watermark, active or retry Job, revision, generation, or last Job transition commits clustering.updated with the post-commit state
    answer_independence: an Answer for a representative Question does not mark its child Questions answered
    discarded_representatives: exclude unanswered replaced or cancelled-PRESERVED representatives from public Cluster, direct lookup and RAG immediately; hard delete when Evidence count is zero, otherwise retain an internal DISCARDED tombstone and KnowledgeChunk only for provenance with Evidence link null; the transaction deleting the last Evidence atomically hard deletes the tombstone and Chunk
    public_representative_lifecycle: [ACTIVE, PRESERVED]
    representative_public_provenance: created_in_generation is required, integer at least one, and immutable across PRESERVED movement
    membership_public_discriminator:
      property: source_kind
      values: [STUDENT_QUESTION, AI_REPRESENTATIVE]
    tbd: similarity threshold, model, prompt, quality score, retry backoff and maximum attempts, post-completion text Answer rebuild policy, zero-input FINAL Job and generation semantics, cursor expiry or restart during generation replacement, preload page count, and large mind-map layout
  answer_organization:
    trigger: completed VOICE Answers expose WAITING_SOURCE without a Job during PROCESSING; after source selection SESSION_POSTPROCESSING creates one SHARED blocking ANSWER_ORGANIZATION Job for each
    source: freeze successful HQ mapped range when available, otherwise the immutable original LIVE range
    result: store AI organization separately from professor-authored text_content and never overwrite either with a stale attempt
    retry: failed Job only, same row and fixed source with attempt plus one; a successful Job is not regenerated in MVP
    timeout: synthesize a FAILED Job for every applicable Answer before the 10-minute completion reconciliation
    tbd: organization format, maximum length, model, prompt, quality criteria, and whether/how to reindex the result as a KnowledgeChunk including producer and transaction ownership
  completed_text_answers:
    create_new_text_only: unanswered STUDENT_QUESTION only
    forbidden_new_targets:
      [
        FINAL or review-only representative Question,
        unanswered ACTIVE representative Question,
        any other representative Question,
      ]
    update_existing_completed_text_content: completed Answer targeting a student Question or an answer-completed PRESERVED representative Question
    immutable_on_update:
      [target, target_text_snapshot, original voice Transcript range]
  record_manifest:
    bounded_embeds: [session, authorized_recording_metadata]
    state_indexes: [transcript, final_summary, question_clustering]
    collection_indexes:
      [
        materials,
        questions,
        current_clusters,
        final_clusters,
        answers,
        shared_jobs,
      ]
    excluded_embeds:
      [
        summary_content,
        materials,
        transcript_segments,
        transcript_gaps,
        questions,
        clusters,
        answers,
        jobs,
      ]
    pagination: opaque keyset cursor with default limit 20 and maximum 100 on each dedicated list endpoint
    question_link_sort: RECENT using created_at DESC and id DESC
    count_semantics: value at the record response transaction and not a cross-request list snapshot token
    transcript_timeline: selected_version_id non-null requires the same value in the transcript_version_id query; a stable range anchor additionally requires paired start_sequence and end_sequence on that same final version
  chat_evidence:
    public_fields: [source_kind, label, link]
    hidden_fields:
      [
        knowledge_chunk_id,
        storage_key,
        internal_path,
        pagination_cursor,
        array_position,
      ]
    source_kinds: [MATERIAL, TRANSCRIPT, QUESTION, ANSWER]
    internal_question_distinctions_are_not_public_enum: true
    link_rule: each source_kind is a discriminated branch whose non-null link must match its anchored public relative path; null only when no safe navigation target remains
    unavailable_representative: keep source_kind QUESTION and label with link null for an internal DISCARDED tombstone; direct lookup remains 404
    discarded_cleanup: deleting the last Evidence atomically hard deletes the DISCARDED representative tombstone and KnowledgeChunk in the same transaction
    stable_targets:
      material: "/api/v1/materials/{material_id}/content with optional #page={page_number} when page_number is non-null"
      transcript: "/api/v1/sessions/{session_id}/transcript?transcript_version_id={transcript_version_id}&start_sequence={start_sequence}&end_sequence={end_sequence}"
      question: "/api/v1/questions/{question_id} or /api/v1/representative-questions/{representative_question_id}; both use source_kind QUESTION"
      answer: "/api/v1/answers/{answer_id}"
  chat_message_provenance:
    USER: job_id, model_name and prompt_version are null; evidence is empty
    ASSISTANT: job_id is required and non-null; evidence may be empty; model_name and prompt_version may be null
  evidence_target_reads:
    unauthenticated: 401
    unauthorized_or_unavailable: 404 without revealing whether the resource exists
    targets:
      [
        material content,
        transcript version and stable sequence range,
        student question,
        AI representative question,
        answer,
      ]
  material_content:
    readable_statuses: [UPLOADED, PROCESSING, READY]
    unavailable: FAILED, detached, unauthorized, or missing returns 404 MATERIAL_NOT_FOUND
    rag_eligible_status: READY only
  personal_ai_delivery:
    transport: REST polling only
    authorized_course_roles: [PROFESSOR, STUDENT]
    modes:
      live_summary: Session LIVE only
      live_chat: Session LIVE only
      review_chat: Session COMPLETED only
      mismatch: 409 SESSION_STATE_CONFLICT
    job_endpoint: GET /api/v1/jobs/{job_id}
    result: use AIJob.result.resource_url to fetch the stored Summary or final Assistant Message
    visibility: requester and current Course member only; conceal nonowner, nonrequester, and nonmember with 404; the owner-facing status for resources deleted by LIVE end purge is TBD
    persisted_generation_output: successful final Summary or Assistant Message only
    partial_output: never persisted or shared
    websocket_events: none; no SSE, streaming HTTP or personal WebSocket
    live_end_transaction:
      transition: LIVE to PROCESSING
      purge:
        [
          LIVE summaries,
          LIVE chats,
          LIVE chat messages,
          LIVE chat evidence,
          requester-only LIVE_SUMMARY jobs,
          requester-only CHAT_RESPONSE jobs belonging to LIVE chats,
        ]
      idempotency: mark related records purge_on_session_end, but early row deletion versus 24-hour retention and the post-purge replay response are TBD
      old_resource_and_job_polling_status: TBD
      late_worker_results: rejected by Job, target, Session state, attempt, and run-token fences
      unaffected:
        [FINAL summaries, REVIEW chats, related jobs and idempotency records]
    chat_turn_transaction:
      commit_together:
        [
          normalized USER Message,
          immutable-target REQUESTER_ONLY CHAT_RESPONSE Job,
          outbox,
          terminal 202 idempotency response,
        ]
      public_inverse: USER Message response_job_id equals Job id
      immutable_target: Job target is the exact USER Message for every attempt
      successful_result: Job result is the stored final ASSISTANT Message
    lock_order:
      candidate_lookup: unlocked identifiers only; acquire locks and revalidate before mutation
      idempotent_live_operation: purge-scoped idempotency rows prefix, Session, then the operation-specific aggregate suffix
      live_chat_response_worker: purge-scoped idempotency rows prefix, Session, Chat, target USER Message, AIJob
      review_chat_response_worker: Session, Chat, target USER Message, AIJob
      live_summary_worker: purge-scoped idempotency rows prefix, Session, AIJob
      purge: purge-scoped idempotency rows prefix, Session, LIVE Summary rows, LIVE Chat rows, LIVE Message rows, LIVE Evidence rows, related requester-only AIJob rows
    chat_user_content:
      normalization: trim surrounding whitespace, then Unicode NFC, then count Unicode code points
      min_code_points: 1
      max_code_points: 2000
      truncation: forbidden
      invalid_response: 422 VALIDATION_ERROR with field, stable reason, max_length and actual_length
  text_input_validation:
    order: [trim-surrounding-whitespace, unicode-nfc, unicode-code-point-length]
    maxima:
      { question_content: 300, question_draft: 500, chat_user_content: 2000 }
    empty_reason: EMPTY_AFTER_NORMALIZATION
    too_long_reason: MAX_LENGTH_EXCEEDED
    details: [field, reason, max_length, actual_length]
    truncation: forbidden
    persisted_values: Question and Chat USER content use the normalized result; Draft is not persisted

x-websocket-channels:
  status: draft
  standard: non-standard-extension
  source_of_truth: ./API_명세서.md#16-websocket과-음성-스트리밍
  note: |
    OpenAPI 3.1은 WebSocket 양방향 메시지를 표준적으로 표현하지 않는다. 이 확장은
    구현 참고용이며 계약이 안정되면 AsyncAPI 분리를 검토한다. WebSocket은 알림·전송
    수단이고 DB와 REST 조회 결과가 최종 진실이다.
  channels:
    /api/v1/ws/sessions/{session_id}:
      summary: Course 멤버용 Session 변경 알림
      authorization: Course membership required
      authentication: POST /api/v1/realtime-tickets의 60초 만료·1회용 SESSION_EVENTS_READ ticket
      handshakeQuery: ticket
      direction: server-to-client-events
      eventEnvelope:
        $ref: "#/components/schemas/RealtimeEvent"
      serverControlMessages:
        - $ref: "#/components/schemas/RealtimeError"
      eventPayloads:
        connection.ready:
          $ref: "#/components/schemas/ConnectionReadyPayload"
        resync.required:
          $ref: "#/components/schemas/ResyncRequiredPayload"
        transcript.partial:
          $ref: "#/components/schemas/TranscriptPartialPayload"
        transcript.final:
          $ref: "#/components/schemas/TranscriptFinalPayload"
        transcript.status:
          $ref: "#/components/schemas/TranscriptStatusPayload"
        transcript.version.updated:
          description: 상태 또는 canonical 포인터 변경 알림. REST Transcript 조회가 최종 진실
          $ref: "#/components/schemas/TranscriptVersionUpdatedPayload"
        question.created:
          $ref: "#/components/schemas/Question"
        question.updated:
          $ref: "#/components/schemas/Question"
        clustering.updated:
          $ref: "#/components/schemas/ClusteringUpdatedPayload"
        reaction.updated:
          $ref: "#/components/schemas/ReactionUpdatedPayload"
        answer.updated:
          $ref: "#/components/schemas/Answer"
        answer.deleted:
          description: hard delete된 CAPTURING Answer를 열린 화면에서 무효화하는 tombstone
          $ref: "#/components/schemas/AnswerDeletedPayload"
        session.updated:
          $ref: "#/components/schemas/LectureSession"
        recording.updated:
          description: 현재 녹음 접근 정책이 허용한 사용자에게만 전달하는 안전한 메타데이터
          $ref: "#/components/schemas/SessionRecording"
        job.updated:
          description: Session 공용 작업에만 사용. 개인 AI 작업은 REST polling으로만 확인
          $ref: "#/components/schemas/AIJob"
      delivery:
        semantics: at-least-once-possible
        reconnect: bounded replay if available; otherwise resync.required and REST recovery
        partial_replay: false
    /api/v1/ws/sessions/{session_id}/audio:
      summary: 교수자 한 명의 저지연 음성 업로드
      authorization: Course PROFESSOR and LIVE Session required
      authentication: POST /api/v1/realtime-tickets의 60초 만료·1회용 SESSION_AUDIO_WRITE ticket
      handshakeQuery: ticket
      separation: Session event WebSocket과 별도 연결·티켓·책임을 사용
      concurrency: |
        한 Session의 첫 성공 audio.start client_stream_id가 publisher를 원자적으로 claim하고
        Recording을 CAPTURING으로 만든다. 같은 client_stream_id는 reconnect·resume할 수 있다.
        다른 client_stream_id는 AUDIO_PUBLISHER_CONFLICT를 받은 뒤 4409로 종료된다. 비정상
        단절의 lease 만료, 재획득과 명시적 takeover 정책은 TBD이다.
      clientTextMessages:
        - $ref: "#/components/schemas/AudioStartControl"
        - $ref: "#/components/schemas/AudioStopControl"
      serverTextMessages:
        - $ref: "#/components/schemas/AudioReadyControl"
        - $ref: "#/components/schemas/AudioAckControl"
        - $ref: "#/components/schemas/AudioFlowControl"
        - $ref: "#/components/schemas/AudioStoppedControl"
        - $ref: "#/components/schemas/AudioResumeRejectedControl"
        - $ref: "#/components/schemas/RealtimeError"
      clientBinaryFrames:
        status: mvp-v1
        description: |
          각 frame은 14-byte big-endian header와 PCM payload로 구성한다. byte 0은 protocol
          version(1), byte 1은 flags(MVP v1은 0), byte 2..5는 uint32 chunk_sequence, byte 6..13은 uint64
          captured_offset_ms, 나머지는 PCM_S16LE 16000 Hz mono payload다. sequence는
          client_stream_id별 0부터 1씩 증가하고 offset은 stream 시작 기준이다. 기본 chunk는
          500 ms(16000 bytes)이며 max_chunk_bytes는 audio.ready가 정한다. 이 frame은 live STT
          전송용이다. 클라이언트는 같은 microphone source를 이 PCM 경로와 브라우저 로컬
          binary 녹음 경로로 동시에 분기하고, 로컬 녹음은 Session 종료 뒤 HTTP resumable
          upload로 영구 저장한다. codec·container와 로컬 저장 방식은 TBD이다.
