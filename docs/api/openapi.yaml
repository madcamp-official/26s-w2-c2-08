  /api/v1/sessions/{session_id}/start:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Sessions]
      operationId: startSession
      summary: class 시작
      description: |
        해당 Course의 PROFESSOR만 실행할 수 있다. READY에서 LIVE로 전이한다.
        연결된 강의자료가 0개이거나 모두 READY, UPLOADED, FAILED 중 하나이면 시작할 수 있다.
        READY 자료만 AI 근거로 사용한다. 하나라도 PROCESSING이면 409
        MATERIAL_PROCESSING_ACTIVE를 반환하고 READY를 유지하며, 분리된 자료는 검사하지 않는다.
        시작 transaction은 LIVE/FINALIZING TranscriptVersion을 만들고 Session의
        canonical_transcript_version_id를 이 version으로 설정한다.
      responses:
        "200":
          description: LIVE로 전환된 LectureSession
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/SessionStartConflict"

  /api/v1/sessions/{session_id}/end:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Sessions]
      operationId: endSession
      summary: class 종료와 후처리 시작
      description: |
        해당 Course의 PROFESSOR만 실행할 수 있다. LIVE에서 PROCESSING으로 전이하고
        새 audio 입력과 resume을 즉시 차단한다. 첫 audio.start에서 생성된 Recording은
        UPLOAD_PENDING으로 전이한다. 같은 요청의 반복 호출은 새 작업을 중복 생성하지 않고
        기존 Session, Recording과 작업을 반환해야 한다. 정상 흐름도 종료 확인 즉시 이 API를
        호출하며 audio.stop 전송과 로컬 녹음 마감은 best-effort로 병행한다. audio.stopped와
        drain 완료는 이 API의 선행조건이 아니고 서버는 수신분만 별도로 drain한다. CAPTURING
        Answer가 있으면 409로 거부한다. Recording upload complete 전에는 HQ STT를 시작하지 않는다.
        active·retry-reserved LIVE clustering 실행은 Session·attempt·run-token fence로
        정지하고 느린 결과 commit과 LIVE 재실행을 막는다. 이 Job의 공개
        terminal 표현을 CANCELLED/SUPERSEDED로 확장할지 재시도 불가 FAILED로
        표시할지는 TBD이다.
        종료 transaction은 SHARED·blocking SESSION_POSTPROCESSING coordinator를 PENDING으로
        생성하고 source terminal 전에는 claim하지 않는다. upload complete 뒤
        RECORDING_TRANSCRIPTION이 RECORDING TranscriptVersion·Segment·Gap·Segment 녹음 시간
        mapping과 canonical 전환을 먼저 확정한다. HQ가 FINALIZED, EMPTY, FAILED 중
        어떤 terminal이든 coordinator를 깨운다. coordinator는 Answer mapping·Knowledge
        재연결을 수행하고 완료 VOICE Answer마다 고정 source의 ANSWER_ORGANIZATION
        SHARED blocking Job을 만든다. 성공한 HQ mapping을 우선하고 없으면 immutable
        원본 LIVE 범위를 사용한다. 자신의 terminal 전이·downstream blocking Job 생성·outbox를
        같은 transaction에 commit하여 조기 COMPLETED race를 막는다. 후처리가 실패해도
        이미 확정한 HQ Transcript·canonical을 rollback하지 않는다. FINAL_SUMMARY는
        최신 HQ source가 RECORDING/FINALIZED이고 final Segment가 1건 이상일 때만
        생성하며 preserved LIVE canonical은 현재 자동 final source로 사용하지 않는다.
        같은 LIVE→PROCESSING transaction은 FINAL 대상이 1건 이상이면 종료 시점 requested
        sequence 이하의 학생 실제 질문과 ended_at까지 COMPLETED Answer가 있는 AI 대표질문을
        현재 중앙 여부와 무관하게 snapshot한 FINAL QUESTION_CLUSTERING blocking Job을 즉시
        생성한다. 이 Job은 Recording upload·HQ Transcript·coordinator를 기다리지 않고 독립
        실행한다. FINAL은 eligible input을 각각 정확히 한 번만 membership으로
        포함해야 성공하며 분류 불가 input은 하나의 안정적인 `기타` Cluster에
        배치한다. 대상 0건의 Job·빈 generation 표현은 TBD이다. 같은 transaction은 모든 개인 LIVE Summary,
        mode=LIVE Chat·Message·Evidence, REQUESTER_ONLY LIVE_SUMMARY Job, LIVE Chat에
        귀속된 REQUESTER_ONLY CHAT_RESPONSE Job을 삭제한다. 늦은 Worker 결과는
        Job·target·Session state·attempt·run-token fence를 통과하지 못해 저장되지
        않는다. 종료 후 기존 개인 LIVE 리소스·Job ID의 polling·단건 HTTP
        status와 purge_on_session_end 멱등성 행의 조기 삭제·재요청 응답은 TBD이다.
        FINAL Summary, REVIEW Chat·Job·멱등성 원장과 class 종료 요청 자체의
        멱등성 원장은 영향받지 않는다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Session이 PROCESSING으로 전환되고 Recording upload를 기다림
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEndAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/materials:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Materials]
      operationId: listSessionMaterials
      summary: 강의자료 목록 조회
      description: |
        Session이 속한 Course의 멤버만 조회할 수 있다. 외부에서 연결된 자료만 반환하며
        분리된 자료, 내부 스토리지 키와 detached_at은 반환하지 않는다. created_at ASC,
        id ASC의 안정적인 keyset 순서를 사용한다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 강의자료 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureMaterialListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Materials]
      operationId: uploadSessionMaterial
      summary: 강의자료 PDF 업로드
      description: |
        해당 Course의 PROFESSOR가 READY, LIVE, COMPLETED Session에 업로드할 수 있다.
        PROCESSING Session이면 409 SESSION_STATE_CONFLICT를 반환한다. 파일 하나는 십진수
        100000000 bytes 이하이고 한 Session의 연결된 자료는 최대 10개다. 동일 내용의
        재업로드를 허용한다. 같은 표시명이 있으면 확장자 앞에 ` (1)`, ` (2)` 순으로
        번호를 붙이고 할당한 display_name을 저장한다. Material을 UPLOADED로 저장하고
        SHARED, blocks_session_completion=false인 MATERIAL_PROCESSING Job을 생성한다.
        COMPLETED Session의 상태는 바뀌지 않는다. READY 자료만 AI 근거로 사용할 수 있다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: MIME과 실제 내용이 유효한 최대 100000000 bytes PDF 파일
            encoding:
              file:
                contentType: application/pdf
      responses:
        "202":
          description: 파일이 저장되고 전처리 작업이 수락됨
          headers:
            Location:
              description: 업로드된 Material의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialUploadAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/MaterialUploadConflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/materials/{material_id}:
    parameters:
      - $ref: "#/components/parameters/MaterialId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Materials]
      operationId: getMaterial
      summary: 강의자료 메타데이터 조회
      description: |
        연결된 자료만 반환한다. 내부 파일 경로, 스토리지 키와 detached_at은 반환하지 않는다.
        인증 없음은 401이다. 비멤버·권한 밖 요청, 분리되거나 존재하지 않는 자료는
        모두 404 MATERIAL_NOT_FOUND로 응답해 존재를 공개하지 않는다.
      responses:
        "200":
          description: 강의자료 메타데이터
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureMaterial"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/MaterialNotFound"
    delete:
      tags: [Materials]
      operationId: detachMaterial
      summary: 강의자료 분리
      description: |
        해당 Course의 PROFESSOR가 READY, LIVE, COMPLETED Session의 자료를 분리한다.
        PROCESSING Session이면 409 SESSION_STATE_CONFLICT를 반환한다. 성공 응답 전에 외부
        연결을 즉시 끊어 목록·단건·본문·수업 기록과 새 AI 검색·근거 생성에서 제외하고,
        파일 객체와 파생 chunk는 background cleanup으로 정리한다. 같은 멱등성 키의 재시도는
        최초 204를 반환하며, 분리 완료 후 새 요청은 404 MATERIAL_NOT_FOUND를 반환한다.
      parameters:
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      responses:
        "204":
          description: 강의자료의 외부 연결이 즉시 분리됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/MaterialNotFound"
        "409":
          $ref: "#/components/responses/MaterialDetachConflict"

  /api/v1/materials/{material_id}/content:
    parameters:
      - $ref: "#/components/parameters/MaterialId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Materials]
      operationId: downloadMaterialContent
      summary: 강의자료 PDF 열람
      description: |
        Course 멤버십을 확인한 뒤 연결되고 processing_status가
        UPLOADED, PROCESSING, READY인 자료의 PDF 본문을 반환한다. FAILED는 사용할 수
        없는 자료이므로 원본을 반환하지 않는다. 인증 없음은 401이다. 비멤버·권한 밖
        요청, FAILED, 분리되거나 존재하지 않는 자료는 모두 404 MATERIAL_NOT_FOUND로
        응답해 존재를 공개하지 않는다.
      responses:
        "200":
          description: PDF 바이너리
          headers:
            Content-Disposition:
              description: 저장된 display_name을 안전하게 인코딩한 파일명
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/MaterialNotFound"

  /api/v1/sessions/{session_id}/transcript:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Transcript]
      operationId: listSessionTranscriptTimeline
      summary: canonical 또는 지정 Transcript version 타임라인 조회
      description: |
        transcript_version_id를 생략하면 Session의 canonical version을, canonical 포인터가
        null이면 current version을 선택한다. 지정하면 같은 Session에 속한 과거 version을
        조회한다. 응답의 TranscriptAggregate는 latest current status와 canonical 포인터를
        독립적으로 공개한다. final Segment와 Gap의 합친 타임라인에서 하나의 cursor
        페이지 경계를 계산한 뒤 응답은 segments와 gaps 배열로 분리하며 partial은
        포함하지 않는다. 두 배열의 원소 수 합은 limit 이하고 독립 cursor를 두지 않는다.
        첫 페이지의 cursor는 canonical 전환이 일어나도 선택한 version을 고정한다.
        FAILED HQ version은 두 배열이 모두 비고, EMPTY version은 Segment가 0건이어도
        재처리 후에도 남은 final Gap을 gaps로 반환할 수 있다. 합친 타임라인은
        start_ms ASC, 같은 시각이면 SEGMENT 우선, 그 뒤 id ASC 순서다.
        start_sequence와 end_sequence를 함께 주면 transcript_version_id도 필수이며
        같은 version의 final Segment inclusive 범위를 안정적인 anchor로 고정한다.
        anchor 요청은 그 Segment 범위와 범위의 class 시간축에 걸친 Gap만
        페이지닝하고 cursor에 version·anchor를 함께 고정한다. Chat Evidence의
        TRANSCRIPT link는 이 Session·version·sequence 범위를 사용하고 Segment ID를
        anchor로 사용하지 않는다.
      parameters:
        - name: transcript_version_id
          in: query
          required: false
          description: |
            조회할 TranscriptVersion ID. 생략하면 현재 canonical version.
            start_sequence·end_sequence anchor를 사용할 때는 필수이다.
          schema:
            $ref: "#/components/schemas/ResourceId"
        - name: start_sequence
          in: query
          required: false
          description: |
            end_sequence와 함께 사용하는 inclusive final Segment 시작 sequence.
            범위 anchor에서는 transcript_version_id도 필수이며 두 sequence는
            같은 version에 속해야 한다.
          schema:
            type: integer
            minimum: 1
        - name: end_sequence
          in: query
          required: false
          description: |
            start_sequence와 함께 사용하는 inclusive final Segment 종료 sequence.
            start_sequence 이상이어야 한다.
          schema:
            type: integer
            minimum: 1
        - name: cursor
          in: query
          required: false
          description: Transcript version과 마지막 timeline 위치를 함께 고정하는 불투명 cursor
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: 합친 타임라인에서 페이지로 선택할 Segment와 Gap의 합계 최대 수
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      x-sequence-anchor-constraints:
        require_together: [start_sequence, end_sequence]
        requires_when_present: transcript_version_id
        relation: start_sequence <= end_sequence
        membership: both values identify final Segments in the selected Session and TranscriptVersion
        cursor_scope: [transcript_version_id, start_sequence, end_sequence]
      responses:
        "200":
          description: Transcript version과 Segment·Gap 타임라인 페이지
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptTimelinePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/transcript-segments/{segment_id}:
    parameters:
      - $ref: "#/components/parameters/TranscriptSegmentId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Transcript]
      operationId: getTranscriptSegment
      summary: final Transcript Segment 단건 조회
      description: |
        Segment가 속한 Course 멤버만 조회한다. final Segment ID를 직접
        조회하는 경로이며 Chat Evidence는 이 단건 경로 대신 Session·TranscriptVersion·
        stable sequence 범위가 있는 타임라인 경로를 사용한다. 인증 없음은 401이다.
        비멤버·권한 밖 요청, 비가시·삭제되거나
        존재하지 않는 Segment는 모두 404로 응답해 존재를 공개하지 않는다.
      responses:
        "200":
          description: final TranscriptSegment
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptSegment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/transcript/versions:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Transcript]
      operationId: listSessionTranscriptVersions
      summary: Session Transcript version 목록 조회
      description: |
        Course 멤버가 LIVE·RECORDING TranscriptVersion metadata를 version DESC, id DESC로
        조회한다. canonical에서 교체된 LIVE version과 실패한 HQ version도 provenance와 함께
        반환하며 partial Transcript는 포함하지 않는다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: TranscriptVersion 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptVersionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/questions:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: listSessionQuestions
      summary: 익명 질문 목록 조회
      description: |
        Course 멤버만 조회할 수 있다. 응답과 실시간 이벤트에는 질문 작성자의
        계정 ID, 이름 또는 이메일을 포함하지 않는다. 동일 content의 질문도 서로
        다른 학생이 등록한 독립 리소스로 반환한다. POPULAR은 reaction_count DESC,
        created_at DESC, id DESC, RECENT는 created_at DESC, id DESC의 keyset 순서를 사용한다.
        LIVE에서 reaction_count가 바뀌면 POPULAR 순위는 재배치될 수 있으므로 전체
        snapshot으로 해석하지 않고 reaction.updated 후 첫 페이지를 다시 조회한다.
        /record의 질문 list_url은 종료 후 불변 키인 sort=RECENT를 사용한다.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QuestionStatus"
        - name: sort
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QuestionSort"
        - name: cluster_id
          in: query
          required: false
          description: 현재 특정 Cluster의 학생 질문만 조회
          schema:
            $ref: "#/components/schemas/ResourceId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 익명 질문 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Questions]
      operationId: createAnonymousQuestion
      summary: 익명 질문 생성
      description: |
        해당 Course의 STUDENT가 LIVE Session에서만 요청할 수 있다. 질문은 즉시 저장하고
        Session 내 clustering sequence·requested watermark를 함께 commit한다. active
        QUESTION_CLUSTERING active Job과 backlog을 소유한 retryable FAILED Job이 모두
        없으면 시스템이 자동 생성하고, 둘 중 하나라도 있으면 새 Job 없이 pending
        watermark만 올린다. 응답은 Question과 현재 clustering_state다.
        content는 앞뒤 공백 제거, Unicode NFC 정규화, Unicode code point
        1~300자 검증 순으로 처리한다. 정규화 결과를 저장하며 비었거나
        최대 길이를 넘으면 자르지 않고 422 VALIDATION_ERROR와 field,
        EMPTY_AFTER_NORMALIZATION 또는 MAX_LENGTH_EXCEEDED reason, max_length,
        actual_length를 반환한다. 클러스터링 실패는 질문 생성을 rollback하지 않는다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionCreateRequest"
            example:
              content: 다익스트라에서 음수 가중치를 쓸 수 없는 이유가 궁금합니다.
      responses:
        "201":
          description: 생성된 익명 질문
          headers:
            Location:
              description: 생성된 Question의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionCreateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/TextInputValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/sessions/{session_id}/question-drafts:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Questions]
      operationId: suggestQuestionDrafts
      summary: AI 질문 문장 후보 생성
      description: |
        해당 Course의 STUDENT가 LIVE Session에서 사용한다. 현재 Session 문맥을 이용해
        짧은 후보를 동기 200으로 반환하지만 실제 질문·초안·AIJob을 저장하거나
        공개하지 않는다. draft는 앞뒤 공백 제거·Unicode NFC 정규화 후
        1~500 Unicode code point를 검증하고 정규화 결과만 모델에 전달한다.
        빈 결과·초과는 자르지 않고 422 VALIDATION_ERROR의 안정적 details를
        반환한다. 각 제안은 1~300 code point다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionDraftRequest"
            example:
              draft: 음수 가중치 왜 안돼요?
      responses:
        "200":
          description: 질문 문장 후보
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/TextInputValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/questions/{question_id}:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: getQuestion
      summary: 익명 질문 단건 조회
      description: |
        Session의 Course 멤버만 조회한다. 목록·이벤트와 동일하게 작성자 식별 정보는
        반환하지 않으며 현재 사용자의 반응 여부만 개인화한다. 인증 없음은 401이다.
        비멤버·권한 밖 요청, 비가시·삭제되거나 존재하지 않는 Question은 모두
        404로 응답해 존재를 공개하지 않는다.
      responses:
        "200":
          description: 익명 Question
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/questions/{question_id}/reaction:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
      - $ref: "#/components/parameters/RequestId"
    put:
      tags: [Questions]
      operationId: addQuestionReaction
      summary: ‘나도 궁금해요’ 반응 추가
      description: |
        해당 Course의 STUDENT가 LIVE Session에서만 실행할 수 있다. 같은 사용자의
        반복 호출은 반응 한 개 상태를 유지하며 최신 집계를 반환한다. 자신이 작성한
        질문에는 반응할 수 없고 작성자 식별은 서버 내부에서만 사용한다.
      responses:
        "200":
          description: 최신 반응 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionReactionState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Questions]
      operationId: removeQuestionReaction
      summary: ‘나도 궁금해요’ 반응 취소
      description: 기존 반응이 없어도 성공하는 멱등 요청이다.
      responses:
        "204":
          description: 반응 없음 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/representative-questions/{representative_question_id}:
    parameters:
      - $ref: "#/components/parameters/RepresentativeQuestionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: getAIRepresentativeQuestion
      summary: AI 대표질문 단건 조회
      description: |
        현재 Cluster 중앙 대표질문과 Answer target으로 보존된 과거 대표질문을
        해당 Course 멤버가 불투명 ID로 조회한다. generation 배열 위치나
        pagination cursor에 의존하지 않는 Evidence 경로다. 교체 또는 PRESERVED
        Answer 취소로 폐기된 대표질문은 Evidence provenance용 내부 DISCARDED
        tombstone이 남아도 항상 404를 반환한다. 인증 없음은 401이다. 비멤버·권한
        밖 요청, 비가시·폐기·존재하지 않는 대표질문은 모두 404로 응답해 존재를
        공개하지 않는다.
      responses:
        "200":
          description: AIRepresentativeQuestion
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIRepresentativeQuestion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/question-clusters:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: listSessionQuestionClusters
      summary: 현재 또는 최종 질문 Cluster 목록
      description: |
        Course 멤버가 마인드맵의 중앙 노드인 immutable AI 대표질문과
        Cluster 메타데이터를 조회한다. Cluster는 ordinal ASC, id ASC로 정렬한다.
        응답의 clustering_state는 requested·applied watermark, active Job과 마지막
        Job ID·attempt·status를 포함한다. scope=FINAL은 후처리에서 전체 input을
        처음부터 재배치한 최종 generation을 선택한다. 교체된 미답변 AI 대표질문은
        새 generation 공개 시점부터 Cluster·단건 조회·RAG에서 즉시 제외한다.
        Evidence가 없으면 hard delete하고, 있으면 비공개 DISCARDED tombstone과 Chunk만
        provenance로 보존하며 해당 Evidence는 label을 유지하고 link=null이다.
        마지막 Evidence 삭제 transaction에서 tombstone과 Chunk도 원자적으로 hard delete해
        DISCARDED는 항상 Evidence가 1개 이상일 때만 남는다.
        FINAL generation은 eligible 학생 질문과 cutoff까지 Answer가 완료된
        AI 대표질문을 각각 정확히 한 번만 membership으로 포함해야 한다.
        분류 불가 input은 하나의 안정적인 `기타` Cluster에 배치하고 누락·
        중복이나 여러 `기타` Cluster로의 분산을 성공으로 공개하지 않는다.
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QuestionClusterScope"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Cluster generation 목록과 clustering 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionClusterListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/question-clusters/{cluster_id}/members:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/QuestionClusterId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Questions]
      operationId: listQuestionClusterMembers
      summary: 질문 Cluster child 목록
      description: |
        Course 멤버가 해당 Cluster child를 generation 안에서 유일한 ordinal ASC로
        조회한다. 공개 discriminator는 source_kind이고 값은 STUDENT_QUESTION 또는
        답변이 있어 보존된 AI_REPRESENTATIVE이다. 내부 typed FK 이름인
        AI_REPRESENTATIVE_QUESTION을 membership enum으로 노출하지 않는다. ordinal은
        DB membership position의 공개 projection이다. 중앙
        대표질문의 Answer가 child를 ANSWERED로 바꾸지 않는다. cluster_id는
        session_id 안의 logical ID로 해석하며 다른 Session의 Cluster를 조회할 수 없다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Cluster child 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionClusterMemberListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/answers:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Answers]
      operationId: listSessionAnswers
      summary: 교수자 답변 목록 조회
      description: |
        Course 멤버가 저장된 Answer를 조회한다. LIVE 재연결 시 질문 상태와 답변 구간을
        REST로 복구하는 기준이며 `started_at ASC, id ASC`로 안정적으로 정렬한다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Answer 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Answers]
      operationId: createSessionAnswer
      summary: LIVE 음성 캡처 또는 COMPLETED 텍스트 Answer 생성
      description: |
        Course PROFESSOR만 실행한다. answer_type=VOICE는 LIVE에서 하나의
        STUDENT_QUESTION 또는 AI_REPRESENTATIVE_QUESTION을 SELECTED로 바꾸고
        CAPTURING Answer를 만든다. answer_type=TEXT는 COMPLETED에서 Answer가 없고
        status=OPEN인 STUDENT_QUESTION에만 즉시 COMPLETED text-only Answer를 만든다.
        FINAL·review-only 대표질문과 미답변 ACTIVE 대표질문은 새 text-only target이
        아니다. 둘 모두 target 정확히 하나만 지정하며 target당 Answer는 최대 하나다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerCreateRequest"
            examples:
              voiceRepresentative:
                summary: LIVE AI 대표질문 음성 캡처
                value:
                  answer_type: VOICE
                  target:
                    type: AI_REPRESENTATIVE_QUESTION
                    representative_question_id: representative_question_01HXYZ
              textStudentQuestion:
                summary: COMPLETED 학생 질문 텍스트 Answer
                value:
                  answer_type: TEXT
                  target:
                    type: STUDENT_QUESTION
                    question_id: question_01HXYZ
                  text_content: 음수 간선이 현재까지의 최단 거리 가정을 깨뜨립니다.
      responses:
        "201":
          description: VOICE는 CAPTURING, TEXT는 COMPLETED인 새 Answer
          headers:
            Location:
              description: 생성된 Answer의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/answers/{answer_id}/complete:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Answers]
      operationId: completeAnswerCapture
      summary: 교수자 답변 완료
      description: |
        해당 Course의 PROFESSOR만 실행할 수 있다. Session이 LIVE이고 Answer가
        VOICE/CAPTURING일 때만 답변 시작 이후의 final Transcript
        범위를 확정하고 Answer를 COMPLETED, 선택한 typed target 하나만 ANSWERED로
        변경한다. 대표질문 target이어도 Cluster child는 변경하지 않는다.
        본문을 생략하면 서버의 자동 후보를 사용하고, 본문을 보내면 Answer가 캡처를 시작한
        source TranscriptVersion과 같은 version·Session의 sequence 범위인지 검증한다.
        반복 호출은 기존 완료 결과를 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        description: 자동 후보 범위를 조정할 때만 전달
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerCompleteRequest"
            example:
              transcript_version_id: transcript_version_01HXYZ
              start_sequence: 110
              end_sequence: 128
      responses:
        "200":
          description: 완료된 Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/answers/{answer_id}:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Answers]
      operationId: getAnswer
      summary: 교수자 답변 단건 조회
      description: |
        Answer가 속한 Session의 Course 멤버만 조회한다. 인증 없음은 401이다.
        비멤버·권한 밖 요청, 비가시·취소·삭제되거나 존재하지 않는 Answer는
        모두 404로 응답해 존재를 공개하지 않는다.
      responses:
        "200":
          description: Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Answers]
      operationId: updateCompletedAnswerText
      summary: 완료 Answer의 텍스트 설명 추가·수정
      description: |
        Course PROFESSOR가 COMPLETED Session의 기존 COMPLETED Answer에만 text_content를
        추가하거나 교체한다. 학생 질문 target의 기존 완료 Answer와 Answer 때문에
        PRESERVED된 AI 대표질문 target의 기존 완료 Answer만 허용한다. target·snapshot·
        음성 Answer의 Transcript 범위는 유지한다.
        텍스트 최대 길이, 빈 문자열로 삭제하는 정책과 KnowledgeChunk 재생성
        세부 범위는 TBD이다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerTextUpdateRequest"
      responses:
        "200":
          description: 텍스트와 version이 갱신된 Answer
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/answers/{answer_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/AnswerId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Answers]
      operationId: cancelAnswerCapture
      summary: 교수자 답변 취소
      description: |
        Course PROFESSOR가 CAPTURING Answer를 hard delete하고 typed target을 OPEN으로
        복귀시킨다. CANCELLED Answer 리소스나 이력은 생성하지 않는다.
        멱등성 응답은 24시간 동안 같은 204를 재사용한다. 이미 중앙 대표가
        아닌 PRESERVED AI 대표질문이면 membership과 공개 대표질문을 같은
        transaction에서 즉시 제거한다. Evidence 참조가 없으면 hard delete하고,
        있으면 비공개 DISCARDED tombstone·KnowledgeChunk만 provenance로 남긴다.
        해당 Evidence는 source_kind=QUESTION·label을 유지하고 link=null이며 마지막 Evidence를
        삭제하는 transaction에서 tombstone과 Chunk도 원자적으로 hard delete한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Answer 행이 삭제되고 target이 OPEN으로 복귀하거나 과거 PRESERVED target이 공개에서 제거됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/summaries:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Summaries]
      operationId: listSessionSummaries
      summary: 저장된 요약 목록 조회
      description: |
        PROFESSOR와 STUDENT Course 멤버 모두 조회할 수 있다. 저장된 LIVE
        요약은 요청자에게만, FINAL 요약은 Course 멤버에게 공개한다. summary_type
        query는 필수이고 응답은 필수 summary_status·summary_reason을 포함한다.
        summary_type=LIVE에서 READY 또는 요청 전 LIVE의 정상 무요약 상태는
        NOT_STARTED/null이다. summary_type=FINAL은 /record.summary.state의 상태·이유를
        그대로 projection하고 NOT_STARTED를 사용하지 않는다. 성공한
        LIVE 요약도 반드시 저장한 뒤 Job을 SUCCEEDED로 변경하므로 연결이
        끊겨도 Job result URL로 복구할 수 있다. LIVE→PROCESSING에서 LIVE
        Summary·Job을 삭제하며 이후 목록에 나타나지 않는다. 기존 ID의 단건·
        polling HTTP status와 purge-scoped 멱등 재요청 응답은 TBD이다. 비멤버에게는 Session
        존재를 숨기고 404를 반환한다. 자동 FINAL
        요약은 최신 HQ TranscriptVersion이 RECORDING/FINALIZED이고 final Segment가
        1건 이상일 때만 생성하며 preserved LIVE canonical은 현재 source로 사용하지 않는다.
        목록은 created_at DESC, id DESC의 안정적인 keyset 순서를 사용한다.
      parameters:
        - name: summary_type
          in: query
          required: true
          description: 상태를 모호하지 않게 하는 필수 Summary 유형 필터
          schema:
            $ref: "#/components/schemas/SummaryType"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 요약 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Summaries]
      operationId: requestSessionSummary
      summary: AI 요약 요청
      description: |
        LIVE Session에서 요청 시점까지 또는 선택한 final Transcript 범위와 같은 Session에
        연결된 READY PDF만 사용한다. UPLOADED, PROCESSING, FAILED 또는 분리된 자료는
        제외한다. 요청 범위의 final Segment가 0건이면 Job 없이 409
        SUMMARY_TRANSCRIPT_NOT_READY, source TranscriptVersion이 FAILED이면 Job 없이 409
        SUMMARY_SOURCE_UNAVAILABLE를 반환한다. final Segment가 1건 이상일 때만 202와
        REQUESTER_ONLY AIJob을 반환한다. PROFESSOR와 STUDENT Course 멤버에게
        동일하게 허용한다. 요청자는 Job을 polling한 뒤 result URL에서 저장된
        최종 Summary만 GET한다. 부분 문장·token은 저장·broadcast·streaming하지
        않는다. LIVE→PROCESSING에서 Summary·Job을 삭제하고 늦은 Worker 결과를
        fence하되 purge-on-session-end 멱등성 행 조기 삭제·구 202 재응답은 TBD이다.
        인증되지 않은 요청은 401,
        비멤버는 Session 존재를 숨기는 404를 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummaryCreateRequest"
            example:
              summary_type: LIVE
              range:
                start_sequence: null
                end_sequence: 128
      responses:
        "202":
          description: 요약 작업 수락
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/SummaryRequestConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/summaries/{summary_id}:
    parameters:
      - $ref: "#/components/parameters/SummaryId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Summaries]
      operationId: getSummary
      summary: 저장된 요약 단건 조회
      description: |
        FINAL 요약은 Course 멤버가 조회할 수 있다. 저장된 LIVE 요약은 요청자만 조회한다.
        비요청자·비멤버에는 리소스 존재를 공개하지 않고 404를 반환한다.
        Session 종료로 삭제된 기존 LIVE Summary ID의 HTTP status는 TBD이다.
      responses:
        "200":
          description: LectureSummary
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/chats:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: listMySessionChats
      summary: 내 AI 대화 목록 조회
      description: |
        현재 사용자가 이 Session에서 생성한 개인 대화만 반환한다.
        PROFESSOR와 STUDENT Course 멤버에게 동일한 규칙을 적용한다. LIVE→PROCESSING
        transaction이 LIVE Chat을 삭제하면 목록에서 즉시 사라진다. 비멤버에게는
        Session 존재를 숨기고 404를 반환한다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 개인 대화 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chats]
      operationId: createSessionChat
      summary: AI 대화 생성
      description: |
        PROFESSOR와 STUDENT Course 멤버 모두 같은 개인 Chat 권한을 갖는다.
        LIVE mode는 Session LIVE, REVIEW mode는 Session COMPLETED에서만 생성한다.
        PROCESSING을 포함해 mode와 상태가 다르면 409 SESSION_STATE_CONFLICT를
        반환한다. 대화는 생성자에게만 노출한다. LIVE Chat 멱등성 원장은
        purge_on_session_end로 범위를 표시하되 class 종료 후 행 조기 삭제·
        재요청 응답은 TBD이다. 인증되지 않은
        요청은 401, 비멤버는 Session 존재를 숨기는 404를 반환한다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCreateRequest"
            example:
              mode: LIVE
      responses:
        "201":
          description: 생성된 개인 대화
          headers:
            Location:
              description: 생성된 Chat의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ChatRequestConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/chats/{chat_id}:
    parameters:
      - $ref: "#/components/parameters/ChatId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: getChat
      summary: 내 AI 대화 단건 조회
      description: |
        Chat 소유자이면서 현재도 Session의 Course 멤버인 사용자만 조회한다.
        비소유자·비멤버에는 존재를 공개하지 않고 404를 반환한다. Session
        종료로 삭제된 기존 LIVE Chat ID의 HTTP status는 TBD이다.
      responses:
        "200":
          description: Chat
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/chats/{chat_id}/messages:
    parameters:
      - $ref: "#/components/parameters/ChatId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: listChatMessages
      summary: AI 대화 메시지 목록 조회
      description: |
        현재도 Course 멤버인 대화 소유자만 sequence 오름차순으로 조회한다.
        비소유자·비멤버에는 Chat·Message 존재를 숨기고 404를 반환한다.
        Session 종료로 삭제된 기존 LIVE Chat·Message ID의 HTTP status는 TBD이다.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 메시지 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chats]
      operationId: createChatMessage
      summary: 사용자 메시지 전송과 AI 답변 요청
      description: |
        대화 소유자만 요청할 수 있다. 서버가 URL로 확정된 Session에 연결된 READY PDF,
        final Transcript와 Q&A만 검색하며 UPLOADED, PROCESSING, FAILED 또는 분리된 자료는
        제외한다. content는 앞뒤 공백 제거·Unicode NFC 정규화 후 Unicode
        code point 기준 1~2,000자를 검증한다. 정규화 결과를 USER Message에
        저장하며 빈 결과·초과는 자르지 않고 422 VALIDATION_ERROR와 field,
        EMPTY_AFTER_NORMALIZATION 또는 MAX_LENGTH_EXCEEDED reason, max_length,
        actual_length를 반환한다.
        LIVE Chat은 Session LIVE, REVIEW Chat은 Session COMPLETED에서만 메시지를
        수락하며 다르면 409 SESSION_STATE_CONFLICT를 반환한다. 사용자 메시지를
        같은 요청 transaction에서 정규화한 USER Message, 그 Message를 immutable
        target으로 가리킨 REQUESTER_ONLY CHAT_RESPONSE Job, outbox와 terminal 202
        멱등성 응답을 함께 commit한다. 요청자는 Job을 polling한
        뒤 result URL에서 성공해 저장된 최종 Assistant Message만 GET한다. 부분
        Assistant·token은 저장·broadcast·streaming하지 않는다.
        같은 Chat에 RUNNING/PENDING 답변 Job이 있으면 409 CHAT_RESPONSE_IN_PROGRESS를
        반환한다. 인증되지 않은 요청은 401, 비소유자·비멤버 Chat은 존재를
        숨기는 404를 반환한다. Session 종료가 LIVE Chat을 먼저 삭제한 경쟁에서
        기존 ID 요청의 HTTP status는 TBD이다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageCreateRequest"
            example:
              content: 음수 가중치가 있을 때는 어떤 알고리즘을 써야 해?
      responses:
        "202":
          description: 사용자 메시지가 저장되고 AI 답변 작업이 수락됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatTurnAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ChatRequestConflict"
        "422":
          $ref: "#/components/responses/TextInputValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/chat-messages/{message_id}:
    parameters:
      - $ref: "#/components/parameters/MessageId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Chats]
      operationId: getChatMessage
      summary: 저장된 Chat 메시지 단건 조회
      description: |
        현재도 Course 멤버인 Chat 소유자만 조회한다. CHAT_RESPONSE Job이
        SUCCEEDED일 때 result.resource_url은 이 경로를 가리킨다. 비소유자·비멤버에는
        존재를 공개하지 않고 404를 반환한다. Session 종료로 삭제된 기존
        LIVE Message ID의 HTTP status는 TBD이다.
      responses:
        "200":
          description: 저장된 USER 또는 최종 ASSISTANT Message
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}:
    parameters:
      - $ref: "#/components/parameters/JobId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Jobs]
      operationId: getAIJob
      summary: AI 작업 상태 조회
      description: |
        개인 작업은 요청자, 공유 작업은 권한 있는 Course 멤버만 조회한다. 내부 스택,
        프롬프트 원문 또는 외부 모델 응답 원문은 오류에 포함하지 않는다. 개인 AI
        요청은 이 endpoint와 result URL을 요청자가 polling하며 별도 개인 스트림을 제공하지 않는다.
        REQUESTER_ONLY Job의 비요청자·비멤버에는 존재를 공개하지 않고
        404를 반환한다. Session 종료로 삭제된 기존 개인 LIVE Job ID의 polling
        HTTP status는 TBD이다.
      responses:
        "200":
          description: AI 작업 상태
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/retry:
    parameters:
      - $ref: "#/components/parameters/JobId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Jobs]
      operationId: retryAIJob
      summary: 실패한 AI 작업 재시도
      description: |
        FAILED 작업만 재시도할 수 있다. 개인 작업은 요청자, 공유 후처리 작업은 해당
        Course의 PROFESSOR가 실행한다. 같은 Job ID의 attempt와 version을 1씩 올리고
        status를 PENDING으로 되돌린다. progress, error, started_at, finished_at은 null,
        retryable은 false로 초기화한다. 이전 attempt worker의 늦은 결과는 Job ID, attempt,
        실행 token과 RUNNING 상태가 현재 실행과 모두 일치하지 않으면 반영하지 않는다. COMPLETED
        Session의 Job을 재시도해도 Session을 PROCESSING으로 되돌리지 않는다.
        RECORDING_TRANSCRIPTION 재시도는 현재 attempt에 귀속된 새 RECORDING/FINALIZING
        TranscriptVersion을 만들고 이전 실패 version을 provenance로 보존한다. COMPLETED
        후 성공하면 같은 SESSION_POSTPROCESSING coordinator 행을 attempt+1로 자동
        requeue하고 Session 상태·completed_at을 유지한다. 복구 coordinator는 새 HQ
        version의 Answer mapping·canonical Knowledge 연결을 멱등 재조정하고 새로 eligible한
        FINAL_SUMMARY가 없으면 생성한다. 기존 ANSWER_ORGANIZATION Job·결과의 source를
        변경하거나 자동 재생성하지 않는다. 별도 HQ 전용 endpoint·control은 추가하지
        않고 이 기존 Course PROFESSOR 공용 retry 계약만 사용한다.
        retry_job_id에 예약된 LIVE_INCREMENTAL 클러스터링은 시스템 scheduler가 같은
        행을 재시도하며, 사용자가 이 endpoint를 호출하면 AI_JOB_RETRY_SYSTEM_MANAGED로
        거부한다. FINAL 클러스터링의 공개 재시도는 Session COMPLETED에서만 허용하고
        PROCESSING이면 AI_JOB_STATE_CONFLICT로 거부한다. ANSWER_ORGANIZATION 실패는 Course PROFESSOR가 같은 고정 source와
        Job 행으로 재시도하며 성공한 정리 Job은 재생성하지 않는다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: 재시도 작업 수락
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/AIJobRetryConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/sessions/{session_id}/jobs:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Jobs]
      operationId: listSessionSharedJobs
      summary: Session 공용 AI 작업 목록 조회
      description: |
        Course 멤버가 자료 처리, 질문 클러스터링, Answer AI 정리, 녹음 전사와 Session 후처리처럼 참여자가
        알아야 할 공용 Job만 조회한다. 개인 LIVE 요약과 Chat Job은 절대
        포함하지 않으며, 질문 초안은 동기 200 요청으로 처리하는 비 Job 기능이다.
        SESSION_POSTPROCESSING은 Session 종료 transaction에서
        SHARED·blocking PENDING coordinator로 생성되며 source terminal 전에는 claim하지 않는다.
        COMPLETED 후 RECORDING_TRANSCRIPTION 복구 성공은 같은 coordinator를
        attempt+1로 자동 requeue하며 사용자가 coordinator를 별도 retry할 필요가 없다.
        재시도는 별도 Job API의 권한 규칙을 따른다. 목록은 created_at DESC,
        id DESC로 정렬하고 job_type·status 필터를 cursor에 고정한다.
      parameters:
        - name: job_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedAIJobType"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AIJobStatus"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Session 공용 AIJob 목록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIJobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/record:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Records]
      operationId: getSessionRecord
      summary: 수업 기록 통합 조회
      description: |
        PROCESSING 또는 COMPLETED Session의 compact manifest·index를 반환한다.
        Session과 권한이 허용한 nullable Recording 메타데이터는 bounded singleton으로
        포함하지만 Summary 본문과 Material·Transcript Segment·Gap·질문·Cluster·Answer·Job
        배열은 포함하지 않는다. 대신 각 영역의 상태, 응답 시점 count와
        cursor 목록 URL을 반환한다. 질문 URL은 불변 정렬인 sort=RECENT를 포함하고,
        모든 URL은 cursor·배열 위치를 포함하지 않는다. count는 목록 전체 snapshot
        token이 아니므로 PROCESSING 상태가 바뀌면 record를 다시 조회한다.
        공용 Job 집계에는 SHARED Job만 포함하고 개인 Summary·Chat Job은 제외한다.
        분리된 Material은 즉시 count와 목록에서 제외한다.
      responses:
        "200":
          description: 통합 수업 기록
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sessions/{session_id}/recording:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Recordings]
      operationId: getSessionRecording
      summary: Session 녹음 메타데이터 조회
      description: |
        첫 성공 audio.start가 만든 논리 SessionRecording aggregate를 반환한다. 물리 저장물이
        파일 하나인지 여러 fragment와 manifest인지는 공개하지 않는다. 현재 인증과 Course
        접근 권한을 매번 다시 확인하며 동의와 역할별 세부 접근 범위는 아직 미정이다.
        storage key, 서버 경로, fragment key와 manifest는 반환하지 않는다.
      responses:
        "200":
          description: 안전한 Session 녹음 메타데이터
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecording"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingNotFound"

  /api/v1/sessions/{session_id}/recording/uploads:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Recordings]
      operationId: createRecordingUpload
      summary: 녹음 resumable upload 초기화
      x-contract-status: provisional
      description: |
        첫 publisher와 같은 client_stream_id를 사용하는 Course PROFESSOR가 PROCESSING
        Session의 UPLOAD_PENDING Recording에 active upload를 하나 만든다. codec·container,
        허용 content_type, 브라우저 로컬 저장 방식, 최대 크기와 정확한 expiry 값은 TBD이다.
      parameters:
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordingUploadCreateRequest"
      responses:
        "201":
          description: Recording upload가 초기화됨
          headers:
            Location:
              description: 생성된 RecordingUpload의 상대 경로
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUpload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingNotFound"
        "409":
          $ref: "#/components/responses/RecordingUploadConflict"
        "415":
          $ref: "#/components/responses/UnsupportedRecordingFormat"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/recording-uploads/{upload_id}:
    parameters:
      - $ref: "#/components/parameters/RecordingUploadId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Recordings]
      operationId: getRecordingUploadOffset
      summary: 녹음 upload offset 조회 초안
      x-contract-status: provisional
      description: |
        현재 upload 상태와 offset_bytes를 조회하는 비규범적 placeholder다. 최종 protocol에서
        GET과 HEAD 중 무엇을 사용할지, offset header와 응답 status는 TBD이다.
      responses:
        "200":
          description: 현재 RecordingUpload 상태와 byte offset
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUpload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingUploadNotFound"
        "410":
          $ref: "#/components/responses/RecordingUploadExpired"
    patch:
      tags: [Recordings]
      operationId: uploadRecordingChunk
      summary: 녹음 binary chunk 전송 초안
      x-contract-status: provisional
      description: |
        현재 서버 byte offset부터 녹음 chunk를 이어 쓰는 비규범적 placeholder다. PATCH 사용
        여부, offset 전달 header, request Content-Type, chunk 크기와 성공 status·응답 offset
        전달 방식은 TBD이다. 아래 application/octet-stream과 200 응답은 최종 wire 계약이 아니다.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: 실제 media type과 chunk 크기는 resumable upload protocol에서 확정
      responses:
        "200":
          description: chunk가 수락된 뒤의 임시 RecordingUpload 표현
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUpload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingUploadNotFound"
        "409":
          $ref: "#/components/responses/RecordingUploadChunkConflict"
        "410":
          $ref: "#/components/responses/RecordingUploadExpired"
        "415":
          $ref: "#/components/responses/UnsupportedRecordingFormat"

  /api/v1/recording-uploads/{upload_id}/complete:
    parameters:
      - $ref: "#/components/parameters/RecordingUploadId"
      - $ref: "#/components/parameters/RequestId"
    post:
      tags: [Recordings]
      operationId: completeRecordingUpload
      summary: 녹음 upload 완료와 HQ STT 시작 gate
      x-contract-status: provisional
      description: |
        전체 byte 수와 향후 확정할 checksum 규칙을 검증해 Recording을 UPLOADED로 확정한 뒤
        source=RECORDING, status=FINALIZING인 다음 TranscriptVersion과
        RECORDING_TRANSCRIPTION Job을 같은 transaction에서 생성한다. Job은 target RECORDING,
        visibility SHARED, blocks_session_completion=true이며 성공 result는 TRANSCRIPT_VERSION이다.
        upload wire protocol은 provisional이지만 이 처리 결과 계약은 규범적이다.
      parameters:
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      x-checksum-mismatch-response:
        status: TBD
        code: RECORDING_CHECKSUM_MISMATCH
        message: 녹음 무결성 검증에 실패했습니다.
      responses:
        "202":
          description: upload가 완결되고 HQ TranscriptVersion과 blocking Job이 생성됨
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUploadCompletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingUploadNotFound"
        "409":
          $ref: "#/components/responses/RecordingUploadCompleteConflict"
        "410":
          $ref: "#/components/responses/RecordingUploadExpired"

  /api/v1/recordings/{recording_id}/playback:
    parameters:
      - $ref: "#/components/parameters/RecordingId"
      - $ref: "#/components/parameters/RequestId"
    get:
      tags: [Recordings]
      operationId: playSessionRecording
      summary: 권한 재검증 녹음 playback
      description: |
        UPLOADED인 논리 Recording을 전체 또는 HTTP byte Range로 재생한다. 요청마다 현재 인증과
        Course 접근을 다시 확인한다. proxy streaming과 권한 확인 뒤 opaque signed delivery
        URL로 redirect하는 방식, codec·container와 실제 응답 MIME은 TBD이다. 어느 방식도
        내부 storage key, 서버 경로, fragment key나 manifest를 공개하지 않는다.
      parameters:
        - name: Range
          in: header
          required: false
          description: RFC byte range. 실제 전달 방식이 Range를 보존해야 함
          schema:
            type: string
      responses:
        "200":
          description: 전체 녹음 binary. 실제 MIME은 codec·container 확정 후 결정
          headers:
            Accept-Ranges:
              description: byte Range 지원
              schema:
                type: string
                const: bytes
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: 요청한 byte Range의 녹음 binary
          headers:
            Accept-Ranges:
              description: byte Range 지원
              schema:
                type: string
                const: bytes
            Content-Range:
              description: 반환한 byte 범위와 전체 길이
              schema:
                type: string
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "307":
          description: opaque signed delivery URL 방식을 선택할 때의 임시 redirect 초안
          headers:
            Location:
              description: 내부 storage key나 서버 경로를 노출하지 않는 짧은 수명 URL
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RecordingNotFound"
        "409":
          $ref: "#/components/responses/RecordingNotReady"
        "416":
          $ref: "#/components/responses/RangeNotSatisfiable"

components:
  securitySchemes:
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: goal_session
      description: |
        Google OAuth/OIDC authorization code 흐름 완료 후 서버가 발급하는 세션 Cookie다.
        HttpOnly, Secure, SameSite=Lax를 사용하고 callback 발급 시점부터 절대 만료는
        7일이다. 일반 요청은 last_seen_at만 갱신하고 만료를 연장하지 않는다. 클라이언트
        JavaScript는 Cookie 값을 읽거나 저장하지 않는다.

  headers:
    RequestId:
      description: 요청 추적용 식별자. 영문 대소문자·숫자·`.`·`_`·`-`만 사용한 1~128자 요청 값을 수용하고, 없거나 형식이 맞지 않으면 서버가 생성한다.
      schema:
        type: string
        pattern: "^[A-Za-z0-9._-]{1,128}$"
        example: req_01HXYZ
    RetryAfter:
      description: 다시 요청하기 전 대기 시간(초)
      schema:
        type: integer
        minimum: 0

  parameters:
    CourseId:
      name: course_id
      in: path
      required: true
      description: 불투명 Course ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    SessionId:
      name: session_id
      in: path
      required: true
      description: 불투명 LectureSession ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    MaterialId:
      name: material_id
      in: path
      required: true
      description: 불투명 LectureMaterial ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    TranscriptSegmentId:
      name: segment_id
      in: path
      required: true
      description: pagination 순번과 독립인 불투명 final TranscriptSegment ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    RecordingId:
      name: recording_id
      in: path
      required: true
      description: 물리 파일·fragment 구성을 숨기는 불투명 SessionRecording ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    RecordingUploadId:
      name: upload_id
      in: path
      required: true
      description: 불투명 RecordingUpload ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    QuestionId:
      name: question_id
      in: path
      required: true
      description: 불투명 Question ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    RepresentativeQuestionId:
      name: representative_question_id
      in: path
      required: true
      description: generation 배열 위치와 독립인 불투명 AIRepresentativeQuestion ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    QuestionClusterId:
      name: cluster_id
      in: path
      required: true
      description: Session 안에서 LIVE generation 사이 계승되는 불투명 공개 logical QuestionCluster ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    AnswerId:
      name: answer_id
      in: path
      required: true
      description: 불투명 Answer ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    SummaryId:
      name: summary_id
      in: path
      required: true
      description: 불투명 LectureSummary ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    ChatId:
      name: chat_id
      in: path
      required: true
      description: 불투명 Chat ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    MessageId:
      name: message_id
      in: path
      required: true
      description: 불투명 ChatMessage ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    JobId:
      name: job_id
      in: path
      required: true
      description: 불투명 AIJob ID
      schema:
        $ref: "#/components/schemas/ResourceId"
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        직전 응답에서 받은 불투명 keyset cursor. Session·필터·정렬과
        마지막 항목의 정렬 키·id를 고정하며 다른 조건에 재사용하면
        400 INVALID_CURSOR를 반환한다.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: 반환할 최대 항목 수. 공통 기본 20, 최대 100
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        중복 제출을 방지하는 클라이언트 생성 키. 서버는 정규화한 HTTP method·path·body로
        request_hash를 계산한다. 같은 사용자·경로·키와 같은 request_hash가 처리 중이면
        중복 실행하지 않고 기존 처리 상태를 재사용하며, terminal 완료 후에는 같은 HTTP
        status와 body를 반환한다. 다른 request_hash면 409 IDEMPOTENCY_KEY_REUSED를 반환한다.
        terminal 완료 응답은 완료 시각부터 정확히 24시간 보관하고 재사용한다.
        단 LIVE Summary 요청, mode=LIVE Chat 생성·Message 요청과 관련
        LIVE_SUMMARY·LIVE-mode CHAT_RESPONSE Job retry의 원장은
        purge_on_session_end로 범위를 표시한다. LIVE→PROCESSING transaction이 원
        리소스·Job을 삭제하고 늦은 결과를 fence하는 것은 확정이지만,
        멱등성 행을 조기 삭제할지 24시간 보존할지와 종료 후 같은 키에
        기존 202·201을 재응답할지 별도 응답을 줄지는 TBD이다. FINAL Summary와
        mode=REVIEW Chat·관련 Job retry는
        이 예외에 포함하지 않는다.
      schema:
        type: string
        minLength: 1
    RequiredIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        필수 멱등성 키. 서버는 정규화한 HTTP method·path·body로 request_hash를 계산한다.
        같은 사용자·경로·키와 같은 request_hash가 처리 중이면 중복 실행하지 않고 기존
        처리 상태를 재사용하며, terminal 완료 후에는 같은 HTTP status와 body를 반환한다.
        다른 request_hash면 409 IDEMPOTENCY_KEY_REUSED를 반환한다. terminal 완료 응답은
        완료 시각부터 정확히 24시간 보관하고 재사용한다.
        단 LIVE Summary 요청, mode=LIVE Chat 생성·Message 요청과 관련
        LIVE_SUMMARY·LIVE-mode CHAT_RESPONSE Job retry의 원장은
        purge_on_session_end로 범위를 표시한다. LIVE→PROCESSING이 원 리소스·
        Job을 삭제하고 늦은 결과를 fence하되, 멱등성 행 조기 삭제·24시간
        보존·종료 후 재응답은 TBD이다. FINAL Summary와 mode=REVIEW Chat·관련
        Job retry는 이 예외에
        포함하지 않는다.
      schema:
        type: string
        minLength: 1
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      description: 클라이언트가 선택적으로 지정하는 요청 추적 ID. 형식이 맞지 않으면 서버가 새 ID로 교체한다.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[A-Za-z0-9._-]{1,128}$"

