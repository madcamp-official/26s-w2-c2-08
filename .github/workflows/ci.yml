name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configuration:
    name: Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate shared Skills
        run: make skills-check

      - name: Validate Docker Compose
        run: make compose-check

      - name: Validate deployment scripts
        run: make deploy-check

      - name: Validate documentation links and structure
        run: make docs-check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: make frontend-lint

      - name: Check formatting
        run: make frontend-format

      - name: Type-check
        run: make frontend-typecheck

      - name: Check generated OpenAPI client types
        run: make frontend-contract-check

      - name: Test
        run: make frontend-test

      - name: Build
        run: make frontend-build

      - name: Install Chromium for production-route visual checks
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify production routes at three viewports
        run: make frontend-visual

      - name: Upload production-route visual evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-visual-${{ github.run_attempt }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_HOST_PORT: 5432
      POSTGRES_DB: tbd
      POSTGRES_USER: tbd
      POSTGRES_PASSWORD: tbd_dev
    services:
      db:
        image: pgvector/pgvector:0.8.2-pg17-bookworm
        env:
          POSTGRES_DB: tbd
          POSTGRES_USER: tbd
          POSTGRES_PASSWORD: tbd_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tbd -d tbd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --dev

      - name: Lint
        run: make backend-lint

      - name: Check formatting
        run: make backend-format

      - name: Unit tests
        run: make backend-unit

      - name: OpenAPI contract tests
        run: make backend-contract

      - name: PostgreSQL integration tests
        run: make backend-integration

      - name: Alembic fresh upgrade and downgrade
        run: make migration-check
